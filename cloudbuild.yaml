steps:
  # Build Java tools
  - name: 'amazoncorretto:21'
    entrypoint: './gradlew'
    args:
      - ':CreateSnapshot:installDist'
      - ':MetadataMigration:installDist'
      - ':DocumentsFromSnapshotMigration:installDist'
      - ':DocumentsFromSnapshotMigration:copyDockerRuntimeJars'
      - ':DocumentsFromSnapshotMigration:syncVersionFile_reindexFromSnapshot'
      - '--no-daemon'

  # Run GCS integration tests (requires Docker for testcontainers)
  - name: 'amazoncorretto:21'
    entrypoint: './gradlew'
    args:
      - ':SnapshotReaderGcs:isolatedTest'
      - '--no-daemon'

  # Stage Java tools and Node artifacts into migrationConsole Docker context
  - name: 'bash'
    args:
      - '-c'
      - |
        set -e
        mkdir -p /workspace/migrationConsole/javaTools
        cp -r /workspace/CreateSnapshot/build/install/CreateSnapshot /workspace/migrationConsole/javaTools/createSnapshot
        cp -r /workspace/MetadataMigration/build/install/MetadataMigration /workspace/migrationConsole/javaTools/metadataMigration
        cp -r /workspace/DocumentsFromSnapshotMigration/build/install/DocumentsFromSnapshotMigration /workspace/migrationConsole/javaTools/documentMigration

  # Build config processor and workflow templates
  - name: 'node:22'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        cd orchestrationSpecs
        npm ci
        echo "=== Building config processor ==="
        cd packages/config-processor
        npm run check-and-bundle -- /workspace/migrationConsole/nodeStaging/configProcessor
        echo "=== Building workflow templates ==="
        cd ../migration-workflow-templates
        mkdir -p /workspace/migrationConsole/nodeStaging/workflowTemplates
        npm run make-templates -- --outputDirectory /workspace/migrationConsole/nodeStaging/workflowTemplates
        echo "=== Workflow templates built ==="
        ls /workspace/migrationConsole/nodeStaging/workflowTemplates/
        echo "=== Generating migration resources (CRDs + admission policies) ==="
        cd /workspace/orchestrationSpecs
        mkdir -p /workspace/migrationConsole/nodeStaging/migrationResources
        npm run stage-migration-resources -- --outputDirectory /workspace/migrationConsole/nodeStaging/migrationResources
        echo "=== Migration resources generated ==="
        ls /workspace/migrationConsole/nodeStaging/migrationResources/

  # Build reindex-from-snapshot image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--no-cache'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/migrations/reindex-from-snapshot:latest'
      - 'DocumentsFromSnapshotMigration/docker'

  # Build the migration console image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--no-cache'
      - '--build-arg'
      - 'BASE_IMAGE=opensearchstaging/opensearch-migrations-console:latest'
      - '-f'
      - 'migrationConsole/Dockerfile'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/migrations/migration-console:latest'
      - 'migrationConsole'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/migrations/migration-console:latest'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/migrations/reindex-from-snapshot:latest'

options:
  machineType: 'E2_HIGHCPU_8'
  diskSizeGb: 100
