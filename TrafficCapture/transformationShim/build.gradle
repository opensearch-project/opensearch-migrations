plugins {
    id 'org.opensearch.migrations.java-application-conventions'
    id 'io.freefair.lombok'
    id 'com.google.cloud.tools.jib'
}

dependencies {
    implementation project(':coreUtilities')
    implementation project(':transformation:transformationPlugins:jsonMessageTransformers:jsonMessageTransformerInterface')
    implementation project(':transformation:transformationPlugins:jsonMessageTransformers:jsonJSTransformer')
    implementation project(':transformation:transformationPlugins:jsonMessageTransformers:jsonGraalTransformerBase')
    implementation project(':transformation:transformationPlugins:jsonMessageTransformers:jsonMessageTransformerLoaders')
    implementation project(':awsUtilities')

    implementation libs.netty.all
    implementation libs.jackson.databind
    implementation libs.jcommander
    implementation libs.slf4j.api
    implementation libs.log4j.api
    implementation libs.log4j.core
    implementation libs.log4j.slf4j2.impl
    implementation libs.aws.auth
    implementation libs.aws.sdk.core

    runtimeOnly project(':transformation:transformationPlugins:jsonMessageTransformers:jsonJSTransformerProvider')

    testImplementation libs.junit.jupiter.api
    testImplementation testFixtures(project(':coreUtilities'))
    testImplementation libs.mockito.core
    testImplementation libs.mockito.junit.jupiter
    testRuntimeOnly libs.junit.jupiter.engine
}

application {
    mainClass = 'org.opensearch.migrations.transform.shim.ShimMain'
}

tasks.withType(Test).configureEach {
    systemProperty 'io.netty.handler.codec.http.defaultStrictLineParsing', false
}

// Bundle Solr-to-OpenSearch transforms into the Docker image by default.
// Skip with: ./gradlew :TrafficCapture:transformationShim:jibDockerBuild -PskipBundleTransforms
if (!project.hasProperty('skipBundleTransforms')) {
    def transformStagingDir = layout.buildDirectory.dir("docker/transforms")

    tasks.register('stageTransformsForImage', Sync) {
        description = 'Sync built transforms into build/docker/transforms/ for Jib extraDirectories'
        from "${project(':TrafficCapture:SolrTransformations').projectDir}/transforms/dist"
        into transformStagingDir
        include '*.js'
        dependsOn ':TrafficCapture:SolrTransformations:buildTransforms'

        inputs.dir("${project(':TrafficCapture:SolrTransformations').projectDir}/transforms/dist")
        outputs.dir(transformStagingDir)

        doLast {
            def staged = transformStagingDir.get().asFile.listFiles()?.findAll { it.name.endsWith('.js') } ?: []
            if (staged.isEmpty()) {
                throw new GradleException(
                    "stageTransformsForImage produced no .js files. " +
                    "Expected built transforms in ${project(':TrafficCapture:SolrTransformations').projectDir}/transforms/dist/")
            }
            logger.lifecycle("Staged ${staged.size()} transform(s) for Docker image: ${staged*.name}")
        }
    }

    tasks.named('jib').configure { dependsOn 'stageTransformsForImage' }
    tasks.named('jibDockerBuild').configure { dependsOn 'stageTransformsForImage' }
}
