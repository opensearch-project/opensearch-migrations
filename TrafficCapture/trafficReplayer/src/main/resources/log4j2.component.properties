Log4jContextSelector=org.apache.logging.log4j.core.async.AsyncLoggerContextSelector
# NEVER use Block — it stalls caller threads (including kafkaConsumerThread and Netty
# event loops) when the ring buffer is full, causing offset stalls and consumer evictions.
AsyncLogger.WaitStrategy=Timeout
AsyncLogger.Timeout=10
log4j2.asyncQueueFullPolicy=Discard
log4j2.discardThreshold=WARN
AsyncLogger.RingBufferSize=65536