# Example reporting configuration for the validation shim.
# Copy this file to reporting-config.yaml and update the values for your environment.

enabled: true
include_request_body: true

sink:
  type: opensearch
  opensearch:
    uri: https://your-reporting-cluster.example.com
    index_prefix: shim-metrics
    bulk_size: 100
    flush_interval_ms: 5000
    auth:
      username: your-username
      password: your-password
      tls:
        insecure: false
