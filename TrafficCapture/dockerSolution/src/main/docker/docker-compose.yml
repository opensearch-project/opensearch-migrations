services:

  kafka:
    image: mirror.gcr.io/apache/kafka:3.9.1
    networks:
      - migrations
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT_HOST://kafka:9092,PLAINTEXT://kafka:19092'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'CONTROLLER://:29093,PLAINTEXT_HOST://:9092,PLAINTEXT://:19092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      CLUSTER_ID: '4L6g3nShT-eMCtK--X86sw'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'

  elasticsearch:
    image: 'migrations/elasticsearch_searchguard:latest'
    networks:
      - migrations
    environment:
      - discovery.type=single-node
    ports:
      - '19200:9200'

  capture-proxy:
    image: 'migrations/capture_proxy:latest'
    networks:
      - migrations
    ports:
      - "9200:9200"
    command:
      - "--kafkaConnection"
      - "kafka:9092"
      - "--destinationUri"
      - "https://elasticsearch:9200"
      - "--insecureDestination"
      - "--listenPort"
      - "9200"
      - "--sslCertChainFile"
      - "/usr/share/captureProxy/config/pub.pem"
      - "--sslKeyFile"
      - "/usr/share/captureProxy/config/key.pem"
    depends_on:
      - kafka
      - elasticsearch

  opensearchtarget:
    image: 'mirror.gcr.io/opensearchproject/opensearch:2.15.0'
    environment:
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=myStrongPassword123!
    networks:
      - migrations
    ports:
      - "29200:9200"

  replayer:
    image: 'migrations/traffic_replayer:latest'
    networks:
      - migrations
    volumes:
      - sharedLogsVolume:/shared-logs-output
    environment:
      - SHARED_LOGS_DIR_PATH=/shared-logs-output/traffic-replayer-default
    depends_on:
      kafka:
        condition: service_started
      opensearchtarget:
        condition: service_started
    command:
      - "--speedup-factor"
      - "2"
      - "--target-uri"
      - "https://opensearchtarget:9200"
      - "--target-username"
      - "admin"
      - "--target-password"
      - "myStrongPassword123!"
      - "--insecure"
      - "--kafka-traffic-brokers"
      - "kafka:9092"
      - "--kafka-traffic-topic"
      - "logging-traffic-topic"
      - "--kafka-traffic-group-id"
      - "logging-group-default"
      - "--transformer-config"
      - '[{"TypeMappingSanitizationTransformerProvider":{"sourceProperties":{"version":{"major":7,"minor":10}}}}]'

  migration-console:
    image: 'migrations/migration_console:latest'
    networks:
      - migrations
    volumes:
      - sharedLogsVolume:/shared-logs-output
      - ./services.yaml:/config/migration_services.yaml
      - ~/.aws:/root/.aws
    environment:
      - MIGRATION_KAFKA_BROKER_ENDPOINTS=kafka:9092
      - AWS_PROFILE=default

volumes:
  sharedLogsVolume:
    driver: local

networks:
  migrations:
    driver: bridge
