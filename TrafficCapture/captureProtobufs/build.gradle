plugins {
    id 'org.opensearch.migrations.java-library-conventions'
    id 'com.google.protobuf'
    id 'java-test-fixtures'
}

dependencies {
    api libs.protobuf.java

    testFixturesImplementation libs.protobuf.java
}

protobuf {
    protoc {
        artifact = "${libs.protobuf.protoc.get()}"
    }
}
