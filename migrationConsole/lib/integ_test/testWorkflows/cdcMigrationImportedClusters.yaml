# CDC test workflow: snapshot migration + capture proxy + replayer
#
# Reuses generate-migration-configs from fullMigrationImportedClusters to avoid
# duplicating the jq cluster config transformation logic. Adds the traffic section
# (Kafka, proxy, replayer) on top of the base migration config.
#
# This template is reusable for any CDC integration test. Future CDC tests should
# use this template (or extend the add-traffic-config pattern) rather than
# duplicating the workflow config generation. If CDC workflows are needed outside
# of tests, consider promoting the add-traffic-config step into the config processor.
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: cdc-migration-imported-clusters
spec:
  serviceAccountName: argo-workflow-executor
  entrypoint: main
  parallelism: 100

  arguments:
    parameters:
      - name: s3-snapshot-configmap
        value: "migrations-default-s3-config"
      - name: migration-image-configmap
        value: "migration-image-config"
      - name: monitor-retry-limit
        value: "120"

  templates:
    - name: main
      inputs:
        parameters:
          - name: source-configs
            description: "Array of source cluster configs with snapshot-and-migration-configs"
          - name: target-config
            description: "Target cluster configuration JSON"
          - name: imageMigrationConsoleLocation
            valueFrom:
              configMapKeyRef:
                name: "{{workflow.parameters.migration-image-configmap}}"
                key: migrationConsoleImage
          - name: imageMigrationConsolePullPolicy
            valueFrom:
              configMapKeyRef:
                name: "{{workflow.parameters.migration-image-configmap}}"
                key: migrationConsolePullPolicy
      steps:
        # Step 1: Reuse the base config generator from fullMigrationImportedClusters
        - - name: generate-base-config
            templateRef:
              name: full-migration-imported-clusters
              template: generate-migration-configs
            arguments:
              parameters:
                - name: source-configs
                  value: "{{inputs.parameters.source-configs}}"
                - name: target-config
                  value: "{{inputs.parameters.target-config}}"
                - name: imageMigrationConsoleLocation
                  value: "{{inputs.parameters.imageMigrationConsoleLocation}}"
                - name: imageMigrationConsolePullPolicy
                  value: "{{inputs.parameters.imageMigrationConsolePullPolicy}}"

        # Step 2: Add CDC traffic section (Kafka + proxy + replayer) to the base config
        - - name: add-traffic-config
            template: add-traffic-config
            arguments:
              parameters:
                - name: baseConfigBase64
                  value: "{{steps.generate-base-config.outputs.parameters.migrationConfigBase64}}"
                - name: imageMigrationConsoleLocation
                  value: "{{inputs.parameters.imageMigrationConsoleLocation}}"
                - name: imageMigrationConsolePullPolicy
                  value: "{{inputs.parameters.imageMigrationConsolePullPolicy}}"

        # Step 3: Submit the CDC-enriched config
        - - name: run-full-migration-with-workflow-cli
            templateRef:
              name: full-migration-with-workflow-cli
              template: main
            arguments:
              parameters:
                - name: migrationConfigBase64
                  value: "{{steps.add-traffic-config.outputs.parameters.migrationConfigBase64}}"
                - name: imageMigrationConsoleLocation
                  value: "{{inputs.parameters.imageMigrationConsoleLocation}}"
                - name: imageMigrationConsolePullPolicy
                  value: "{{inputs.parameters.imageMigrationConsolePullPolicy}}"
                - name: keepMigrationWorkflow
                  value: "true"

    - name: add-traffic-config
      inputs:
        parameters:
          - name: baseConfigBase64
          - name: imageMigrationConsoleLocation
          - name: imageMigrationConsolePullPolicy
      container:
        image: "{{inputs.parameters.imageMigrationConsoleLocation}}"
        imagePullPolicy: "{{inputs.parameters.imageMigrationConsolePullPolicy}}"
        command: [sh, -c]
        args:
          - |
            set -e

            BASE_CONFIG=$(echo "{{inputs.parameters.baseConfigBase64}}" | base64 -d)

            # Overlay CDC traffic config (Kafka + proxy + replayer) onto the base migration config.
            # The jq script is extracted to a file for testability and reuse across CDC test variants.
            CDC_CONFIG=$(echo "$BASE_CONFIG" | jq -f /root/lib/integ_test/testWorkflows/addCdcTrafficConfig.jq)

            echo "CDC migration config:"
            echo "$CDC_CONFIG" | jq .

            echo "$CDC_CONFIG" | base64 | tr -d '\n' > /tmp/migration-config-base64
      outputs:
        parameters:
          - name: migrationConfigBase64
            valueFrom:
              path: /tmp/migration-config-base64
