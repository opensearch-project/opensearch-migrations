# Full E2E CDC test: snapshot migration + capture proxy (capturing from start) + replayer.
# Proxy starts with noCapture=false so traffic is captured throughout the entire
# migration lifecycle (before, during, and after backfill).
#
# The CDC traffic overlay (Kafka config, capture-proxy, replayer) is provided by
# the shared cdc-overlay.add-traffic-config template so that the with-clusters
# variant (cdc-e2e-migration-with-clusters) stays in sync.
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: cdc-full-e2e-imported-clusters
spec:
  serviceAccountName: argo-test-workflow-executor
  entrypoint: main
  parallelism: 100

  arguments:
    parameters:
      - name: s3-snapshot-configmap
        value: "migrations-default-s3-config"
      - name: migration-image-configmap
        value: "migration-image-config"
      - name: monitor-retry-limit
        value: "120"
      - name: speedup-factor
        value: "20"
      - name: observed-packet-timeout
        value: "30"
      - name: transforms-sources
        value: "{}"
      - name: replayer-config-overrides
        value: "{}"

  templates:
    - name: main
      inputs:
        parameters:
          - name: source-configs
          - name: target-config
          - name: transforms-sources
            default: "{}"
          - name: replayer-config-overrides
            default: "{}"
          - name: tupleS3Region
            valueFrom:
              configMapKeyRef:
                name: "{{workflow.parameters.s3-snapshot-configmap}}"
                key: AWS_REGION
          - name: useLocalStack
            default: "false"
            valueFrom:
              configMapKeyRef:
                name: "{{workflow.parameters.s3-snapshot-configmap}}"
                key: USE_LOCAL_STACK
                optional: true
          - name: tupleS3Endpoint
            default: ""
            valueFrom:
              configMapKeyRef:
                name: "{{workflow.parameters.s3-snapshot-configmap}}"
                key: ENDPOINT_HTTP
                optional: true
          - name: tupleS3BucketName
            valueFrom:
              configMapKeyRef:
                name: "{{workflow.parameters.s3-snapshot-configmap}}"
                key: BUCKET_NAME
          - name: imageMigrationConsoleLocation
            valueFrom:
              configMapKeyRef:
                name: "{{workflow.parameters.migration-image-configmap}}"
                key: migrationConsoleImage
          - name: imageMigrationConsolePullPolicy
            valueFrom:
              configMapKeyRef:
                name: "{{workflow.parameters.migration-image-configmap}}"
                key: migrationConsolePullPolicy
      steps:
        - - name: generate-base-config
            templateRef:
              name: full-migration-imported-clusters
              template: generate-migration-configs
            arguments:
              parameters:
                - name: source-configs
                  value: "{{inputs.parameters.source-configs}}"
                - name: target-config
                  value: "{{inputs.parameters.target-config}}"
                - name: transforms-sources
                  value: "{{inputs.parameters.transforms-sources}}"
                - name: imageMigrationConsoleLocation
                  value: "{{inputs.parameters.imageMigrationConsoleLocation}}"
                - name: imageMigrationConsolePullPolicy
                  value: "{{inputs.parameters.imageMigrationConsolePullPolicy}}"

        - - name: add-traffic-config
            templateRef:
              name: cdc-overlay
              template: add-traffic-config
            arguments:
              parameters:
                - name: baseConfigBase64
                  value: "{{steps.generate-base-config.outputs.parameters.migrationConfigBase64}}"
                - name: speedupFactor
                  value: "{{workflow.parameters.speedup-factor}}"
                - name: observedPacketTimeout
                  value: "{{workflow.parameters.observed-packet-timeout}}"
                - name: imageMigrationConsoleLocation
                  value: "{{inputs.parameters.imageMigrationConsoleLocation}}"
                - name: imageMigrationConsolePullPolicy
                  value: "{{inputs.parameters.imageMigrationConsolePullPolicy}}"
                - name: replayer-config-overrides
                  value: "{{inputs.parameters.replayer-config-overrides}}"
                - name: tupleS3Region
                  value: "{{inputs.parameters.tupleS3Region}}"
                - name: useLocalStack
                  value: "{{inputs.parameters.useLocalStack}}"
                - name: tupleS3Endpoint
                  value: "{{inputs.parameters.tupleS3Endpoint}}"
                - name: tupleS3BucketName
                  value: "{{inputs.parameters.tupleS3BucketName}}"

        - - name: run-full-migration-with-workflow-cli
            templateRef:
              name: full-migration-with-workflow-cli
              template: main
            arguments:
              parameters:
                - name: migrationConfigBase64
                  value: "{{steps.add-traffic-config.outputs.parameters.migrationConfigBase64}}"
                - name: imageMigrationConsoleLocation
                  value: "{{inputs.parameters.imageMigrationConsoleLocation}}"
                - name: imageMigrationConsolePullPolicy
                  value: "{{inputs.parameters.imageMigrationConsolePullPolicy}}"
                - name: keepMigrationWorkflow
                  value: "true"
