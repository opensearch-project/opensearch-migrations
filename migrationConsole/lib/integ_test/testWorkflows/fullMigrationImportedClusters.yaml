# Workflow template for migrations with pre-existing (imported) clusters.
# Works for both S3 (AWS) and GCS (GCP) snapshot backends — pass the
# appropriate configmap name via the snapshot-configmap parameter:
#   - AWS: migrations-default-s3-config (default)
#   - GCP: migrations-default-gcs-config
#
# Supports both:
# - Standard migrations: Creates snapshot from source cluster
# - BYOS migrations: Uses externally managed snapshot (externallyManagedSnapshotName)
#
# For BYOS, pass snapshotConfig.snapshotNameConfig.externallyManagedSnapshotName
# instead of snapshotNamePrefix to skip snapshot creation.
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: full-migration-imported-clusters
spec:
  serviceAccountName: argo-test-workflow-executor
  entrypoint: main
  parallelism: 100

  arguments:
    parameters:
      - name: snapshot-configmap
        value: "migrations-default-s3-config"
      - name: migration-image-configmap
        value: "migration-image-config"
      - name: monitor-retry-limit
        value: "33"  # Default ~30 min, use 900 for ~15 hours

  templates:
    - name: main
      inputs:
        parameters:
          - name: source-configs
            description: "Array of source cluster configs with snapshot-and-migration-configs"
          - name: target-config
            description: "Target cluster configuration JSON"
          - name: imageMigrationConsoleLocation
            valueFrom:
              configMapKeyRef:
                name: "{{workflow.parameters.migration-image-configmap}}"
                key: migrationConsoleImage
          - name: imageMigrationConsolePullPolicy
            valueFrom:
              configMapKeyRef:
                name: "{{workflow.parameters.migration-image-configmap}}"
                key: migrationConsolePullPolicy
      steps:
        - - name: generate-migration-configs
            template: generate-migration-configs
            arguments:
              parameters:
                - name: source-configs
                  value: "{{inputs.parameters.source-configs}}"
                - name: target-config
                  value: "{{inputs.parameters.target-config}}"
                - name: imageMigrationConsoleLocation
                  value: "{{inputs.parameters.imageMigrationConsoleLocation}}"
                - name: imageMigrationConsolePullPolicy
                  value: "{{inputs.parameters.imageMigrationConsolePullPolicy}}"

        - - name: run-full-migration-with-workflow-cli
            templateRef:
              name: full-migration-with-workflow-cli
              template: main
            arguments:
              parameters:
                - name: migrationConfigBase64
                  value: "{{steps.generate-migration-configs.outputs.parameters.migrationConfigBase64}}"
                - name: imageMigrationConsoleLocation
                  value: "{{inputs.parameters.imageMigrationConsoleLocation}}"
                - name: imageMigrationConsolePullPolicy
                  value: "{{inputs.parameters.imageMigrationConsolePullPolicy}}"

    - name: generate-migration-configs
      inputs:
        parameters:
          - name: source-configs
          - name: target-config
          - name: imageMigrationConsoleLocation
          - name: imageMigrationConsolePullPolicy
          - name: bucketUri
            valueFrom:
              configMapKeyRef:
                name: "{{workflow.parameters.snapshot-configmap}}"
                key: BUCKET_URI
          - name: bucketEndpoint
            default: ""
            valueFrom:
              configMapKeyRef:
                name: "{{workflow.parameters.snapshot-configmap}}"
                key: ENDPOINT
                optional: true
          - name: snapshotRoleArn
            default: ""
            valueFrom:
              configMapKeyRef:
                name: "{{workflow.parameters.snapshot-configmap}}"
                key: SNAPSHOT_ROLE_ARN
                optional: true
          - name: awsRegion
            default: ""
            valueFrom:
              configMapKeyRef:
                name: "{{workflow.parameters.snapshot-configmap}}"
                key: AWS_REGION
                optional: true
      container:
        image: "{{inputs.parameters.imageMigrationConsoleLocation}}"
        imagePullPolicy: "{{inputs.parameters.imageMigrationConsolePullPolicy}}"
        command: [sh, -c]
        args:
          - |
            set -e

            SOURCE_CONFIGS='{{inputs.parameters.source-configs}}'
            TARGET_CONFIG='{{inputs.parameters.target-config}}'
            BUCKET_URI='{{inputs.parameters.bucketUri}}'
            BUCKET_ENDPOINT='{{inputs.parameters.bucketEndpoint}}'
            SNAPSHOT_ROLE_ARN='{{inputs.parameters.snapshotRoleArn}}'
            AWS_REGION='{{inputs.parameters.awsRegion}}'

            SUFFIX=$(echo "{{workflow.uid}}" | cut -c1-8)

            # Build snapshot repo config from the full URI (s3://... or gs://...)
            # The URI scheme determines the backend at the Java/schema layer.
            SNAPSHOT_REPO=$(jq -n \
              --arg uri "$BUCKET_URI" \
              --arg endpoint "$BUCKET_ENDPOINT" \
              --arg suffix "$SUFFIX" \
              --arg roleArn "$SNAPSHOT_ROLE_ARN" \
              --arg region "$AWS_REGION" \
              '{
                "repoPathUri": ($uri + "/" + $suffix)
              }
              + (if $endpoint != "" then {"endpoint": $endpoint} else {} end)
              + (if $roleArn != "" then {"s3RoleArn": $roleArn} else {} end)
              + (if $region != "" then {"awsRegion": $region} else {} end)')

            # Build sourceClusters map from source-configs array with schema transformation
            # Supports both standard (configmap repo) and BYOS (source-provided snapshotRepo)
            SOURCE_CLUSTERS=$(echo "$SOURCE_CONFIGS" | jq --argjson repo "$SNAPSHOT_REPO" '
              reduce to_entries[] as $e ({};
                .["source\($e.key + 1)"] = (
                  $e.value as $entry |
                  $entry.source
                  # Transform version format: ES_7.10 -> ES 7.10
                  | .version = (.version | gsub("_"; " "))
                  # Rename allow_insecure to allowInsecure
                  | if has("allow_insecure") then .allowInsecure = .allow_insecure | del(.allow_insecure) else . end
                  # Move sigv4 under authConfig
                  | if has("sigv4") then .authConfig = {sigv4: .sigv4} | del(.sigv4) else . end
                  # Move basic_auth under authConfig.basic with secretName
                  | if has("basic_auth") then .authConfig = {basic: {secretName: .basic_auth.k8s_secret_name}} | del(.basic_auth) else . end
                  # Remove unrecognized fields
                  | del(.no_auth) | del(.snapshotRepo)
                  # Build snapshotInfo based on whether snapshot is externally managed (BYOS) or not
                  | (($entry["snapshot-and-migration-configs"][0].snapshotConfig.snapshotNameConfig.externallyManagedSnapshotName // null) as $extSnap |
                    if $extSnap != null then
                      (($entry.source.snapshotRepo // null) as $srcRepo |
                      . + {"snapshotInfo": {
                        "repos": {"default": (if $srcRepo != null then ($repo + {repoPathUri: $srcRepo.repoPathUri}) else $repo end)},
                        "snapshots": {
                          ($extSnap): {
                            "repoName": "default",
                            "config": {"externallyManagedSnapshotName": $extSnap}
                          }
                        }
                      }})
                    else
                      . + {"snapshotInfo": {
                        "repos": {"default": $repo},
                        "snapshots": {
                          "testsnapshot": {
                            "repoName": "default",
                            "config": {"createSnapshotConfig": {}}
                          }
                        }
                      }}
                    end)
                )
              )')

            # Transform target config to match schema
            TARGET_TRANSFORMED=$(echo "$TARGET_CONFIG" | jq '
              # Target cluster schema does not accept a version field
              del(.version)
              # Rename allow_insecure to allowInsecure
              | if has("allow_insecure") then .allowInsecure = .allow_insecure | del(.allow_insecure) else . end
              # Move sigv4 under authConfig
              | if has("sigv4") then .authConfig = {sigv4: .sigv4} | del(.sigv4) else . end
              # Move basic_auth under authConfig.basic with secretName
              | if has("basic_auth") then .authConfig = {basic: {secretName: .basic_auth.k8s_secret_name}} | del(.basic_auth) else . end
            ')

            # Build perSnapshotConfig: snapshot name -> migrations array
            SNAPSHOT_CONFIGS=$(echo "$SOURCE_CONFIGS" | jq '
              .[0]["snapshot-and-migration-configs"][0] as $smc |
              if ($smc.snapshotConfig.snapshotNameConfig.externallyManagedSnapshotName // null) != null then
                {($smc.snapshotConfig.snapshotNameConfig.externallyManagedSnapshotName): $smc.migrations}
              else
                {"testsnapshot": $smc.migrations}
              end
            ')

            # Build the complete OVERALL_MIGRATION_CONFIG
            MIGRATION_CONFIG=$(jq -n \
              --argjson sources "$SOURCE_CLUSTERS" \
              --argjson target "$TARGET_TRANSFORMED" \
              --argjson snapshotConfigs "$SNAPSHOT_CONFIGS" \
              '{
                "skipApprovals": true,
                "sourceClusters": $sources,
                "targetClusters": {
                  "target1": $target
                },
                "snapshotMigrationConfigs": [{
                  "fromSource": "source1",
                  "toTarget": "target1",
                  "perSnapshotConfig": $snapshotConfigs
                }]
              }')

            MIGRATION_CONFIG_BASE64=$(echo "$MIGRATION_CONFIG" | base64 | tr -d '\n')

            echo "Generated migration config:"
            echo "$MIGRATION_CONFIG" | jq .

            echo "$MIGRATION_CONFIG_BASE64" > /tmp/migration-config-base64
      outputs:
        parameters:
          - name: migrationConfigBase64
            valueFrom:
              path: /tmp/migration-config-base64
