              "version": "ES 7.10"
            }
            EOF

            kubectl create configmap ${CLUSTER_NAME}-migration-config \
              --from-file=cluster-config=/tmp/cluster-config.json \
              -n ${NAMESPACE} \
              --dry-run=client -o yaml | kubectl apply -f -

            echo "Elasticsearch 7.10 cluster created successfully."
