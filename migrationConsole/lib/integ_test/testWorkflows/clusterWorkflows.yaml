    # Elasticsearch 6.8 Single Node Template - Inline Manifests
    - name: elasticsearch-6-8-single-node
      inputs:
        parameters:
          - name: cluster-name
          - name: namespace
          - name: image-registry-prefix
            default: ""
      container:
        image: mirror.gcr.io/dtzar/helm-kubectl:3.18.6
