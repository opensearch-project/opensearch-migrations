    # OpenSearch 3.1 Single Node Template
    # - Uses Argo "resource" templates (no image / no kubectl container)
    # - Creates: Secret, Service, StatefulSet, ConfigMap
    # - Outputs: cluster-config parameter (string JSON)
    - name: opensearch-3-1-single-node
      inputs:
        parameters:
          - name: cluster-name
          - name: namespace
      steps:
        - - name: create-secret
            template: opensearch-3-1-create-secret
            arguments:
              parameters:
                - name: cluster-name
                  value: "{{inputs.parameters.cluster-name}}"
                - name: namespace
                  value: "{{inputs.parameters.namespace}}"
        - - name: create-service
            template: opensearch-3-1-create-service
            arguments:
              parameters:
                - name: cluster-name
                  value: "{{inputs.parameters.cluster-name}}"
                - name: namespace
                  value: "{{inputs.parameters.namespace}}"
        - - name: create-statefulset
            template: opensearch-3-1-create-statefulset
            arguments:
              parameters:
                - name: cluster-name
                  value: "{{inputs.parameters.cluster-name}}"
                - name: namespace
                  value: "{{inputs.parameters.namespace}}"
        - - name: create-migration-config
            template: opensearch-3-1-migration-configmap
            arguments:
              parameters:
                - name: cluster-name
                  value: "{{inputs.parameters.cluster-name}}"
                - name: namespace
                  value: "{{inputs.parameters.namespace}}"
      outputs:
        parameters:
          - name: cluster-config
            valueFrom:
              parameter: "{{steps.create-migration-config.outputs.parameters.cluster-config}}"

    # Secret (creds)
    - name: opensearch-3-1-create-secret
      inputs:
        parameters:
          - name: cluster-name
          - name: namespace
      resource:
        action: apply
        manifest: |
          apiVersion: v1
          kind: Secret
          metadata:
            name: "{{inputs.parameters.cluster-name}}-creds"
            namespace: "{{inputs.parameters.namespace}}"
            labels:
              migration-test: "true"
              cluster-name: "{{inputs.parameters.cluster-name}}"
          type: Opaque
          stringData:
            username: admin
            password: myStrongPassword123!

    # Service
    - name: opensearch-3-1-create-service
      inputs:
        parameters:
          - name: cluster-name
          - name: namespace
      resource:
        action: apply
        manifest: |
          apiVersion: v1
          kind: Service
          metadata:
            name: "{{inputs.parameters.cluster-name}}"
            namespace: "{{inputs.parameters.namespace}}"
            labels:
              app: "{{inputs.parameters.cluster-name}}"
              migration-test: "true"
              cluster-name: "{{inputs.parameters.cluster-name}}"
          spec:
            selector:
              app: "{{inputs.parameters.cluster-name}}"
            ports:
              - name: https
                port: 9200
                targetPort: https

    # StatefulSet
    - name: opensearch-3-1-create-statefulset
      inputs:
        parameters:
          - name: cluster-name
          - name: namespace
      resource:
        action: apply
        manifest: |
          apiVersion: apps/v1
          kind: StatefulSet
          metadata:
            name: "{{inputs.parameters.cluster-name}}"
            namespace: "{{inputs.parameters.namespace}}"
            labels:
              app: "{{inputs.parameters.cluster-name}}"
              app.kubernetes.io/instance: "{{inputs.parameters.cluster-name}}"
              migration-test: "true"
              cluster-name: "{{inputs.parameters.cluster-name}}"
          spec:
            serviceName: "{{inputs.parameters.cluster-name}}"
            replicas: 1
            persistentVolumeClaimRetentionPolicy:
              whenDeleted: Delete
              whenScaled: Retain
            selector:
              matchLabels:
                app: "{{inputs.parameters.cluster-name}}"
            template:
              metadata:
                labels:
                  app: "{{inputs.parameters.cluster-name}}"
                  app.kubernetes.io/instance: "{{inputs.parameters.cluster-name}}"
                  migration-test: "true"
                  cluster-name: "{{inputs.parameters.cluster-name}}"
              spec:
                serviceAccountName: migration-console-access-role
                initContainers:
                  - name: install-plugins
                    image: mirror.gcr.io/opensearchproject/opensearch:3.1.0
                    command:
                      - sh
                      - -c
                      - |
                        set -euo pipefail
                        # Copy bundled plugins to shared volume, install repository-s3, then copy it over
                        cp -r /usr/share/opensearch/plugins/* /plugins/ 2>/dev/null || true
                        bin/opensearch-plugin install --batch repository-s3
                        cp -r /usr/share/opensearch/plugins/repository-s3 /plugins/
                    volumeMounts:
                      - name: plugins
                        mountPath: /plugins
                containers:
                  - name: opensearch
                    image: mirror.gcr.io/opensearchproject/opensearch:3.1.0
                    ports:
                      - name: https
                        containerPort: 9200
                    env:
                      - name: cluster.name
                        value: "{{inputs.parameters.cluster-name}}"
                      - name: discovery.type
                        value: single-node
                      - name: OPENSEARCH_INITIAL_ADMIN_USERNAME
                        valueFrom:
                          secretKeyRef:
                            name: "{{inputs.parameters.cluster-name}}-creds"
                            key: username
                            optional: false
                      - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
                        valueFrom:
                          secretKeyRef:
                            name: "{{inputs.parameters.cluster-name}}-creds"
                            key: password
                            optional: false
                      - name: OPENSEARCH_JAVA_OPTS
                        value: -Xms2g -Xmx2g
                    resources:
                      requests:
                        cpu: "2"
                        memory: 4Gi
                      limits:
                        cpu: "2"
                        memory: 4Gi
                    readinessProbe:
                      exec:
                        command:
                          - sh
                          - -c
                          - curl -sk -u "${OPENSEARCH_INITIAL_ADMIN_USERNAME}:${OPENSEARCH_INITIAL_ADMIN_PASSWORD}" "https://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=1s"
                      initialDelaySeconds: 5
                      periodSeconds: 5
                      timeoutSeconds: 3
                      failureThreshold: 24
                    volumeMounts:
                      - name: data
                        mountPath: /usr/share/opensearch/data
                      - name: plugins
                        mountPath: /usr/share/opensearch/plugins
                volumes:
                  - name: plugins
                    emptyDir: {}
            volumeClaimTemplates:
              - metadata:
                  name: data
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 1Gi

    # ConfigMap holding cluster-config.json
    - name: opensearch-3-1-migration-configmap
      inputs:
        parameters:
          - name: cluster-name
          - name: namespace
      resource:
        action: apply
        manifest: |
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: "{{inputs.parameters.cluster-name}}-migration-config"
            namespace: "{{inputs.parameters.namespace}}"
            labels:
              migration-test: "true"
              cluster-name: "{{inputs.parameters.cluster-name}}"
          data:
            cluster-config: |
              {
                "endpoint": "https://{{inputs.parameters.cluster-name}}:9200",
                "allowInsecure": true,
                "authConfig": {
                  "basic": {
                    "secretName": "{{inputs.parameters.cluster-name}}-creds"
                  }
                }
              }
      outputs:
        parameters:
          - name: cluster-config
            valueFrom:
              jsonPath: '{.data.cluster-config}'

    # Solr 8.11 Single Node Template (SolrCloud mode with embedded ZooKeeper)
    # Uses SolrCloud mode so the S3BackupRepository works with the Collections API.
    # Includes s3-repository module for S3 backups via localstack.
    - name: solr-8-11-single-node
      inputs:
        parameters:
          - name: cluster-name
          - name: namespace
          - name: image-registry-prefix
            default: ""
      container:
        image: mirror.gcr.io/dtzar/helm-kubectl:3.18.6
        command: [sh, -c]
        args:
          - |
            set -euo pipefail
            CLUSTER_NAME='{{inputs.parameters.cluster-name}}'
            NAMESPACE='{{inputs.parameters.namespace}}'

            # Create a custom solr.xml with S3BackupRepository configured
            cat > /tmp/solr.xml <<'SOLRXML'
            <?xml version="1.0" encoding="UTF-8" ?>
            <solr>
              <int name="maxBooleanClauses">${solr.max.booleanClauses:1024}</int>
              <str name="allowPaths">${solr.allowPaths:}</str>
              <str name="sharedLib">/opt/solr/dist,/opt/solr/contrib/s3-repository/lib</str>

              <solrcloud>
                <str name="host">${host:}</str>
                <int name="hostPort">${solr.port.advertise:0}</int>
                <str name="hostContext">${hostContext:solr}</str>
                <bool name="genericCoreNodeNames">${genericCoreNodeNames:true}</bool>
                <int name="zkClientTimeout">${zkClientTimeout:30000}</int>
                <int name="distribUpdateSoTimeout">${distribUpdateSoTimeout:600000}</int>
                <int name="distribUpdateConnTimeout">${distribUpdateConnTimeout:60000}</int>
                <str name="zkCredentialsProvider">${zkCredentialsProvider:org.apache.solr.common.cloud.DefaultZkCredentialsProvider}</str>
                <str name="zkACLProvider">${zkACLProvider:org.apache.solr.common.cloud.DefaultZkACLProvider}</str>
              </solrcloud>

              <backup>
                <repository name="default" class="org.apache.solr.s3.S3BackupRepository" default="true">
                  <str name="s3.bucket.name">${S3_BUCKET_NAME:}</str>
                  <str name="s3.region">${S3_REGION:us-east-2}</str>
                  <str name="s3.endpoint">${S3_ENDPOINT:}</str>
                </repository>
              </backup>

              <shardHandlerFactory name="shardHandlerFactory" class="HttpShardHandlerFactory">
                <int name="socketTimeout">${socketTimeout:600000}</int>
                <int name="connTimeout">${connTimeout:60000}</int>
              </shardHandlerFactory>

              <metrics enabled="${metricsEnabled:true}"/>
            </solr>
            SOLRXML

            kubectl create configmap "${CLUSTER_NAME}-solr-xml" \
              --from-file=solr.xml=/tmp/solr.xml \
              -n "${NAMESPACE}" \
              --dry-run=client -o yaml | \
              kubectl label --local -f - migration-test=true cluster-name=${CLUSTER_NAME} -o yaml | \
              kubectl apply -f -

            cat <<EOF | kubectl apply -f -
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: ${CLUSTER_NAME}
              namespace: ${NAMESPACE}
              labels:
                app: ${CLUSTER_NAME}
                migration-test: "true"
                cluster-name: ${CLUSTER_NAME}
            spec:
              replicas: 1
              selector:
                matchLabels:
                  app: ${CLUSTER_NAME}
              template:
                metadata:
                  labels:
                    app: ${CLUSTER_NAME}
                    migration-test: "true"
                    cluster-name: ${CLUSTER_NAME}
                spec:
                  serviceAccountName: migration-console-access-role
                  containers:
                    - name: solr
                      image: mirror.gcr.io/library/solr:8.11.4
                      securityContext:
                        runAsUser: 0
                      ports:
                        - containerPort: 8983
                          name: http
                      env:
                        - name: SOLR_JAVA_MEM
                          value: "-Xms512m -Xmx512m"
                        - name: SOLR_SECURITY_MANAGER_ENABLED
                          value: "false"
                        - name: ZK_CREATE_CHROOT
                          value: "true"
                        - name: AWS_ACCESS_KEY_ID
                          value: "test"
                        - name: AWS_SECRET_ACCESS_KEY
                          value: "test"
                        - name: S3_BUCKET_NAME
                          valueFrom:
                            configMapKeyRef:
                              name: migrations-default-s3-config
                              key: BUCKET_NAME
                        - name: S3_REGION
                          valueFrom:
                            configMapKeyRef:
                              name: migrations-default-s3-config
                              key: AWS_REGION
                        - name: S3_ENDPOINT
                          valueFrom:
                            configMapKeyRef:
                              name: migrations-default-s3-config
                              key: ENDPOINT_HTTP
                              optional: true
                      command: ["bash", "-c"]
                      args:
                        - |
                          # Copy S3 repository jars to dist dir and start SolrCloud with embedded ZooKeeper
                          cp /opt/solr/contrib/s3-repository/lib/*.jar /opt/solr/dist/
                          /opt/docker-solr/scripts/init-var-solr
                          exec solr -f -force -cloud -DzkRun
                      readinessProbe:
                        httpGet:
                          path: /solr/admin/info/system?wt=json
                          port: 8983
                        initialDelaySeconds: 15
                        periodSeconds: 5
                        failureThreshold: 24
                      resources:
                        requests:
                          cpu: 500m
                          memory: 1Gi
                        limits:
                          cpu: "2"
                          memory: 2Gi
                      volumeMounts:
                        - name: solr-data
                          mountPath: /var/solr
                        - name: solr-xml
                          mountPath: /opt/solr/server/solr/solr.xml
                          subPath: solr.xml
                  volumes:
                    - name: solr-data
                      emptyDir: {}
                    - name: solr-xml
                      configMap:
                        name: ${CLUSTER_NAME}-solr-xml
            ---
            apiVersion: v1
            kind: Service
            metadata:
              name: ${CLUSTER_NAME}
              namespace: ${NAMESPACE}
              labels:
                app: ${CLUSTER_NAME}
                migration-test: "true"
                cluster-name: ${CLUSTER_NAME}
            spec:
              selector:
                app: ${CLUSTER_NAME}
              ports:
                - name: http
                  port: 8983
                  targetPort: 8983
            EOF

            # Wait for Solr to be ready
            echo "Waiting for Solr to be ready..."
            kubectl rollout status deployment/${CLUSTER_NAME} -n ${NAMESPACE} --timeout=300s

            # Create the 'dummy' collection via Collections API (SolrCloud mode)
            echo "Creating 'dummy' collection..."
            SOLR_URL="http://${CLUSTER_NAME}.${NAMESPACE}.svc.cluster.local:8983"
            for i in $(seq 1 30); do
              RESULT=$(curl -s "${SOLR_URL}/solr/admin/collections?action=CREATE&name=dummy&numShards=1&replicationFactor=1&wt=json" 2>&1) && echo "$RESULT" | grep -q '"status":0' && echo "Collection 'dummy' created successfully" && break
              echo "Attempt $i/30 - response: $RESULT"
              sleep 5
            done

            cat > /tmp/cluster-config.json <<EOF
            {
              "endpoint": "http://${CLUSTER_NAME}:8983",
              "allowInsecure": true,
              "version": "SOLR 8.11.4"
            }
            EOF

            kubectl create configmap ${CLUSTER_NAME}-migration-config \
              --from-file=cluster-config=/tmp/cluster-config.json \
              -n ${NAMESPACE} \
              --dry-run=client -o yaml | \
              kubectl label --local -f - migration-test=true cluster-name=${CLUSTER_NAME} -o yaml | \
              kubectl apply -f -

            echo "Solr 8.11 SolrCloud cluster created successfully."
            echo "Cluster config:"
            cat /tmp/cluster-config.json
      outputs:
        parameters:
          - name: cluster-config
            valueFrom:
              path: /tmp/cluster-config.json
