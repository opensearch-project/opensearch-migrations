              -n "${NAMESPACE}" \
              --dry-run=client -o yaml | \
              kubectl label --local -f - migration-test=true cluster-name=${CLUSTER_NAME} -o yaml | \
              kubectl apply -f -

            # 3) Apply the Deployment + Service that mirror our proven setup
            cat <<EOF | kubectl apply -f -
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: ${CLUSTER_NAME}
              namespace: ${NAMESPACE}
              labels:
                app: ${CLUSTER_NAME}
                migration-test: "true"
                cluster-name: ${CLUSTER_NAME}
            spec:
              replicas: 1
              selector:
                matchLabels:
                  app: ${CLUSTER_NAME}
              template:
                metadata:
                  labels:
                    app: ${CLUSTER_NAME}
                    migration-test: "true"
                    cluster-name: ${CLUSTER_NAME}
                spec:
                  serviceAccountName: migration-console-access-role
                  securityContext:
                    runAsUser: 1000
                    runAsGroup: 1000
                    fsGroup: 1000
                  initContainers:
                    - name: install-s3-plugin
                      image: {{inputs.parameters.image-registry-prefix}}migrations/custom-elasticsearch:2.4.6
                      command: ["sh","-c"]
                      args:
                        - /usr/share/elasticsearch/bin/plugin install cloud-aws
                      volumeMounts:
                        - name: plugins
                          mountPath: /usr/share/elasticsearch/plugins
                      securityContext:
                        runAsUser: 1000
                        runAsGroup: 1000
                        runAsNonRoot: true
                  containers:
                    - name: elasticsearch
                      image: {{inputs.parameters.image-registry-prefix}}migrations/custom-elasticsearch:2.4.6
                      imagePullPolicy: IfNotPresent
                      env:
                        - name: ES_HEAP_SIZE
                          value: "2g"
                      envFrom:
                        - secretRef:
                            name: ${CLUSTER_NAME}-aws
                      command: ["/bin/sh","-lc"]
                      args:
                        - >
                          exec /usr/share/elasticsearch/bin/elasticsearch
                            -Des.path.conf=/usr/share/elasticsearch/config
                            -Des.network.host=0.0.0.0
                            -Des.http.host=0.0.0.0
                            -Des.transport.host=0.0.0.0
                            -Des.discovery.zen.minimum_master_nodes=1
                            -Des.bootstrap.system_call_filter=false
                            -Djava.net.preferIPv4Stack=true
                      ports:
                        - containerPort: 9200
                          name: http
                        - containerPort: 9300
                          name: transport
                      readinessProbe:
                        httpGet:
                          path: /
                          port: 9200
                        initialDelaySeconds: 5
                        periodSeconds: 3
                        failureThreshold: 20
                      resources:
                        requests:
                          cpu: "2"
                          memory: "4Gi"
                        limits:
                          cpu: "2"
                          memory: "4Gi"
                      volumeMounts:
                        # Mount ONLY the file (ConfigMap is read-only; avoids scripts/dir creation error)
                        - name: elasticsearch-config
                          mountPath: /usr/share/elasticsearch/config/elasticsearch.yml
                          subPath: elasticsearch.yml
                        # Writable locations
                        - name: elasticsearch-data
                          mountPath: /usr/share/elasticsearch/data
                        - name: elasticsearch-logs
                          mountPath: /usr/share/elasticsearch/logs
                        # Persist the plugin installed in init container
                        - name: plugins
                          mountPath: /usr/share/elasticsearch/plugins
                  volumes:
                    - name: elasticsearch-config
                      configMap:
                        name: ${CLUSTER_NAME}-config
                    - name: elasticsearch-data
                      emptyDir: {}
                    - name: elasticsearch-logs
                      emptyDir: {}
                    - name: plugins
                      emptyDir: {}
            ---
            apiVersion: v1
            kind: Service
            metadata:
              name: ${CLUSTER_NAME}
              namespace: ${NAMESPACE}
              labels:
                app: ${CLUSTER_NAME}
                migration-test: "true"
                cluster-name: ${CLUSTER_NAME}
            spec:
              selector:
                app: ${CLUSTER_NAME}
              ports:
                - name: http
                  port: 9200
                  targetPort: 9200
                - name: transport
                  port: 9300
                  targetPort: 9300
            EOF

            # 4) Emit cluster config as output (no authConfig since our default use of ES 2.4 has no auth)
            cat > /tmp/cluster-config.json <<EOF
            {
              "endpoint": "http://${CLUSTER_NAME}:9200",
              "allowInsecure": true,
              "version": "ES 2.4"
            }
            EOF

            kubectl create configmap ${CLUSTER_NAME}-migration-config \
              --from-file=cluster-config=/tmp/cluster-config.json \
              -n ${NAMESPACE} \
              --dry-run=client -o yaml | kubectl apply -f -

            echo "Elasticsearch 2.4 cluster created successfully (manifests inline)."
            echo "Cluster config:"
            cat /tmp/cluster-config.json
      outputs:
        parameters:
          - name: cluster-config
            valueFrom:
              path: /tmp/cluster-config.json

