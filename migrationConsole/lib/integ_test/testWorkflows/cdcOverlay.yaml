# Shared CDC traffic overlay template.
#
# Provides a single add-traffic-config step that other CDC workflow templates
# reference via templateRef. It takes a base migration config (produced by
# generate-migration-configs in either full-migration-with-clusters or
# full-migration-imported-clusters) and jq-merges a CDC traffic block onto
# it — Kafka cluster config, capture-proxy, and replayer.
#
# By centralizing this logic, any change to the CDC traffic shape (e.g. new
# replayer config fields, Kafka auth changes) is made in one place and picked
# up by every caller.
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: cdc-overlay
spec:
  serviceAccountName: argo-test-workflow-executor

  templates:
    # Overlay step: jq-merge CDC traffic config onto the base migration config.
    # speedup-factor and observed-packet-timeout are passed in as parameters
    # so each caller can expose them as top-level workflow parameters.
    - name: add-traffic-config
      inputs:
        parameters:
          - name: baseConfigBase64
          - name: speedupFactor
          - name: observedPacketTimeout
          - name: imageMigrationConsoleLocation
          - name: imageMigrationConsolePullPolicy
          - name: replayer-config-overrides
            default: "{}"
          - name: tupleS3Region
            default: ""
          - name: useLocalStack
            default: "false"
          - name: tupleS3Endpoint
            default: ""
          - name: tupleS3BucketName
            default: ""
          - name: captureProxyServiceType
            default: "LoadBalancer"
          - name: otelTraceCollectorEndpoint
            default: ""
          - name: clientAuthPemBase64
            default: ""
      container:
        image: "{{inputs.parameters.imageMigrationConsoleLocation}}"
        imagePullPolicy: "{{inputs.parameters.imageMigrationConsolePullPolicy}}"
        command: [sh, -c]
        args:
          - |
            set -e
            BASE_CONFIG=$(echo "{{inputs.parameters.baseConfigBase64}}" | base64 -d)
            REPLAYER_CONFIG_OVERRIDES='{{inputs.parameters.replayer-config-overrides}}'
            TUPLE_S3_REGION='{{inputs.parameters.tupleS3Region}}'
            USE_LOCAL_STACK='{{inputs.parameters.useLocalStack}}'
            TUPLE_S3_ENDPOINT='{{inputs.parameters.tupleS3Endpoint}}'
            TUPLE_S3_BUCKET='{{inputs.parameters.tupleS3BucketName}}'
            OTEL_TRACE_COLLECTOR_ENDPOINT='{{inputs.parameters.otelTraceCollectorEndpoint}}'
            CLIENT_AUTH_PEM=$(echo "{{inputs.parameters.clientAuthPemBase64}}" | base64 -d)

            # Overlay CDC traffic config with capture enabled from start.
            CDC_CONFIG=$(echo "$BASE_CONFIG" | jq \
              --arg tupleS3Bucket "$TUPLE_S3_BUCKET" \
              --arg tupleS3Region "$TUPLE_S3_REGION" \
              --argjson useLocalStack "$USE_LOCAL_STACK" \
              --arg tupleS3Endpoint "$TUPLE_S3_ENDPOINT" \
              --arg otelTraceCollectorEndpoint "$OTEL_TRACE_COLLECTOR_ENDPOINT" \
              --argjson replayerOverrides "$REPLAYER_CONFIG_OVERRIDES" \
              --arg clientAuthPem "$CLIENT_AUTH_PEM" \
              '. + {
              "traffic": {
                "kafkaClusters": {
                  "default": {
                    "autoCreate": {}
                  }
                },
                "proxies": {
                  "capture-proxy": {
                    "source": "source1",
                    "proxyConfig": ({
                      "listenPort": 9201,
                      "noCapture": false,
                      "podReplicas": 2,
                      "serviceType": "{{inputs.parameters.captureProxyServiceType}}"
                    } + (if $otelTraceCollectorEndpoint != "" then {
                      "otelTraceCollectorEndpoint": $otelTraceCollectorEndpoint
                    } else {} end)
                    + (if $clientAuthPem != "" then {
                      "tls": {
                        "mode": "certManager",
                        "issuerRef": {"name": "migrations-ca", "kind": "ClusterIssuer"},
                        "dnsNames": ["capture-proxy.ma.svc.cluster.local", "capture-proxy"],
                        "clientAuth": {"trustedClientCaPem": $clientAuthPem, "required": false}
                      }
                    } else {} end))
                  }
                },
                "replayers": {
                  "replay1": {
                    "fromCapturedTraffic": "capture-proxy",
                    "toTarget": "target1",
                    "dependsOnSnapshotMigrations": [
                      {"source": "source1", "snapshot": "testsnapshot"}
                    ],
                    "replayerConfig": ({
                      "observedPacketConnectionTimeout": {{inputs.parameters.observedPacketTimeout}},
                      "speedupFactor": {{inputs.parameters.speedupFactor}},
                      "useLocalStack": $useLocalStack
                    }
                    + (if $tupleS3Bucket != "" then {
                        "tupleS3Bucket": $tupleS3Bucket,
                        "tupleS3Region": $tupleS3Region,
                        "tupleS3Prefix": "tuples/"
                      } else {} end)
                    + (if $tupleS3Endpoint != "" then {"tupleS3Endpoint": $tupleS3Endpoint} else {} end)
                    + (if $otelTraceCollectorEndpoint != "" then {
                        "otelTraceCollectorEndpoint": $otelTraceCollectorEndpoint
                      } else {} end)
                    + $replayerOverrides)
                  }
                }
              }
            }')

            echo "CDC traffic overlay applied to migration config:"
            echo "$CDC_CONFIG" | jq .
            echo "$CDC_CONFIG" | base64 | tr -d '\n' > /tmp/migration-config-base64
      outputs:
        parameters:
          - name: migrationConfigBase64
            valueFrom:
              path: /tmp/migration-config-base64

    # Overlay step: keep only Kafka + capture proxy so tests can capture traffic
    # before allowing snapshot/backfill/replay to start.
    - name: add-proxy-only-traffic-config
      inputs:
        parameters:
          - name: baseConfigBase64
          - name: imageMigrationConsoleLocation
          - name: imageMigrationConsolePullPolicy
          - name: captureProxyServiceType
            default: "LoadBalancer"
          - name: otelTraceCollectorEndpoint
            default: ""
          - name: clientAuthPemBase64
            default: ""
      container:
        image: "{{inputs.parameters.imageMigrationConsoleLocation}}"
        imagePullPolicy: "{{inputs.parameters.imageMigrationConsolePullPolicy}}"
        command: [sh, -c]
        args:
          - |
            set -e
            BASE_CONFIG=$(echo "{{inputs.parameters.baseConfigBase64}}" | base64 -d)
            OTEL_TRACE_COLLECTOR_ENDPOINT='{{inputs.parameters.otelTraceCollectorEndpoint}}'
            CLIENT_AUTH_PEM=$(echo "{{inputs.parameters.clientAuthPemBase64}}" | base64 -d)

            PROXY_ONLY_CONFIG=$(echo "$BASE_CONFIG" | jq \
              --arg otelTraceCollectorEndpoint "$OTEL_TRACE_COLLECTOR_ENDPOINT" \
              --arg clientAuthPem "$CLIENT_AUTH_PEM" \
              '
              .sourceClusters |= with_entries(.value |= del(.snapshotInfo))
              | .snapshotMigrationConfigs = []
              | . + {
                "traffic": {
                  "kafkaClusters": {
                    "default": {
                      "autoCreate": {}
                    }
                  },
                  "proxies": {
                    "capture-proxy": {
                      "source": "source1",
                      "proxyConfig": ({
                        "listenPort": 9201,
                        "noCapture": false,
                        "podReplicas": 2,
                        "serviceType": "{{inputs.parameters.captureProxyServiceType}}"
                      } + (if $otelTraceCollectorEndpoint != "" then {
                        "otelTraceCollectorEndpoint": $otelTraceCollectorEndpoint
                      } else {} end)
                      + (if $clientAuthPem != "" then {
                        "tls": {
                          "mode": "certManager",
                          "issuerRef": {"name": "migrations-ca", "kind": "ClusterIssuer"},
                          "dnsNames": ["capture-proxy.ma.svc.cluster.local", "capture-proxy"],
                          "clientAuth": {"trustedClientCaPem": $clientAuthPem, "required": false}
                        }
                      } else {} end))
                    }
                  },
                  "replayers": {}
                }
              }')

            echo "CDC proxy-only overlay applied to migration config:"
            echo "$PROXY_ONLY_CONFIG" | jq .
            echo "$PROXY_ONLY_CONFIG" | base64 | tr -d '\n' > /tmp/migration-config-base64
      outputs:
        parameters:
          - name: migrationConfigBase64
            valueFrom:
              path: /tmp/migration-config-base64
