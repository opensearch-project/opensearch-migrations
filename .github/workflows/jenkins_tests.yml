    runs-on: ubuntu-22.04
    steps:
      - if: ${{ contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'failure') }}
        run: |
          echo "One or more job cancelled or failed" && exit 1
      - run: |
          echo '## :heavy_check_mark: All Jenkins checks pass' >> $GITHUB_STEP_SUMMARY
