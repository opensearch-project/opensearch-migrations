# Fork-only: build CLI for all targets and create a GitHub release.
# Trigger by pushing a tag like `cli-0.2.0-rc2`.
name: release-cli (fork)

on:
  push:
    tags:
      - 'cli-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.2.0-rc2)'
        required: true

permissions:
  contents: write

jobs:
  extract-version:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            raw="${GITHUB_REF#refs/tags/cli-}"
            echo "version=${raw}" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: extract-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04-arm
          - target: x86_64-apple-darwin
            runner: macos-15-intel
          - target: aarch64-apple-darwin
            runner: macos-15
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: |
          ./gradlew :deployment:k8s:aws:assemble \
            -PcliVersion=${{ needs.extract-version.outputs.version }} \
            -Ptarget=${{ matrix.target }} \
            --no-daemon
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: deployment/k8s/aws/build/dist/${{ needs.extract-version.outputs.version }}/migration-assistant-${{ matrix.target }}
          if-no-files-found: error
      - name: Upload shared (linux x86_64 only)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        uses: actions/upload-artifact@v4
        with:
          name: cli-shared
          path: |
            deployment/k8s/aws/build/dist/${{ needs.extract-version.outputs.version }}/migration-assistant-bundle.tar.gz
            deployment/k8s/aws/build/dist/${{ needs.extract-version.outputs.version }}/install.sh
            deployment/k8s/aws/build/dist/${{ needs.extract-version.outputs.version }}/VERSION.txt

  release:
    needs: [extract-version, build]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: cli-*
          merge-multiple: true
      - name: List artifacts
        run: ls -la artifacts/
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: cli-${{ needs.extract-version.outputs.version }}
          name: "migration-assistant CLI ${{ needs.extract-version.outputs.version }}"
          draft: false
          prerelease: true
          files: |
            artifacts/migration-assistant-x86_64-unknown-linux-gnu
            artifacts/migration-assistant-aarch64-unknown-linux-gnu
            artifacts/migration-assistant-x86_64-apple-darwin
            artifacts/migration-assistant-aarch64-apple-darwin
            artifacts/migration-assistant-bundle.tar.gz
            artifacts/install.sh
            artifacts/VERSION.txt
