# CI for the migration-tui Rust crate under tui/.
# Path-scoped: only runs when TUI files (or this workflow) change.
#
# Matrix structure mirrors release-drafter.yml's build-tui-binaries job
# so any cross-OS issue surfaces on PR rather than at release time.
#
# Native runners per target — no cross-compilation. Five jobs total:
# linux x86_64 + aarch64, macOS x86_64 (Intel) + aarch64 (M1), windows x86_64.
name: tui

on:
  push:
    branches: [main]
    paths:
      - 'tui/**'
      - '.github/workflows/tui.yml'
  pull_request:
    paths:
      - 'tui/**'
      - '.github/workflows/tui.yml'
  merge_group:

permissions:
  contents: read

jobs:
  check:
    name: tui:check (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            shell: bash
            bin_suffix: ''
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04-arm
            shell: bash
            bin_suffix: ''
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            shell: bash
            bin_suffix: ''
          - target: aarch64-apple-darwin
            runner: macos-15
            shell: bash
            bin_suffix: ''
          - target: x86_64-pc-windows-msvc
            runner: windows-2022
            shell: bash
            bin_suffix: '.exe'
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: ${{ matrix.shell }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Java 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'corretto'
          java-version: '21'
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b # master @ 2025-02-17
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
          components: clippy, rustfmt
      - name: Versions
        run: |
          rustc --version
          cargo --version
          cargo clippy --version
      - name: Run :tui:check (versionCheck + cargoTest + cargoClippy + fmt)
        run: |
          ./gradlew :tui:check -Ptarget=${{ matrix.target }} --no-daemon
      - name: Smoke-test release packaging
        # Validates that the release subproject assembles end-to-end against
        # a placeholder version. Catches gradle-side breakage before it
        # lands in release-drafter where the matrix runs for real.
        run: |
          ./gradlew :tui:release:assemble \
            -PtuiVersion=0.0.0-ci \
            -Ptarget=${{ matrix.target }} \
            --no-daemon
          DIST="tui/release/build/dist/0.0.0-ci"
          test -f "${DIST}/migration-tui-${{ matrix.target }}${{ matrix.bin_suffix }}"
          test -f "${DIST}/install.sh"
          test -f "${DIST}/install.ps1"
          test -f "${DIST}/VERSION.txt"
          test -f "${DIST}/migration-assistant-bundle.tar.gz"
      - name: Validate install.sh is well-formed POSIX sh (unix only)
        if: ${{ runner.os != 'Windows' }}
        run: |
          sh -n "tui/release/build/dist/0.0.0-ci/install.sh"
      - name: Smoke-test --version reads VERSION.txt at runtime
        # Validates the runtime resolution path that ships in the released
        # binary. cargo run from the source tree falls back to "0.0.0-dev";
        # placing VERSION.txt next to the binary should override that.
        run: |
          set -euo pipefail
          DIST="tui/release/build/dist/0.0.0-ci"
          BIN="${DIST}/migration-tui-${{ matrix.target }}${{ matrix.bin_suffix }}"
          out=$("${BIN}" --version)
          echo "got: $out"
          if [ "$out" != "migration-tui 0.0.0-ci" ]; then
            echo "::error::--version did not pick up sibling VERSION.txt"
            exit 1
          fi
