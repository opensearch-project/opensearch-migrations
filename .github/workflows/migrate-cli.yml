# CI for the migration-assistant CLI under deployment/k8s/aws/cli/.
# Path-scoped: only runs when CLI files (or this workflow) change.
name: migrate-cli

on:
  push:
    branches: [main]
    paths:
      - 'deployment/k8s/aws/cli/**'
      - 'deployment/k8s/aws/aws-bootstrap.sh'
      - 'deployment/k8s/aws/assemble-bootstrap.sh'
      - '.github/workflows/migrate-cli.yml'
  pull_request:
    paths:
      - 'deployment/k8s/aws/cli/**'
      - 'deployment/k8s/aws/aws-bootstrap.sh'
      - 'deployment/k8s/aws/assemble-bootstrap.sh'
      - '.github/workflows/migrate-cli.yml'
  merge_group:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update -y && sudo apt-get install -y shellcheck
      - name: Versions
        run: |
          shellcheck --version
          bash --version | head -1
      - name: Verify CLI files are checked in
        run: |
          # Catch the silent ignore-by-**/bin/ failure at lint time, not at
          # runtime where the error becomes "command not found".
          set -e
          for f in bin/migration-assistant install.sh lib/_common.sh; do
            full="deployment/k8s/aws/cli/$f"
            if [[ ! -f "$full" ]]; then
              echo "::error::missing required file in checkout: $full" >&2
              echo "  the repo-root .gitignore has \`**/bin/\`. The CLI's bin/ is" >&2
              echo "  source — re-include via \`git add -f\` or a cli-local" >&2
              echo "  .gitignore that re-includes it." >&2
              exit 1
            fi
          done
      - name: shellcheck
        working-directory: deployment/k8s/aws/cli
        run: |
          shellcheck -x -P lib \
            bin/migration-assistant \
            install.sh \
            lib/*.sh \
            test/helpers/stub.sh
      - name: shellcheck assemble + Jenkins script
        run: |
          shellcheck \
            deployment/k8s/aws/assemble-bootstrap.sh \
            test/awsRunEksValidation.sh

  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install jq + bats-core (pinned 1.13.0 from upstream)
        run: |
          # ubuntu-22.04 ships bats 1.2 from apt, which lacks
          # --print-output-on-failure (added in 1.5). Pull a pinned
          # release from upstream for predictable behavior.
          sudo apt-get update -y && sudo apt-get install -y jq
          curl -fsSL https://github.com/bats-core/bats-core/archive/refs/tags/v1.13.0.tar.gz \
            | tar -xz -C /tmp
          sudo /tmp/bats-core-1.13.0/install.sh /usr/local
      - name: Install uv (provides uvx for AWS MCP registration tests)
        run: |
          # The agent_setup tests call _agent_install_aws_mcp, which
          # requires uvx on PATH. Install uv via astral's official one-
          # liner so those tests don't fall through to the interactive
          # "install uv now?" prompt and silently disappear from the
          # bats output (the failure mode that hid tests 5/6/7).
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Versions
        run: |
          bats --version
          jq --version
          uvx --version
          bash --version | head -1
      - name: Verify CLI binary is executable
        run: |
          test -x deployment/k8s/aws/cli/bin/migration-assistant
          deployment/k8s/aws/cli/bin/migration-assistant version
      - name: bats (verbose, fail-fast on the first failing file)
        working-directory: deployment/k8s/aws/cli
        run: |
          # --print-output-on-failure: dumps each failed test's stdout/stderr
          # --show-output-of-passing-tests: surfaces the _diag dumps we emit
          #   from test_resume_flow.bats on assertion failures
          # tee + post-check: bats exits 0 on a "Executed N instead of M
          # tests" warning, but any gap means a test silently died (e.g.
          # via die/exit before reporting TAP). Treat that as a hard
          # failure so it never escapes CI undetected again.
          set -o pipefail
          bats --print-output-on-failure --show-output-of-passing-tests test/ \
            | tee /tmp/bats.tap
          if grep -q '^# bats warning: Executed' /tmp/bats.tap; then
            echo "::error::bats reported a test-count gap — at least one test died before emitting TAP output." >&2
            grep '^# bats warning' /tmp/bats.tap >&2
            exit 1
          fi

  smoke:
    runs-on: ubuntu-22.04
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get update -y && sudo apt-get install -y jq
      - name: migration-assistant version
        run: deployment/k8s/aws/cli/bin/migration-assistant version
      - name: migration-assistant help
        run: deployment/k8s/aws/cli/bin/migration-assistant help
      - name: assemble-bootstrap.sh produces dist artifacts
        run: |
          deployment/k8s/aws/assemble-bootstrap.sh --cli-version 0.0.0-ci
          test -f deployment/k8s/aws/dist/migration-assistant-cli-0.0.0-ci.tar.gz
          test -x deployment/k8s/aws/dist/aws-bootstrap.sh
          # Sanity: the curl-pipe shim is well-formed bash.
          bash -n deployment/k8s/aws/dist/aws-bootstrap.sh
