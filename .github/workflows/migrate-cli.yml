# CI for the migration-assistant CLI under deployment/k8s/aws/cli/.
# Path-scoped: only runs when CLI files (or this workflow) change.
name: migrate-cli

on:
  push:
    branches: [main]
    paths:
      - 'deployment/k8s/aws/cli/**'
      - 'deployment/k8s/aws/build.gradle'
      - '.github/workflows/migrate-cli.yml'
  pull_request:
    paths:
      - 'deployment/k8s/aws/cli/**'
      - 'deployment/k8s/aws/build.gradle'
      - '.github/workflows/migrate-cli.yml'
  merge_group:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update -y && sudo apt-get install -y shellcheck
      - name: Versions
        run: |
          shellcheck --version
          bash --version | head -1
      - name: Verify CLI files are checked in
        run: |
          # Catch the silent ignore-by-**/bin/ failure at lint time, not at
          # runtime where the error becomes "command not found".
          set -e
          for f in bin/migration-assistant install.sh lib/_common.sh; do
            full="deployment/k8s/aws/cli/$f"
            if [[ ! -f "$full" ]]; then
              echo "::error::missing required file in checkout: $full" >&2
              echo "  the repo-root .gitignore has \`**/bin/\`. The CLI's bin/ is" >&2
              echo "  source — re-include via \`git add -f\` or a cli-local" >&2
              echo "  .gitignore that re-includes it." >&2
              exit 1
            fi
          done
      - name: shellcheck
        working-directory: deployment/k8s/aws/cli
        run: |
          shellcheck -x -P lib \
            bin/migration-assistant \
            install.sh \
            lib/*.sh \
            test/helpers/stub.sh
      - name: shellcheck Jenkins helper script
        run: |
          shellcheck test/awsRunEksValidation.sh

  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install jq + bats-core (pinned 1.13.0 from upstream)
        run: |
          # ubuntu-22.04 ships bats 1.2 from apt, which lacks
          # --print-output-on-failure (added in 1.5). Pull a pinned
          # release from upstream for predictable behavior.
          sudo apt-get update -y && sudo apt-get install -y jq
          curl -fsSL https://github.com/bats-core/bats-core/archive/refs/tags/v1.13.0.tar.gz \
            | tar -xz -C /tmp
          sudo /tmp/bats-core-1.13.0/install.sh /usr/local
      - name: Install uv (provides uvx for AWS MCP registration tests)
        run: |
          # The agent_setup tests call _agent_install_aws_mcp, which
          # requires uvx on PATH. Install uv via astral's official one-
          # liner so those tests don't fall through to the interactive
          # "install uv now?" prompt and silently disappear from the
          # bats output (the failure mode that hid tests 5/6/7).
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Versions
        run: |
          bats --version
          jq --version
          uvx --version
          bash --version | head -1
      - name: Verify CLI binary is executable
        run: |
          test -x deployment/k8s/aws/cli/bin/migration-assistant
          deployment/k8s/aws/cli/bin/migration-assistant version
      - name: bats (verbose, fail-fast on the first failing file)
        working-directory: deployment/k8s/aws/cli
        run: |
          # The wrapper handles --print-output-on-failure +
          # post-mortem when bats reports a test-count gap (silent
          # not-run from a `[[ … ]] && fn` rc-leak in a sourced lib,
          # OR a test calling a deleted function). It exits 2 on
          # mismatch with a framed diagnostic block and a step-by-
          # step "find the culprit" guide pointing at per-file count
          # checks and a single-test ERR-trap recipe.
          ./test/run-bats.sh
      - name: Per-file test-count audit (only on failure)
        if: failure()
        working-directory: deployment/k8s/aws/cli
        run: |
          # When the bats step above fails with a count mismatch,
          # this step pinpoints the offending .bats file. Each file
          # is run individually and its declared count (--count) is
          # compared to the number of TAP `ok|not ok` lines actually
          # emitted. Any file with declared > actual = silent skip.
          echo "Per-file declared-vs-actual test count:"
          for f in test/*.bats; do
            declared=$(bats --count "$f" 2>/dev/null || echo "?")
            actual=$(bats --tap "$f" 2>&1 | grep -cE '^(ok|not ok) ' || true)
            if [[ "$declared" != "$actual" ]]; then
              echo "  ::error::$f declared=$declared actual=$actual (silent skip)"
            else
              echo "  $f declared=$declared actual=$actual"
            fi
          done

  smoke:
    runs-on: ubuntu-22.04
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-env
      - name: Install jq
        run: sudo apt-get update -y && sudo apt-get install -y jq
      - name: migration-assistant version
        run: deployment/k8s/aws/cli/bin/migration-assistant version
      - name: migration-assistant help
        run: deployment/k8s/aws/cli/bin/migration-assistant help
      - name: gradle packages CLI tarball + install.sh
        run: |
          ./gradlew :deployment:k8s:aws:packageMigrationAssistantCli \
            -PcliVersion=0.0.0-ci
          test -f deployment/k8s/aws/build/migrate-cli-dist/migration-assistant-cli-0.0.0-ci.tar.gz
          test -x deployment/k8s/aws/build/migrate-cli-dist/install.sh
          # Sanity: the rendered install.sh is well-formed bash.
          bash -n deployment/k8s/aws/build/migrate-cli-dist/install.sh
