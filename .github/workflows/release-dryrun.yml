name: Release dry-run

# Secret-free rehearsal of the release-drafter build path. Builds every release
# artifact (Maven, Docker images, Helm chart, CFN templates, bootstrap script,
# and the migration-companion image) against a job-local registry and uploads
# them as workflow artifacts. Nothing is published and no secrets are used, so
# this runs on any fork.
#
# Use it to catch release-build regressions before tagging — e.g. a companion
# Dockerfile that COPYs a context dir the staging task no longer produces would
# fail here instead of in the real release. Run it on your fork from the
# Actions tab ("Release dry-run" > "Run workflow") on the commit you intend to
# tag, and confirm it is green before pushing the release tag.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to simulate (e.g. 3.3.5)'
        required: true
        default: '0.0.0-dryrun'

env:
  java-version: '21'
  gradle-version: '8.12.1'

permissions:
  contents: read

jobs:
  release-dryrun:
    name: Build all release artifacts (dry-run)
    runs-on: ubuntu-22.04
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Alias docker-registry to 127.0.0.1
        run: |
          echo "127.0.0.1 docker-registry" | sudo tee -a /etc/hosts
          getent hosts docker-registry
          curl -sS http://docker-registry:5000/v2/ || true

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-env

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      - name: Set up Buildx builder (BuildKit)
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
        with:
          driver: docker-container
          buildkitd-flags: --debug
          name: local-remote-builder
          install: true
          driver-opts: network=host
          buildkitd-config-inline: |
            [registry."docker-registry:5000"]
              http = true
              insecure = true

      - name: Create source archive
        run: |
          git archive --format=tar.gz \
            -o opensearch-migrations-source.tar.gz \
            HEAD

      - name: Build Maven artifacts
        env:
          OS_MIGRATIONS_GRADLE_SCAN_TOS_AGREE_AND_ENABLED: ''
        run: |
          ./gradlew publishMavenJavaPublicationToMavenRepository \
            -Dbuild.snapshot=false \
            -Dbuild.version=0.${{ inputs.version }} \
          && tar -C build -cvf opensearch-migrations-build.tar.gz repository

      - name: Build Docker images to local registry
        env:
          OS_MIGRATIONS_GRADLE_SCAN_TOS_AGREE_AND_ENABLED: ''
        run: |
          ./gradlew :buildImages:buildImagesToRegistry \
            -Pbuilder=local-remote-builder \
            -PintermediateRegistry=localhost:5000 \
            -PregistryEndpoint=localhost:5000 \
            -PimageVersion=${{ inputs.version }} \
            -PpublishStyle='separateRepos' \
            -Dbuild.snapshot=false \
            -Dbuild.version=0.${{ inputs.version }} \
            --no-build-cache \
            --no-daemon \
            --no-continue \
            --info

      - name: Build minified CFN templates
        env:
          OS_MIGRATIONS_GRADLE_SCAN_TOS_AGREE_AND_ENABLED: ''
        run: |
          STACK_NAME_SUFFIX="" ./gradlew :deployment:migration-assistant-solution:cdkSynthMinified

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5

      - name: Package Helm chart
        run: |
          ./gradlew \
            :deployment:k8s:packageMigrationAssistantHelmChart \
            -PhelmChartVersion="${{ inputs.version }}"

      - name: Build Migration Companion image to local registry
        env:
          OS_MIGRATIONS_GRADLE_SCAN_TOS_AGREE_AND_ENABLED: ''
        run: |
          ./gradlew :deployment:k8s:migrationCompanion:buildMigrationCompanionImageToRegistry \
            -Pbuilder=local-remote-builder \
            -PregistryEndpoint=localhost:5000 \
            -PpublishStyle='separateRepos' \
            -PimageVersion=${{ inputs.version }} \
            --no-build-cache \
            --no-daemon \
            --no-continue \
            --info

      - name: Export Docker images as tarballs
        run: |
          mkdir -p docker-images
          # List all images in the local registry
          REPOS=$(curl -sS http://localhost:5000/v2/_catalog | jq -r '.repositories[]')
          for repo in $REPOS; do
            TAGS=$(curl -sS "http://localhost:5000/v2/${repo}/tags/list" | jq -r '.tags[]' 2>/dev/null || true)
            for tag in $TAGS; do
              safe_name=$(echo "${repo}_${tag}" | tr '/' '_')
              echo "Pulling localhost:5000/${repo}:${tag}"
              docker pull "localhost:5000/${repo}:${tag}" || true
              docker save "localhost:5000/${repo}:${tag}" | gzip > "docker-images/${safe_name}.tar.gz" || true
            done
          done
          ls -lh docker-images/ || echo "No images exported"

      - name: Assemble self-contained aws-bootstrap.sh
        run: |
          deployment/k8s/aws/assemble-bootstrap.sh

      - name: Upload source archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: source-archive
          path: opensearch-migrations-source.tar.gz

      - name: Upload Maven build archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: maven-build
          path: opensearch-migrations-build.tar.gz

      - name: Upload CFN templates
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: cfn-templates
          path: deployment/migration-assistant-solution/cdk.out-minified/*-eks.template.json

      - name: Upload Helm chart
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: helm-chart
          path: deployment/k8s/build/helm-package/migration-assistant-${{ inputs.version }}.tgz

      - name: Upload aws-bootstrap.sh
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: aws-bootstrap
          path: deployment/k8s/aws/dist/aws-bootstrap.sh

      - name: Upload Docker images
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: docker-images
          path: docker-images/*.tar.gz
          if-no-files-found: warn
