name: Release drafter

# Push events to every tag not containing "/"
on:
  push:
    tags:
      - "*"
  workflow_dispatch:

env:
  java-version: '21'
  gradle-version: '8.12.1'

permissions:
  id-token: write
  contents: write

jobs:
  approve-release:
    name: Approve release
    if: ${{ !github.event.act && github.repository == 'opensearch-project/opensearch-migrations' }}
    runs-on: ubuntu-22.04
    environment: release-approval
    steps:
      - run: echo "Release approved"

  extract-version:
    # Lifted out of draft-a-release so the matrix TUI build can consume
    # the version BEFORE draft-a-release runs. The job is trivial — it
    # just exposes the tag-derived version as an output.
    name: Extract release version
    needs: approve-release
    if: ${{ github.event.act || needs.approve-release.result == 'success' }}
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.get_data.outputs.version }}
    steps:
      - id: get_data
        run: |
          echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

  build-tui-binaries:
    # Native builds per architecture. Each matrix job builds the
    # migration-tui binary for its host arch via Gradle (Model C
    # injects -PtuiVersion at build time; the binary itself reads the
    # version from a sibling VERSION.txt at runtime, so the binary is
    # technically architecture-versioned only by file name).
    #
    # The aarch64 entry runs on `ubuntu-22.04-arm` for native builds
    # (no cross-compile linker complications). x86_64 stays on plain
    # ubuntu-22.04.
    name: Build migration-tui (${{ matrix.target }})
    needs: extract-version
    if: ${{ github.event.act || needs.extract-version.result == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-env
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b # 1.92.0 pinned
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
          components: clippy
      - name: Build TUI release artifacts
        env:
          OS_MIGRATIONS_GRADLE_SCAN_TOS_AGREE_AND_ENABLED: ''
        run: |
          ./gradlew :tui:release:assemble \
            -PtuiVersion=${{ needs.extract-version.outputs.version }} \
            -Ptarget=${{ matrix.target }} \
            --no-daemon
      - name: Stage per-target artifacts
        # The dist directory for ALL matrix runs has the same name
        # (the version), so we stage into a target-namespaced sub-dir
        # so download-artifact can merge cleanly downstream.
        # Shared artifacts (install.sh, VERSION.txt, bundle tarball)
        # are emitted by every matrix run identically; we upload them
        # ONLY from the x86_64 leg to avoid duplicate-file conflicts at
        # merge time.
        run: |
          set -euo pipefail
          DIST="tui/release/build/dist/${{ needs.extract-version.outputs.version }}"
          mkdir -p staged-bin staged-shared
          cp "${DIST}/migration-tui-${{ matrix.target }}" staged-bin/
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-gnu" ]; then
            cp "${DIST}/install.sh" "${DIST}/VERSION.txt" "${DIST}/migration-assistant-bundle.tar.gz" staged-shared/
          fi
      - name: Upload per-target binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: tui-bin-${{ matrix.target }}
          path: staged-bin/
          if-no-files-found: error
      - name: Upload shared TUI artifacts (x86_64 only)
        if: ${{ matrix.target == 'x86_64-unknown-linux-gnu' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: tui-shared
          path: staged-shared/
          if-no-files-found: error

  draft-a-release:
    name: Draft a release
    needs: [extract-version, build-tui-binaries]
    if: ${{ github.event.act || (needs.extract-version.result == 'success' && needs.build-tui-binaries.result == 'success') }}
    runs-on: ubuntu-22.04
    services:
      registry:
        image: registry:2 # Ephemeral registry for intermediate (base) images. Final ones only go to opensearchstaging.
        ports:
          - 5000:5000
    outputs:
      dockerhub-password: ${{ steps.retrieve-values.outputs.dockerhub-password }}
    steps:
      - name: Alias docker-registry to 127.0.0.1
        run: |
          echo "127.0.0.1 docker-registry" | sudo tee -a /etc/hosts
          getent hosts docker-registry
          curl -sS http://docker-registry:5000/v2/ || true
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-env
      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4
      - name: Set up Buildx builder (BuildKit)
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
        with:
          driver: docker-container
          # Keep debug on while we troubleshoot this new registry setup
          buildkitd-flags: --debug
          # This has to match the -Pbuilder flag for buildImages/build.gradle
          name: local-remote-builder
          install: true
          # ALLOW ACCESS TO HOST NETWORK (Required to see localhost:5000 for docker registry)
          driver-opts: network=host
          # CONFIGURE INSECURE REGISTRY (Required for HTTP for docker registry)
          buildkitd-config-inline: |
            [registry."docker-registry:5000"]
              http = true
              insecure = true
      - name: Create source archive
        run: |
          git archive --format=tar.gz \
            -o opensearch-migrations-source.tar.gz \
            HEAD
      - name: Create agent-skills archive
        run: |
          ./gradlew :agent-skills:agentSkillsTar
      - name: Build and Publish to Maven
        if: ${{ !github.event.act }}
        env:
          OS_MIGRATIONS_GRADLE_SCAN_TOS_AGREE_AND_ENABLED: ''
        run: |
          ./gradlew publishMavenJavaPublicationToMavenRepository -Dbuild.snapshot=false -Dbuild.version=0.${{ needs.extract-version.outputs.version }} && tar -C build -cvf opensearch-migrations-build.tar.gz repository
      - name: Configure AWS Credentials
        if: ${{ !github.event.act }}
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: ${{ secrets.MIGRATIONS_DOCKER_ROLE }}
          aws-region: us-east-1
      - name: Retrieve Values
        if: ${{ !github.event.act }}
        id: retrieve-values
        run: |
          DOCKERHUB_PASSWORD=`aws secretsmanager get-secret-value --secret-id jenkins-staging-dockerhub-credential --query SecretString --output text`
          echo "::add-mask::$DOCKERHUB_PASSWORD"
          echo "dockerhub-password=$DOCKERHUB_PASSWORD" >> $GITHUB_OUTPUT
      - name: Login to DockerHub
        if: ${{ !github.event.act }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          username: ${{ secrets.MIGRATIONS_DOCKER_USERNAME }}
          password: ${{ steps.retrieve-values.outputs.dockerhub-password }}
      - name: Build and Push Docker Images
        env:
          OS_MIGRATIONS_GRADLE_SCAN_TOS_AGREE_AND_ENABLED: ''
        run: |
          # Preface Traffic Capture version with 0. to signal interface immaturity
          ./gradlew :buildImages:buildImagesToRegistry \
            -Pbuilder=local-remote-builder \
            -PintermediateRegistry=localhost:5000 \
            -PregistryEndpoint=opensearchstaging \
            -PimageVersion=${{ needs.extract-version.outputs.version }} \
            -PpublishStyle='separateRepos' \
            -Dbuild.snapshot=false \
            -Dbuild.version=0.${{ needs.extract-version.outputs.version }} \
            --no-build-cache \
            --no-daemon \
            --no-continue \
            --info
      - name: Logout to DockerHub
        if: always()
        run: docker logout
      - name: Build minified CFN templates for GitHub release
        env:
          OS_MIGRATIONS_GRADLE_SCAN_TOS_AGREE_AND_ENABLED: ''
        run: |
          STACK_NAME_SUFFIX="" ./gradlew :deployment:migration-assistant-solution:cdkSynthMinified
      - name: Pull images from DockerHub for SBOM scanning
        if: ${{ !github.event.act }}
        run: |
          # Pull images that were just pushed to DockerHub
          docker pull opensearchstaging/opensearch-migrations-console:${{ needs.extract-version.outputs.version }}
          docker pull opensearchstaging/opensearch-migrations-traffic-replayer:${{ needs.extract-version.outputs.version }}
          docker pull opensearchstaging/opensearch-migrations-traffic-capture-proxy:${{ needs.extract-version.outputs.version }}
          docker pull opensearchstaging/opensearch-migrations-reindex-from-snapshot:${{ needs.extract-version.outputs.version }}
          docker pull opensearchstaging/opensearch-migrations-transformation-shim:${{ needs.extract-version.outputs.version }}
          # Tag them with the expected names for SBOM scanning
          docker tag opensearchstaging/opensearch-migrations-console:${{ needs.extract-version.outputs.version }} migrations/migration_console:latest
          docker tag opensearchstaging/opensearch-migrations-traffic-replayer:${{ needs.extract-version.outputs.version }} migrations/traffic_replayer:latest
          docker tag opensearchstaging/opensearch-migrations-traffic-capture-proxy:${{ needs.extract-version.outputs.version }} migrations/capture_proxy:latest
          docker tag opensearchstaging/opensearch-migrations-reindex-from-snapshot:${{ needs.extract-version.outputs.version }} migrations/reindex_from_snapshot:latest
          docker tag opensearchstaging/opensearch-migrations-transformation-shim:${{ needs.extract-version.outputs.version }} migrations/transformation_shim:latest
      - name: Generate SBOM for migration_console
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: migrations/migration_console:latest
          output-file: opensearch-migrations-console-sbom.spdx.json
      - name: Generate SBOM for traffic_replayer
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: migrations/traffic_replayer:latest
          output-file: opensearch-migrations-traffic-replayer-sbom.spdx.json
      - name: Generate SBOM for capture_proxy
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: migrations/capture_proxy:latest
          output-file: opensearch-migrations-traffic-capture-proxy-sbom.spdx.json
      - name: Generate SBOM for reindex_from_snapshot
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: migrations/reindex_from_snapshot:latest
          output-file: opensearch-migrations-reindex-from-snapshot-sbom.spdx.json
      - name: Generate SBOM for transformation_shim
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: migrations/transformation_shim:latest
          output-file: opensearch-migrations-transformation-shim-sbom.spdx.json
      - name: Generate SBOM for artifacts
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          file: opensearch-migrations-source.tar.gz
          output-file: opensearch-migrations-source-sbom.spdx.json
      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        # Uses latest Helm version by default
      - name: Package Helm chart
        run: |
          helm package deployment/k8s/charts/aggregates/migrationAssistantWithArgo \
            --version ${{ needs.extract-version.outputs.version }} \
            --app-version ${{ needs.extract-version.outputs.version }}
      - name: Set up Kind cluster for schema verification
        if: ${{ !github.event.act }}
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: release-schema-verification
          node_image: kindest/node:v1.35.0
      - name: Deploy Helm chart and copy generated workflow schema
        if: ${{ !github.event.act }}
        run: |
          chmod +x ./deployment/k8s/generateWorkflowSchemaArtifact.sh
          KUBE_CONTEXT=kind-release-schema-verification \
          IMAGE_REPOSITORY_PREFIX=opensearchstaging \
          IMAGE_TAG=${{ needs.extract-version.outputs.version }} \
          OUTPUT_PATH="${PWD}/workflowMigration.schema.json" \
          ./deployment/k8s/generateWorkflowSchemaArtifact.sh
      - name: Generate Solutions Artifact
        run: |
          ./deployment/migration-assistant-solution/package-artifacts.sh
      - name: Upload unified schema artifact
        if: ${{ !github.event.act }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: workflowMigration-schema-${{ needs.extract-version.outputs.version }}
          path: workflowMigration.schema.json
      - name: Dump schema verification diagnostics
        if: ${{ failure() && !github.event.act }}
        run: |
          kubectl --context kind-release-schema-verification get pods -A
          kubectl --context kind-release-schema-verification -n ma describe statefulset migration-console || true
          kubectl --context kind-release-schema-verification -n ma describe pod migration-console-0 || true
          kubectl --context kind-release-schema-verification -n ma logs migration-console-0 -c workflow-schema-generator || true
          kubectl --context kind-release-schema-verification -n ma logs migration-console-0 -c console || true
      - name: Configure AWS Credentials for Solutions Credentials
        if: ${{ !github.event.act }}
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: ${{ secrets.SOLUTIONS_CREDENTIALS_ROLE }}
          aws-region: us-east-1
      - name: Assume second role for Solutions Upload
        if: ${{ !github.event.act }}
        run: |
          CREDS=$(aws sts assume-role --role-arn ${{ secrets.SOLUTIONS_UPLOAD_ROLE }} --role-session-name github-actions)
          echo "AWS_ACCESS_KEY_ID=$(echo $CREDS | jq -r '.Credentials.AccessKeyId')" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=$(echo $CREDS | jq -r '.Credentials.SecretAccessKey')" >> $GITHUB_ENV
          echo "AWS_SESSION_TOKEN=$(echo $CREDS | jq -r '.Credentials.SessionToken')" >> $GITHUB_ENV
      - name: Upload Solutions Artifact to S3
        if: ${{ !github.event.act }}
        run: |
          aws s3 cp deployment/migration-assistant-solution/build/artifact.zip \
            s3://cornerstone-amazonaws/SO0290/${{ needs.extract-version.outputs.version }}/${{ github.sha }}/artifact.zip \
            --content-type application/zip \
            --metadata branch=${{ github.ref_name }},\
          commitauthor="$(git log -1 --format='%an' | sed 's/"//g')",\
          commitid=${{ github.sha }},\
          commitmessage="Release opensearch-migrations version ${{ needs.extract-version.outputs.version }}",\
          committimestamp=$(git log -1 --format='%cI'),\
          enablequicksight=No,\
          package=https://github.com/${{ github.repository }},\
          publishpublicecrimage=false,\
          solutionid=SO0290,\
          solutionname="migration-assistant-for-amazon-opensearch-service",\
          solutionversion=${{ needs.extract-version.outputs.version }}
      - name: Assemble self-contained aws-bootstrap.sh
        # Production deploy artifact. assemble-bootstrap.sh inlines every
        # sourced helper into deployment/k8s/aws/dist/aws-bootstrap.sh.
        # This is the file operators run via curl-pipe today.
        run: |
          deployment/k8s/aws/assemble-bootstrap.sh
      - name: Assemble migration-assistant CLI artifacts (preview)
        # Preview deploy artifact — the new TUI CLI. Ships alongside the
        # bootstrap so operators can opt in via curl install.sh, but the
        # production deploy path remains aws-bootstrap.sh until the TUI
        # bakes through a few releases. Jenkins runs the TUI by default
        # on source builds (vars/resolveBootstrap.groovy) for coverage.
        run: |
          ./gradlew :deployment:k8s:aws:packageMigrationAssistantCli \
            -PcliVersion="${{ needs.extract-version.outputs.version }}"
      - name: Download Rust TUI artifacts (built in matrix)
        # Pulls all tui-bin-<target>/ + tui-shared/ artifacts produced by
        # the build-tui-binaries matrix. merge-multiple flattens them
        # into a single directory so the release `files:` block can
        # glob them.
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          path: tui-release-artifacts
          pattern: tui-*
          merge-multiple: true
      - name: Stage Rust TUI artifacts with versioned filenames
        # Rename install.sh/VERSION.txt to disambiguate from the Bash
        # CLI artifacts that share the same basenames in the existing
        # release. Binaries are already arch-suffixed so they ship as-is.
        run: |
          set -euo pipefail
          mv tui-release-artifacts/install.sh           tui-release-artifacts/migration-tui-install.sh
          mv tui-release-artifacts/VERSION.txt          tui-release-artifacts/migration-tui-VERSION.txt
          mv tui-release-artifacts/migration-assistant-bundle.tar.gz \
             tui-release-artifacts/migration-tui-bundle-${{ needs.extract-version.outputs.version }}.tar.gz
          ls -la tui-release-artifacts/
      - name: Draft a release
        if: ${{ !github.event.act }}
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          draft: true
          generate_release_notes: true
          files: |
            deployment/migration-assistant-solution/cdk.out-minified/*-eks.template.json
            opensearch-migrations-source.tar.gz
            opensearch-migrations-build.tar.gz
            agent-skills/build/agent-skills.tar.gz
            bootstrap-kiro-agent.sh
            migration-assistant-${{ needs.extract-version.outputs.version }}.tgz
            workflowMigration.schema.json
            deployment/k8s/aws/dist/aws-bootstrap.sh
            deployment/k8s/aws/build/migrate-cli-dist/install.sh
            deployment/k8s/aws/build/migrate-cli-dist/migration-assistant-cli-${{ needs.extract-version.outputs.version }}.tar.gz
            tui-release-artifacts/migration-tui-x86_64-unknown-linux-gnu
            tui-release-artifacts/migration-tui-aarch64-unknown-linux-gnu
            tui-release-artifacts/migration-tui-install.sh
            tui-release-artifacts/migration-tui-VERSION.txt
            tui-release-artifacts/migration-tui-bundle-${{ needs.extract-version.outputs.version }}.tar.gz
            **/*.spdx.json
