version: 2

# Grouping notes:
#   * Each ecosystem has TWO groups:
#       - a "*-version" group (applies-to: version-updates, the default) that
#         batches the scheduled weekly bumps into a single PR.
#       - a "*-security" group (applies-to: security-updates) that batches
#         Dependabot security alerts into a single PR. WITHOUT this, security
#         updates ignore groups entirely and open one PR per advisory.
#   * Multiple manifests of the same ecosystem are folded into one update entry
#     via `directories:` (plural) so a single config covers every lockfile.

updates:
  - package-ecosystem: "npm"
    directories:
      - "/deployment/migration-assistant-solution"
      - "/deployment/cdk/opensearch-service-migration"
      - "/orchestrationSpecs"
      - "/transformation/standardJavascriptTransforms"
      - "/TrafficCapture/SolrTransformations/transforms"
      - "/schema-viewer"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    groups:
      npm-version:
        applies-to: version-updates
        patterns:
          - "*"
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"
    ignore:
      - dependency-name: "eslint"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "@eslint/*"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "@types/eslint__js"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "typescript"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "typescript-eslint"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    groups:
      gradle-version:
        applies-to: version-updates
        patterns:
          - "*"
      gradle-security:
        applies-to: security-updates
        patterns:
          - "*"
    ignore:
      - dependency-name: "com.avast.gradle.docker-compose"
      - dependency-name: "io.netty:*"
      - dependency-name: "io.projectreactor.netty:*" # reactor-netty 1.3+ requires Netty 4.2
      - dependency-name: "io.projectreactor:reactor-test" # reactor-test 3.8+ requires Netty 4.2
      - dependency-name: "io.opentelemetry.semconv:*"
      - dependency-name: "org.apache.commons:commons-compress"
      - dependency-name: "org.apache.lucene:*"
      - dependency-name: "org.gradle.toolchains.foojay-resolver-convention"
      - dependency-name: "org.jcommander:jcommander"
      - dependency-name: "org.opensearch:*"
      - dependency-name: "org.opensearch.plugin:opensearch-security" # Version is derived from openSearch base version in build.gradle
      - dependency-name: "org.opensearch.plugin:*"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
      - dependency-name: "errorprone"
      - dependency-name: "org.junit:junit-bom"
      - dependency-name: "org.junit.platform:*"
      - dependency-name: "org.junit.jupiter:*"
      # GraalVM 25.1.x currently breaks the GraalPy venv tests on CI's Java 21 runtime.
      - dependency-name: "org.graalvm.polyglot:*"
        versions:
          - "[25.0.4,)"
      - dependency-name: "org.graalvm.python:python-embedding"
        versions:
          - "[25.0.4,)"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    groups:
      github-actions-version:
        applies-to: version-updates
        patterns:
          - "*"
      github-actions-security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directories:
      - "/migrationConsole/lib/console_link"
      - "/migrationConsole/cluster_tools"
      - "/migrationConsole/lib/integ_test"
      - "/libraries/testAutomation"
      - "/test/cleanupDeployment"
      - "/TrafficCapture/dockerSolution/src/main/docker/elasticsearchTestConsole"
      - "/solrMigrationDevSandbox"
      - "/transformation/transformationPlugins/jsonMessageTransformers/jsonPythonTransformerProvider/custom_transform"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    groups:
      pip-version:
        applies-to: version-updates
        patterns:
          - "*"
      pip-security:
        applies-to: security-updates
        patterns:
          - "*"
