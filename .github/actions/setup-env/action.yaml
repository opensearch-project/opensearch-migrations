name: Setup CI Environment
description: Sets up all required runtimes and environment versions
inputs:
  gradle-cache-enabled:
    description: 'Enable Gradle cache restore'
    required: false
    default: 'false'
  gradle-cache-read-only:
    description: 'Gradle cache read-only mode (no save)'
    required: false
    default: 'true'
runs:
  using: "composite"
  steps:
    - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
      with:
        java-version: 21
        distribution: "corretto"

    - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
      with:
        cache-disabled: ${{ inputs.gradle-cache-enabled != 'true' }}
        cache-read-only: ${{ inputs.gradle-cache-read-only }}

    - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: 3.11

    - name: Install pipenv globally
      run: |
        python3 -m pip install pipenv==2026.5.0
      shell: bash

    - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: 22.x

    - name: Aggressive disk cleanup
      shell: bash
      run: |
        # Remove .NET SDKs
        sudo rm -rf /usr/share/dotnet || true

        # Remove Swift toolchain
        sudo rm -rf /usr/share/swift || true

        # Remove Haskell (GHC)
        sudo rm -rf /usr/local/.ghcup || true

        # Remove Julia
        sudo rm -rf /usr/local/julia* || true

        # Remove Android SDKs
        sudo rm -rf /usr/local/lib/android || true

        # Remove Chromium (optional if not using for browser tests)
        sudo rm -rf /usr/local/share/chromium || true

        # Remove Microsoft/Edge and Google Chrome builds
        sudo rm -rf /opt/microsoft /opt/google || true

        # Remove Azure CLI
        sudo rm -rf /opt/az || true

        # Remove PowerShell
        sudo rm -rf /usr/local/share/powershell || true