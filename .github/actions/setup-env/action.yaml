name: Setup CI Environment
description: Sets up all required runtimes and environment versions
inputs:
  gradle-cache-enabled:
    description: 'Enable Gradle cache restore'
    required: false
    default: 'false'
  gradle-cache-read-only:
    description: 'Gradle cache read-only mode (no save)'
    required: false
    default: 'true'
runs:
  using: "composite"
  steps:
    - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: 21
        distribution: "corretto"

    - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
      with:
        cache-disabled: ${{ inputs.gradle-cache-enabled != 'true' }}
        cache-read-only: ${{ inputs.gradle-cache-read-only }}

    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: 3.11

    - name: Install pipenv globally
      run: |
        python3 -m pip install pipenv==2026.5.0
      shell: bash

    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 22.x

    - name: Aggressive disk cleanup
      shell: bash
      run: |
        # Remove .NET SDKs
        sudo rm -rf /usr/share/dotnet || true

        # Remove Swift toolchain
        sudo rm -rf /usr/share/swift || true

        # Remove Haskell (GHC)
        sudo rm -rf /usr/local/.ghcup || true

        # Remove Julia
        sudo rm -rf /usr/local/julia* || true

        # Remove Android SDKs
        sudo rm -rf /usr/local/lib/android || true

        # Remove Chromium (optional if not using for browser tests)
        sudo rm -rf /usr/local/share/chromium || true

        # Remove Microsoft/Edge and Google Chrome builds
        sudo rm -rf /opt/microsoft /opt/google || true

        # Remove Azure CLI
        sudo rm -rf /opt/az || true

        # Remove PowerShell
        sudo rm -rf /usr/local/share/powershell || true