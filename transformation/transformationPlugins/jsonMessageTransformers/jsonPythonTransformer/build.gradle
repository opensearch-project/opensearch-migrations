plugins {
    id 'org.opensearch.migrations.java-library-conventions'
    id 'io.freefair.lombok'
    id 'org.graalvm.python' version '25.0.2'
}

graalPy {
    packages = ["pydantic"]
}

dependencies {
    implementation project(':transformation:transformationPlugins:jsonMessageTransformers:jsonMessageTransformerInterface')

    implementation libs.slf4j.api

    implementation libs.jackson.databind
    implementation libs.jackson.core
    implementation libs.polyglot
    implementation libs.polyglot.python.community
    implementation libs.python.embedding

    testImplementation libs.junit.jupiter.api
    testImplementation libs.junit.jupiter.params
    testRuntimeOnly libs.junit.jupiter.engine
}
