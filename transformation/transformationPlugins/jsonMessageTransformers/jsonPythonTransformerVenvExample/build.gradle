plugins {
    id 'org.opensearch.migrations.java-library-conventions'
    id 'io.freefair.lombok'
    id 'org.graalvm.python' version '25.0.2'
}

// The graalPy plugin provides the graalpy.sh launcher — no packages bundled at build time.
// We use the launcher to create a venv and pip install, exactly as a customer would.
graalPy {
    packages = []
}

def graalPyLauncher = layout.buildDirectory.file("python-launcher/graalpy.sh").get().asFile
def venvDir = layout.buildDirectory.dir("pydantic-venv/venv").get().asFile
def venvTarball = layout.buildDirectory.file("pydantic-venv.tar.gz").get().asFile
def venvParent = layout.buildDirectory.dir("pydantic-venv").get().asFile
def customTransformDir = project(':transformation:transformationPlugins:jsonMessageTransformers:jsonPythonTransformerProvider')
    .file('custom_transform')

// Step 1: graalpy -m venv (exactly as a customer would)
tasks.register('createGraalPyVenv', Exec) {
    dependsOn classes  // ensures graalpy.sh launcher is generated
    commandLine 'bash', graalPyLauncher.absolutePath, '-m', 'venv', venvDir.absolutePath
    outputs.dir venvDir
    onlyIf { !venvDir.exists() }
}

// Step 2: pip install pydantic and the custom_transform package (exactly as a customer would)
tasks.register('pipInstallPydantic', Exec) {
    dependsOn createGraalPyVenv
    commandLine "${venvDir}/bin/pip", 'install', 'pydantic', customTransformDir.absolutePath
    outputs.file "${venvDir}/lib/python3.12/site-packages/pydantic/__init__.py"
    onlyIf { !file("${venvDir}/lib/python3.12/site-packages/pydantic/__init__.py").exists() }
}

// Step 3: tar czf venv.tar.gz (exactly as a customer would ship it)
tasks.register('packageVenvTarball', Exec) {
    dependsOn pipInstallPydantic
    workingDir layout.buildDirectory
    commandLine 'tar', 'czf', venvTarball.absolutePath, '-C', layout.buildDirectory.get().asFile.absolutePath, venvParent.name
    outputs.file venvTarball
    onlyIf { !venvTarball.exists() || venvDir.lastModified() > venvTarball.lastModified() }
}

test {
    dependsOn packageVenvTarball
    // Pass paths to tests so they can reference the tarball and script
    systemProperty 'pydantic.venv.tarball', venvTarball.absolutePath
    systemProperty 'custom.transform.dir', customTransformDir.absolutePath
}

dependencies {
    implementation project(':transformation:transformationPlugins:jsonMessageTransformers:jsonPythonTransformer')
    implementation project(':transformation:transformationPlugins:jsonMessageTransformers:jsonPythonTransformerProvider')
    implementation project(':transformation:transformationPlugins:jsonMessageTransformers:jsonGraalTransformerBase')

    implementation libs.polyglot.python.community
    implementation libs.python.embedding

    testImplementation libs.junit.jupiter.api
    testImplementation libs.hamcrest
    testRuntimeOnly libs.junit.jupiter.engine
}
