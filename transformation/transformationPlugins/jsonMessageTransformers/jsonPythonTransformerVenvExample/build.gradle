plugins {
    id 'org.opensearch.migrations.java-library-conventions'
    id 'io.freefair.lombok'
    id 'org.graalvm.python' version '25.0.2'
}

graalPy {
    packages = ["pydantic"]
}

test {
    // Allow merging VFS from jsonPythonTransformer (empty) and this project (pydantic)
    jvmArgs '-Dorg.graalvm.python.vfs.allow_multiple=true'
}

dependencies {
    implementation project(':transformation:transformationPlugins:jsonMessageTransformers:jsonPythonTransformer')
    implementation project(':transformation:transformationPlugins:jsonMessageTransformers:jsonPythonTransformerProvider')
    implementation project(':transformation:transformationPlugins:jsonMessageTransformers:jsonGraalTransformerBase')

    implementation libs.polyglot.python.community
    implementation libs.python.embedding

    testImplementation libs.junit.jupiter.api
    testImplementation libs.junit.jupiter.params
    testImplementation libs.hamcrest
    testRuntimeOnly libs.junit.jupiter.engine
}
