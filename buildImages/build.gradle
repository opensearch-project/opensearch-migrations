import org.opensearch.migrations.image.RegistryImageBuildUtils
import org.opensearch.migrations.image.RegistryImageBuildUtils.Registry
import org.opensearch.migrations.image.PullThroughCacheHelper

def publishedUrl = rootProject.findProperty('registryEndpoint') ?: 'localhost:5001'
def intermediateUrl = rootProject.findProperty('intermediateRegistry') ?: publishedUrl

def publishedRegistry = new Registry(publishedUrl.toString())
def intermediateRegistry = new Registry(intermediateUrl.toString())

// ECR pull-through cache: auto-derived from ECR_PULL_THROUGH_ENDPOINT env var in root build.gradle.
// Can be overridden with: ./gradlew buildImagesToRegistry -PpullThroughCacheEndpoint=123456789.dkr.ecr.us-east-1.amazonaws.com
def ptcEndpoint = rootProject.findProperty('pullThroughCacheEndpoint')?.toString() ?: ''
def ptc = new PullThroughCacheHelper(ptcEndpoint)

def publishStyle = (rootProject.findProperty("publishStyle") ?: "paths").toString()
def publishedRepoByImageName = [
        migration_console     : "opensearch-migrations-console",
        traffic_replayer      : "opensearch-migrations-traffic-replayer",
        capture_proxy         : "opensearch-migrations-traffic-capture-proxy",
        reindex_from_snapshot : "opensearch-migrations-reindex-from-snapshot",
        transformation_shim   : "opensearch-migrations-transformation-shim",
]

def getRepoNameIfPublishing = { Map cfg ->
    if (publishStyle != 'separateRepos') return null
    def imageName = cfg.get('imageName')?.toString()
    if (!imageName) return null
    return publishedRepoByImageName[imageName]
}

def correttoBase = ptc.baseImageConfig("docker.io", "library", "amazoncorretto", "21-al2023-headless")

def defaultJvmFlags = ['-XX:MaxRAMPercentage=80.0', '-XX:+ExitOnOutOfMemoryError']

def jibProjects = [
        "TrafficCapture:trafficReplayer": correttoBase + [
                imageName     : "traffic_replayer",
                imageTag      : "latest",
                jvmFlags      : defaultJvmFlags,
                extraPermissions: ['/runJavaWithClasspath.sh': '755'],
                requiredDependencies: [
                    ":TrafficCapture:trafficReplayer": ["syncVersionFile_traffic_replayer"]
                ]
        ],
        "TrafficCapture:transformationShim": correttoBase + [
                imageName     : "transformation_shim",
                imageTag      : "latest",
                requiredDependencies: [
                    ":TrafficCapture:transformationShim": ["syncVersionFile_transformation_shim"]
                ]
        ],
        "TrafficCapture:trafficCaptureProxyServer": correttoBase + [
                // purposefully omit '-Dio.netty.handler.codec.http.defaultStrictLineParsing=false'
                imageName      : "capture_proxy",
                imageTag       : "latest",
                jvmFlags      : defaultJvmFlags,
                extraPermissions: ['/runJavaWithClasspath.sh': '755'],
                requiredDependencies: [
                    ":TrafficCapture:trafficCaptureProxyServer": ["generateSelfSignedCerts", "syncVersionFile_capture_proxy"]
                ]
        ]
]
jibProjects.values().each { cfg ->
    cfg.repoName = getRepoNameIfPublishing(cfg)
}

