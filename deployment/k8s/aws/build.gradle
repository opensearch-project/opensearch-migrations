plugins {
    id 'base'
}

// =============================================================================
// deployment/k8s/aws/build.gradle
//
// The migration-assistant CLI is written in Amber (amber-lang.com) — typed
// source that COMPILES to portable Bash. Source of truth: cli/src/*.ab (+
// cli/test/*.ab). This build compiles the Amber entrypoint to a single
// self-contained Bash script and packages a release tarball + a curl-pipe
// install.sh keyed to the same release.
//
//   build/migrate-cli-dist/migration-assistant-cli-<version>.tar.gz
//   build/migrate-cli-dist/install.sh
//
// Why compile here: Amber's `amber build --target bash-3.2` inlines every
// imported module into ONE standalone Bash script (no runtime `source` of a
// lib/ tree, no Amber dependency on the operator's host). The tarball therefore
// ships bin/migration-assistant (the compiled entrypoint) + install.sh +
// skills/ — there is no lib/ directory (it's inlined). Operators and CI run
// plain Bash 3.2+; the Amber toolchain is a BUILD-time dependency only.
//
// Operators install via:
//   curl -fsSL https://github.com/<owner>/<repo>/releases/<ver>/download/install.sh | bash
//
// `assemble` depends on packageMigrationAssistantCli.
// =============================================================================

configurations {
    agentSkills {
        canBeConsumed = false
        canBeResolved = true
    }
}

dependencies {
    // Pull in agent-skills.tar.gz from the agent-skills module's declared
    // producer artifact. A change to any skill file (Startup.md, manifest.json,
    // any skills/<name>/SKILL.md, the kiro config) triggers a CLI-tarball
    // rebuild — no copy-by-hand drift. Partner packs add skills the same way.
    agentSkills project(path: ':agent-skills', configuration: 'agentSkills')
}

def cliVersion = providers.environmentVariable('CLI_VERSION')
        .orElse(providers.gradleProperty('cliVersion'))
        .orElse(provider {
            // Fall back to "0.0.0-dev-<git-short-sha>" so each commit gets its
            // own cache slot.
            def execResult = providers.exec {
                workingDir = rootDir
                commandLine 'git', 'rev-parse', '--short=10', 'HEAD'
                setIgnoreExitValue(true)
            }
            def rc = execResult.result.get().exitValue
            def sha = rc == 0 ? execResult.standardOutput.asText.get().trim() : ''
            sha ? "0.0.0-dev-${sha}" : '0.0.0-dev'
        })

def defaultRepo = providers.environmentVariable('DEFAULT_REPO')
        .orElse(providers.gradleProperty('defaultRepo'))
        .orElse('opensearch-project/opensearch-migrations')

// Amber compiler binary. Default 'amber' (on PATH); override with -Pamber=… or
// AMBER=… for pinned-toolchain CI. bash-3.2 target = the macOS / minimal-distro
// floor the CLI supports.
def amberBin = providers.environmentVariable('AMBER')
        .orElse(providers.gradleProperty('amber'))
        .orElse('amber')
def amberTarget = 'bash-3.2'

def distDir   = layout.buildDirectory.dir('migrate-cli-dist')
def compileDir = layout.buildDirectory.dir('migrate-cli-compiled')

// ---------- (0) compile Amber → Bash ----------
//
// src/main.ab     → bin/migration-assistant   (the self-contained entrypoint)
// src/install.ab  → install.sh                (the curl-pipe installer)
// Both are standalone compiled scripts; their imported modules are inlined.

tasks.register('compileMigrationAssistantCli') {
    description = 'Compile the Amber CLI sources to portable Bash (target ' + amberTarget + ')'
    group = 'migrate-cli'

    def srcDir = file('cli/src')
    def outDir = compileDir.get().asFile

    inputs.dir srcDir
    inputs.property 'amberTarget', amberTarget
    inputs.property 'amberBin', amberBin
    outputs.dir compileDir

    doLast {
        def amber = amberBin.get()
        // Fail early + actionably if the toolchain is missing.
        def probe = project.exec {
            commandLine amber, '--version'
            setIgnoreExitValue(true)
            standardOutput = new ByteArrayOutputStream()
            errorOutput = new ByteArrayOutputStream()
        }
        if (probe.exitValue != 0) {
            throw new GradleException(
                "Amber compiler not found (tried '${amber}'). Install it:\n" +
                "  brew install amber-lang/amber/amber-lang\n" +
                "  # or: bash <(curl -sL https://github.com/amber-lang/amber/releases/download/0.6.0-alpha/install.sh)\n" +
                "Then re-run, or pass -Pamber=/path/to/amber.")
        }

        outDir.mkdirs()
        def binOut = new File(outDir, 'migration-assistant')
        def installOut = new File(outDir, 'install.sh')

        // Entrypoint.
        project.exec {
            workingDir file('cli')
            commandLine amber, 'build', '--target', amberTarget, 'src/main.ab', binOut.absolutePath
        }
        // Installer.
        project.exec {
            workingDir file('cli')
            commandLine amber, 'build', '--target', amberTarget, 'src/install.ab', installOut.absolutePath
        }
        binOut.setExecutable(true)
        installOut.setExecutable(true)
        logger.lifecycle "compiled cli/src/main.ab → ${binOut}"
        logger.lifecycle "compiled cli/src/install.ab → ${installOut}"
    }
}

// ---------- (1) CLI tarball ----------

tasks.register('packageMigrationAssistantCliTarball') {
    description = 'Package the migration-assistant CLI into a release tarball'
    group = 'migrate-cli'
    dependsOn 'compileMigrationAssistantCli'

    def compiledDir  = compileDir
    def licenseFile  = rootProject.file('LICENSE')
    def readmeFile   = file('cli/README.md')
    def manifestFile = rootProject.file('deployment/k8s/charts/aggregates/migrationAssistantWithArgo/scripts/privateEcrManifest.sh')
    def agentSkillsTar = configurations.agentSkills

    inputs.dir compiledDir
    inputs.file licenseFile
    inputs.file manifestFile
    inputs.files agentSkillsTar
    inputs.property 'cliVersion', cliVersion
    outputs.dir distDir

    doLast {
        def ver = cliVersion.get()
        def out = distDir.get().asFile
        out.mkdirs()
        def tarballName = "migration-assistant-cli-${ver}.tar.gz"
        def tarball = new File(out, tarballName)

        def stage = File.createTempFile("migrate-cli-stage", "").with { delete(); mkdirs(); it }
        try {
            def root = new File(stage, "migration-assistant-cli-${ver}")
            def binDir = new File(root, 'bin')
            binDir.mkdirs()

            // The compiled, self-contained entrypoint → bin/migration-assistant.
            // (No lib/ — Amber inlines every imported module into this one file.)
            def compiledBin = new File(compiledDir.get().asFile, 'migration-assistant')
            def shippedBin  = new File(binDir, 'migration-assistant')
            shippedBin.text = compiledBin.text

            // Bake CLI_VERSION into the compiled entrypoint so the banner /
            // `version` subcommand report the assembled version. version.ab
            // compiles its default to `__CLI_VERSION_DEFAULT_<n>="0.0.0-dev"`;
            // a runtime CLI_VERSION env var still overrides this at run time.
            shippedBin.text = shippedBin.text.replaceAll(
                /(__CLI_VERSION_DEFAULT_\d+=)"0\.0\.0-dev"/,
                "\$1\"${ver}\"")
            shippedBin.setExecutable(true)

            if (readmeFile.exists()) {
                project.copy { from readmeFile; into root }
            }

            // Drop the agent-skills tree under skills/ inside the tarball.
            // Producer emits skills/Startup.md, skills/manifest.json,
            // skills/<name>/…, skills/kiro/… — untar-into-root matches the
            // layout the CLI's agent module + manifest resolution expect.
            def skillsTarFile = agentSkillsTar.singleFile
            project.copy {
                from project.tarTree(project.resources.gzip(skillsTarFile))
                into root
            }

            // Vendor privateEcrManifest.sh so the CLI can mirror images without
            // requiring the operator to clone the chart repo.
            project.copy { from manifestFile; into new File(root, 'skills') }
            project.copy { from licenseFile; into root; rename '.*', 'LICENSE' }

            // ---- bundle manifest.json ----
            // Promote skills/manifest.json to the tarball ROOT (sibling of bin/)
            // so the CLI's manifest resolver finds it on its primary path, and
            // bake the build version into build.version.
            def manifestJsonInner = new File(root, 'skills/manifest.json')
            def manifestJsonRoot  = new File(root, 'manifest.json')
            if (manifestJsonInner.exists()) {
                def text = manifestJsonInner.text.replace(
                    '"version": "0.0.0-dev"', "\"version\": \"${ver}\"")
                manifestJsonRoot.text = text
                manifestJsonInner.text = text
            }

            project.exec {
                workingDir stage
                commandLine 'tar', '-czf', tarball.absolutePath, "migration-assistant-cli-${ver}"
            }
        } finally {
            stage.deleteDir()
        }
        logger.lifecycle "wrote ${tarball}"
    }
}

// ---------- (2) install.sh with DEFAULT_REPO baked in ----------

tasks.register('renderInstallScript') {
    description = 'Render the compiled install.sh with DEFAULT_REPO substituted'
    group = 'migrate-cli'
    dependsOn 'compileMigrationAssistantCli'

    def compiledInstall = compileDir.map { it.file('install.sh') }
    def out = distDir.map { it.file('install.sh') }
    inputs.file compiledInstall
    inputs.property 'defaultRepo', defaultRepo
    outputs.file out
    doLast {
        def dst = out.get().asFile
        dst.parentFile.mkdirs()
        // install.ab compiles DEFAULT_REPO to a const assignment; substitute the
        // upstream default with the repo this release is built from. The literal
        // string "opensearch-project/opensearch-migrations" is the compiled
        // const value of install.ab's DEFAULT_REPO.
        dst.text = compiledInstall.get().asFile.text.replace(
            'opensearch-project/opensearch-migrations', defaultRepo.get())
        dst.setExecutable(true)
        logger.lifecycle "wrote ${dst}"
    }
}

// ---------- (3) amber test (CI gate, optional locally) ----------

tasks.register('testMigrationAssistantCli', Exec) {
    description = 'Run the Amber test suite for the migration-assistant CLI'
    group = 'verification'
    workingDir file('cli')
    environment 'MIGRATE_FORCE_TTY', '1'
    commandLine amberBin.get(), 'test', 'test/'
}

// ---------- aggregator + lifecycle ----------

tasks.register('packageMigrationAssistantCli') {
    description = 'Compile the Amber CLI, build the release tarball + curl-pipe installer'
    group = 'migrate-cli'
    dependsOn 'packageMigrationAssistantCliTarball', 'renderInstallScript'
}

assemble.dependsOn 'packageMigrationAssistantCli'
check.dependsOn 'testMigrationAssistantCli'
