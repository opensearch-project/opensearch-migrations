plugins {
    id 'base'
}

// =============================================================================
// deployment/k8s/aws/build.gradle
//
// One output: a release tarball of the migration-assistant CLI plus a
// curl-pipe install.sh keyed to the same release.
//
//   build/migrate-cli-dist/migration-assistant-cli-<version>.tar.gz
//   build/migrate-cli-dist/install.sh
//
// Operators install via:
//   curl -fsSL https://github.com/<owner>/<repo>/releases/<ver>/download/install.sh | bash
//
// `assemble` (the base plugin's lifecycle) depends on
// packageMigrationAssistantCli. The CLI tarball is also runnable
// directly out of the source checkout (deployment/k8s/aws/cli/bin/migration-assistant);
// Jenkins / awsRunEksValidation.sh do exactly that and skip the tarball
// entirely.
// =============================================================================

configurations {
    agentSkills {
        canBeConsumed = false
        canBeResolved = true
    }
}

dependencies {
    // Pull in agent-skills.tar.gz from the agent-skills module's
    // declared producer artifact. A change to any skill file
    // (Startup.md, manifest.json, any skills/<name>/SKILL.md, the kiro
    // config) triggers a rebuild of the CLI tarball — no copy-by-hand
    // drift. Partner packs add new skills the same way: drop a
    // skills/<your-skill>/SKILL.md into the producer, and the
    // consumer's tarball picks it up.
    agentSkills project(path: ':agent-skills', configuration: 'agentSkills')
}

def cliVersion = providers.environmentVariable('CLI_VERSION')
        .orElse(providers.gradleProperty('cliVersion'))
        .orElse(provider {
            // Fall back to "0.0.0-dev-<git-short-sha>" so each commit
            // gets its own cache slot.
            def execResult = providers.exec {
                workingDir = rootDir
                commandLine 'git', 'rev-parse', '--short=10', 'HEAD'
                setIgnoreExitValue(true)
            }
            def rc = execResult.result.get().exitValue
            def sha = rc == 0 ? execResult.standardOutput.asText.get().trim() : ''
            sha ? "0.0.0-dev-${sha}" : '0.0.0-dev'
        })

def defaultRepo = providers.environmentVariable('DEFAULT_REPO')
        .orElse(providers.gradleProperty('defaultRepo'))
        .orElse('opensearch-project/opensearch-migrations')

def distDir = layout.buildDirectory.dir('migrate-cli-dist')

// ---------- (1) CLI tarball ----------

tasks.register('packageMigrationAssistantCliTarball') {
    description = 'Package the migration-assistant CLI into a release tarball'
    group = 'migrate-cli'

    def cliDir       = file('cli')
    def licenseFile  = rootProject.file('LICENSE')
    def manifestFile = rootProject.file('deployment/k8s/charts/aggregates/migrationAssistantWithArgo/scripts/privateEcrManifest.sh')
    def agentSkillsTar = configurations.agentSkills

    inputs.dir cliDir
    inputs.file licenseFile
    inputs.file manifestFile
    inputs.files agentSkillsTar
    inputs.property 'cliVersion', cliVersion
    outputs.dir distDir

    doLast {
        def ver = cliVersion.get()
        def out = distDir.get().asFile
        out.mkdirs()
        def tarballName = "migration-assistant-cli-${ver}.tar.gz"
        def tarball = new File(out, tarballName)

        def stage = File.createTempFile("migrate-cli-stage", "").with { delete(); mkdirs(); it }
        try {
            def root = new File(stage, "migration-assistant-cli-${ver}")
            root.mkdirs()
            project.copy {
                from cliDir
                into root
                include 'bin/**'
                include 'lib/**'
                include 'install.sh'
                include 'README.md'
            }

            // Bake CLI_VERSION into lib/version.sh so the banner reports the
            // assembled version rather than "0.0.0-dev".
            def versionFile = new File(root, 'lib/version.sh')
            if (versionFile.exists()) {
                def text = versionFile.text
                versionFile.text = text.replaceAll(
                    /CLI_VERSION="\$\{CLI_VERSION:-0\.0\.0-dev\}"/,
                    "CLI_VERSION=\"\\\${CLI_VERSION:-${ver}}\""
                )
            }

            // Drop the agent-skills tree under skills/ inside the tarball.
            // The producer module emits its tarball with paths
            //   skills/Startup.md, skills/manifest.json, skills/<name>/…, skills/kiro/…
            // so untar-into-root matches the layout the CLI's agent.sh expects.
            def skillsTarFile = agentSkillsTar.singleFile
            project.copy {
                from project.tarTree(project.resources.gzip(skillsTarFile))
                into root
            }

            // Vendor privateEcrManifest.sh so the CLI can mirror images
            // without requiring the operator to clone the chart repo.
            project.copy {
                from manifestFile
                into new File(root, 'skills')
            }
            project.copy {
                from licenseFile
                into root
                rename '.*', 'LICENSE'
            }

            // ---- bundle manifest.json ----
            // The agent-skills tarball already extracted skills/manifest.json
            // into the bundle's skills/ directory above. Promote it to the
            // tarball ROOT (sibling of bin/ + lib/) so manifest.sh's primary
            // resolution path finds it instantly without descending. ALSO
            // bake the build version into build.version so `migration-assistant
            // version` and the banner report the assembled version rather
            // than "0.0.0-dev".
            def manifestJsonInner = new File(root, 'skills/manifest.json')
            def manifestJsonRoot  = new File(root, 'manifest.json')
            if (manifestJsonInner.exists()) {
                def text = manifestJsonInner.text
                // Substitute "version": "0.0.0-dev" → "version": "<ver>".
                // Naive string replace — manifest.json is generated, the
                // exact placeholder is constant.
                text = text.replace(
                    '"version": "0.0.0-dev"',
                    "\"version\": \"${ver}\""
                )
                manifestJsonRoot.text = text
                // Keep the inner copy in sync so resolution path #2 also
                // sees the built version.
                manifestJsonInner.text = text
            }

            // Tar it. Gradle's Tar task is more portable than shelling out
            // to BSD/GNU tar — it always emits POSIX-clean entries.
            project.exec {
                workingDir stage
                commandLine 'tar', '-czf', tarball.absolutePath, "migration-assistant-cli-${ver}"
            }
        } finally {
            stage.deleteDir()
        }

        logger.lifecycle "wrote ${tarball}"
    }
}

// ---------- (2) install.sh with DEFAULT_REPO baked in ----------

tasks.register('renderInstallScript') {
    description = 'Render install.sh with DEFAULT_REPO substituted'
    group = 'migrate-cli'
    def src = file('cli/install.sh')
    def out = distDir.map { it.file('install.sh') }
    inputs.file src
    inputs.property 'defaultRepo', defaultRepo
    outputs.file out
    doLast {
        def dst = out.get().asFile
        dst.parentFile.mkdirs()
        dst.text = src.text.replace('@DEFAULT_REPO@', defaultRepo.get())
        dst.setExecutable(true)
        logger.lifecycle "wrote ${dst}"
    }
}

// ---------- aggregator + lifecycle ----------

tasks.register('packageMigrationAssistantCli') {
    description = 'Build the CLI tarball and the curl-pipe installer'
    group = 'migrate-cli'
    dependsOn 'packageMigrationAssistantCliTarball', 'renderInstallScript'
}

assemble.dependsOn 'packageMigrationAssistantCli'
