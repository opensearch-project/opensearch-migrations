apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-dependency-installer
  labels:
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 1200
  ttlSecondsAfterFinished: 600
  podFailurePolicy:
    rules:
      - action: Ignore
        onPodConditions:
          - type: DisruptionTarget
      - action: FailJob
        onExitCodes:
          containerName: helm-installer
          operator: NotIn
          values: [0]
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        karpenter.sh/do-not-disrupt: "true"
    spec:
      serviceAccountName: {{ .Values.installer.serviceAccount.name }}
      restartPolicy: Never
{{- if and .Values.conditionalPackageInstalls.kyverno .Values.kyvernoPolicies.zeroResourceRequests }}
      volumes:
        - name: policy
          configMap:
            name: {{ .Release.Name }}-kyverno-zero-resources-policy
{{- end }}
      containers:
        - name: helm-installer
          image: {{ include "migration.image" (dict "root" . "image" .Values.images.installer) }}
          imagePullPolicy: {{ .Values.images.installer.pullPolicy }}
{{- if and .Values.conditionalPackageInstalls.kyverno .Values.kyvernoPolicies.zeroResourceRequests }}
          volumeMounts:
            - name: policy
              mountPath: /policy
{{- end }}
          command:
            - /bin/sh
            - -c
            - |
              #!/bin/sh
              set -e
              {{- include "migration.retryFunctions" . | nindent 14 }}

      {{- if .Values.ecrAuth }}
              echo "Authenticating with ECR for OCI chart pulls..."
      {{- if .Values.ecrAuth.token }}
              ecr_login_token() {
                echo "{{ .Values.ecrAuth.token }}" | helm registry login --username AWS --password-stdin {{ .Values.ecrAuth.registry }}
              }
              retry 2 5 "ECR registry login (token)" -- ecr_login_token
      {{- else }}
              ecr_login_iam() {
                aws ecr get-login-password --region "${AWS_DEFAULT_REGION}" 2>/dev/null | \
                  helm registry login --username AWS --password-stdin {{ .Values.ecrAuth.registry }}
              }
              retry 2 5 "ECR registry login (IAM)" -- ecr_login_iam || \
                echo "WARNING: Could not authenticate with ECR. OCI chart pulls may fail."
      {{- end }}
      {{- end }}

      {{- if (and $.Values.metrics.enabled
                  (get $.Values.conditionalPackageInstalls "opentelemetry-operator")) }}
              echo "'metrics.enabled' and 'opentelemetry-operator' are mutually exclusive. " \
                   "At least one must be false."
              exit 1
      {{- end }}

              mkdir -p /tmp/helm-notes
              mkdir -p /tmp/helm-status
              : > /tmp/helm-pids # create/reset the file. `:` is a no-op command
              HELM_INSTALL_RETRY_ATTEMPTS=2
              HELM_INSTALL_RETRY_SLEEP_SECONDS=15
              DEPENDENCY_WAIT_BUFFER_SECONDS=60
              echo "Starting Helm installation sequence..."

      {{- range $name, $chart := .Values.charts }}
          {{- $repo := $chart.repository }}
          {{- if and (index $.Values.conditionalPackageInstalls $name) (ne (substr 0 6 $repo) "oci://") }}
              echo "Adding chart repository..."
              retry 3 5 "helm repo add {{ $name }}" -- helm repo add chart-repo-{{ $name }} {{ $repo }}
          {{- end }}
      {{- end }}

      {{- if .Values.charts }}
              retry 3 10 "helm repo update" -- helm repo update || \
                echo "No traditional helm repos to update (OCI repos don't need it)"
      {{- end }}

              # Helper function.  Charts that define "dependsOn" will check a dependency with this.
              check_dependency() {
                dependency=$1
                dependency_timeout_seconds=$2
                max_wait_seconds=$(( \
                  dependency_timeout_seconds * HELM_INSTALL_RETRY_ATTEMPTS + \
                  HELM_INSTALL_RETRY_SLEEP_SECONDS * (HELM_INSTALL_RETRY_ATTEMPTS - 1) + \
                  DEPENDENCY_WAIT_BUFFER_SECONDS \
                ))
                elapsed_seconds=0

                while [ "$elapsed_seconds" -lt "$max_wait_seconds" ]; do
                  if [ -f "/tmp/helm-status/$dependency.done" ]; then
                    echo "Dependency $dependency is ready"
                    return 0
                  fi

                  if [ -f "/tmp/helm-status/$dependency.failed" ]; then
                    echo "Error: Dependency $dependency failed"
                    return 1
                  fi

                  echo "Waiting for dependency $dependency to complete (${elapsed_seconds}s/${max_wait_seconds}s)..."
                  sleep 1
                  elapsed_seconds=$((elapsed_seconds + 1))
                done

                echo "Error: Dependency $dependency not ready after ${max_wait_seconds}s"
                return 1
              }

              write_installation_notes() {
                cat > /tmp/all-notes.yaml << EOF
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: {{ $.Release.Name }}-installation-notes
                namespace: {{ $.Release.Namespace }}
                labels:
                  app.kubernetes.io/managed-by: {{ $.Release.Service }}
                  app.kubernetes.io/instance: {{ $.Release.Name }}
              data:
                all-notes.txt: |
                  ============================================
                  INSTALLATION NOTES FOR {{ $.Release.Name }}
                  ============================================

              EOF

                for notes_file in /tmp/helm-notes/*.txt; do
                  if [ -f "$notes_file" ]; then
                    echo "  # Adding notes from $(basename $notes_file)"
                    sed 's/^/    /' $notes_file >> /tmp/all-notes.yaml
                    echo "    " >> /tmp/all-notes.yaml
                    echo "    --------------------------------------" >> /tmp/all-notes.yaml
                  fi
                done

                cat /tmp/all-notes.yaml
                retry 2 5 "apply installation-notes ConfigMap" -- kubectl apply -f /tmp/all-notes.yaml
              }

              # Install Kyverno first and wait for it to be fully ready before other charts
              # This prevents race conditions where Kyverno's webhook intercepts other chart
              # installations before Kyverno's admission controller is ready
      {{- if (index $.Values.conditionalPackageInstalls "kyverno") }}
        {{- $kyvernoChart := index .Values.charts "kyverno" }}
        {{- if $kyvernoChart }}
              echo "Installing Kyverno first (must be ready before other charts)..."
              {{- include "migration.installChart" (dict "name" "kyverno" "chart" $kyvernoChart "root" $ "forceWait" true) | nindent 14 }}
              echo "Kyverno helm install complete, waiting for admission webhook to be ready..."
              kubectl wait --for=condition=Ready -n {{ $kyvernoChart.namespace | default $.Release.Namespace }} pod -l app.kubernetes.io/component=admission-controller --timeout=60s
              echo "Kyverno webhook is ready"

      {{- if $.Values.kyvernoPolicies.zeroResourceRequests }}
              echo "Applying zero-resource-requests ClusterPolicy before installing other charts..."
              kubectl wait --for=condition=Established crd/clusterpolicies.kyverno.io --timeout=60s
              retry 3 5 "apply zero-resource-requests policy" -- kubectl apply -f /policy/policy.yaml
              echo "Waiting for zero-resource-requests policy to be ready..."
              kubectl wait --for=condition=Ready clusterpolicy/zero-resource-requests --timeout=60s
              echo "Verifying policy is actively enforcing via canary pod..."
              INSTALLER_IMAGE="{{ include "migration.image" (dict "root" $ "image" $.Values.images.installer) }}"
              until kubectl run kyverno-canary -n {{ $.Release.Namespace }} --image="$INSTALLER_IMAGE" --restart=Never --command -- sleep 999 2>/dev/null \
                && kubectl get pod -n {{ $.Release.Namespace }} kyverno-canary -o jsonpath='{.metadata.annotations.kyverno\.io/mutated-by}' 2>/dev/null | grep -q zero-resource-requests; do
                kubectl delete pod kyverno-canary -n {{ $.Release.Namespace }} --ignore-not-found 2>/dev/null
                echo "Policy not yet enforcing, retrying..."
                sleep 2
              done
              kubectl delete pod kyverno-canary -n {{ $.Release.Namespace }} --ignore-not-found
              echo "Zero-resource-requests policy is active and enforcing"
      {{- end }}


              # Set ownerReference on kyverno namespace so it gets cascade-deleted with the release namespace
              {{- if ne ($kyvernoChart.namespace | default $.Release.Namespace) $.Release.Namespace }}
              echo "Setting {{ $kyvernoChart.namespace }} namespace ownership to {{ $.Release.Namespace }}..."
              PARENT_NS_UID=$(kubectl get namespace {{ $.Release.Namespace }} -o jsonpath='{.metadata.uid}')
              kubectl patch namespace {{ $kyvernoChart.namespace }} --type=merge -p \
                "{\"metadata\":{\"ownerReferences\":[{\"apiVersion\":\"v1\",\"kind\":\"Namespace\",\"name\":\"{{ $.Release.Namespace }}\",\"uid\":\"$PARENT_NS_UID\"}]}}"
              {{- end }}
        {{- end }}
      {{- end }}

              # Install remaining charts in parallel
      {{- range $name, $chart := .Values.charts }}
        {{- if eq $name "kyverno" }}
              echo "Skipping kyverno in main loop (already installed)"
        {{- else if (not (index $.Values.conditionalPackageInstalls $name)) }}
              echo "Skipping install for: {{ $name }} because conditionalPackageInstalls.{{ $name }} disabled it."
        {{- else }}
              echo "Preparing chart: {{ $name }}"

          {{- if $chart.values }}
              VALUES_B64="{{ $chart.values | toYaml | b64enc }}"
              echo "$VALUES_B64" | base64 -d > /tmp/values-{{ $name }}.yaml
              VALUE_PARAM="--values /tmp/values-{{ $name }}.yaml"
          {{- else }}
              VALUE_PARAM=""
          {{- end }}

              # Gather the chart installation's output for later aggregation
              NOTES_FILE="/tmp/helm-notes/{{ $name }}.txt"
              echo "==== NOTES for {{ $name }} ====" > $NOTES_FILE

              # Launch installation in background with dependency check if needed
              (
                CHART_FAILED_FILE="/tmp/helm-status/{{ $name }}.failed"
                mark_chart_failed() {
                  status=$?
                  if [ "$status" -ne 0 ]; then
                    echo "$status" > "$CHART_FAILED_FILE"
                    echo "Failed installing chart: {{ $name }} (status $status)"
                  fi
                }
                trap mark_chart_failed EXIT

          {{- if $chart.dependsOn }}
            {{- $dependencyChart := (index $.Values.charts $chart.dependsOn) | default dict }}
                echo "Chart {{ $name }} depends on {{ $chart.dependsOn }} - checking dependency"
                check_dependency "{{ $chart.dependsOn }}" {{ default "300" $dependencyChart.timeout }}
          {{- end }}

                do_install_{{ $name | replace "-" "_" }}() {
          {{- $repo := $chart.repository }}
          {{- $version := $chart.version }}
          {{- if hasPrefix "oci://" $repo }}
                  echo "Installing OCI chart: {{ $name }}"
                  helm upgrade --install \
                    {{ $name }} \
                    {{ $repo }} \
          {{- else }}
                  echo "Installing chart from Helm repo: {{ $name }}"
                  helm upgrade --install \
                    {{ $name }} \
                    chart-repo-{{ $name }}/{{ $name }} \
          {{- end }}
          {{- if $chart.version }}
                    --version {{ $chart.version }} \
          {{- end }}
          {{- if $chart.namespace }}
                    --namespace {{ $chart.namespace }} \
                    --create-namespace \
          {{- end }}
                    --timeout {{ default "300" $chart.timeout }}s \
                    --set global.managedBy="{{ $.Release.Name }}" \
          {{- if eq $name "argo-workflows" }}
            {{- if eq $.Values.cloudProvider "aws" }}
                  --set artifactRepository.s3.bucket="{{ printf "migrations-default-%s-%s-%s" (toString $.Values.aws.account) $.Values.stageName $.Values.aws.region }}" \
                  --set artifactRepository.s3.region="{{ $.Values.aws.region }}" \
              {{- if $.Values.defaultBucketConfiguration.useLocalStack }}
                  --set artifactRepository.s3.endpoint="{{ $.Values.defaultBucketConfiguration.endpoint }}.{{ $.Release.Namespace }}.svc.cluster.local:4566" \
              {{- else }}
                  --set artifactRepository.s3.endpoint="s3.{{ $.Values.aws.region }}.amazonaws.com" \
              {{- end }}
            {{- else if eq $.Values.cloudProvider "gcp" }}
              {{- $gcpProject := required "Missing required value: .Values.gcp.project" $.Values.gcp.project }}
              {{- $gcsBucketName := $.Values.gcsBucketConfiguration.bucketName | default (printf "migration-snapshots-%s" $gcpProject) }}
                   --set artifactRepository.gcs.bucket="{{ $gcsBucketName }}" \
              {{- if $.Values.gcp.serviceAccountEmail }}
                   --set-string "controller.serviceAccount.annotations.iam\\.gke\\.io/gcp-service-account={{ $.Values.gcp.serviceAccountEmail }}" \
               {{- end }}
            {{- end }}
          {{- end }}
          {{- if eq $name "ack-cloudwatch-controller" }}
                    --set aws.region="{{ $.Values.aws.region }}" \
          {{- end }}
          {{- if eq (include "migration.chartWaitForInstallation" (dict "chart" $chart "root" $)) "true" }}
                    $VALUE_PARAM \
                    --wait
          {{- else }}
                    $VALUE_PARAM
          {{- end }}
                }
                retry "$HELM_INSTALL_RETRY_ATTEMPTS" "$HELM_INSTALL_RETRY_SLEEP_SECONDS" "helm upgrade --install {{ $name }}" -- do_install_{{ $name | replace "-" "_" }}

                # Mark this chart as done
                rm -f "$CHART_FAILED_FILE"
                touch /tmp/helm-status/{{ $name }}.done

                echo -e "\nFinished installing chart: {{ $name }}\n" >> $NOTES_FILE
              ) >> $NOTES_FILE 2>&1 &
              echo "$! {{ $name }}" >> /tmp/helm-pids
        {{- end }}
      {{- end }}

              # Wait for all helm upgrades/installs to complete
              install_failed=0
              failed_charts=""
              while read -r child_pid child_chart; do
                [ -n "$child_pid" ] || continue
                if wait "$child_pid"; then
                  echo "Chart $child_chart completed successfully"
                else
                  child_status=$?
                  install_failed=1
                  failed_charts="$failed_charts $child_chart"
                  echo "Chart $child_chart failed with status $child_status"
                fi
              done < /tmp/helm-pids

              if [ "$install_failed" -ne 0 ]; then
                echo "One or more child chart installs failed:$failed_charts"
                write_installation_notes
                exit 1
              fi

      {{- if get .Values.conditionalPackageInstalls "ack-cloudwatch-controller" }}
      {{- $region := required "Missing required value: .Values.aws.region" .Values.aws.region }}
      {{- $account := required "Missing required value: .Values.aws.account" (toString .Values.aws.account) }}
      {{- $stage := required "Missing required value: .Values.stageName" .Values.stageName }}
              echo "Waiting for Dashboard CRD to be established..."
              kubectl wait --for=condition=Established crd/dashboards.cloudwatch.services.k8s.aws --timeout=120s
              echo "Applying CloudWatch Dashboard CRs..."
              apply_dashboards() {
                echo '{{ include "cloudwatch.dashboardCRs" (dict "region" $region "account" $account "stage" $stage "root" $) | b64enc }}' | base64 -d | kubectl apply -f -
              }
              retry 3 5 "apply CloudWatch Dashboard CRs" -- apply_dashboards
              echo "Dashboard CRs applied."
      {{- end }}

              # Combine all notes and create a ConfigMap to store them
              echo "All charts installed successfully!"
              write_installation_notes

              echo "Installation complete! View aggregated notes with:"
              echo "kubectl get configmap {{ $.Release.Name }}-installation-notes -n {{ $.Release.Namespace }} -o jsonpath='{.data.all-notes\\.txt}'"
