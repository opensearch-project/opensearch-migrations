# kubernetes/rbac.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: migration-console-access-role
  {{- if and (eq .Values.cloudProvider "gcp") .Values.gcp.serviceAccountEmail }}
  annotations:
    iam.gke.io/gcp-service-account: {{ .Values.gcp.serviceAccountEmail | quote }}
  {{- end }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: migration-console-access-role
rules:
  - apiGroups: [ "" ]
    resources: ["configmaps", "endpoints", "events", "persistentvolumeclaims", "pods", "pods/log", "secrets", "services"]
    verbs: ["get", "watch", "list", "create", "update", "patch", "delete", "deletecollection"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "watch", "list"]
  - apiGroups: [""]
    resources: ["pods/attach"]
    verbs: ["create", "get"]
  - apiGroups: [ "apps" ]
    resources: ["deployments", "deployments/scale", "statefulsets"]
    verbs: ["get", "watch", "list", "create", "update", "patch", "delete", "deletecollection"]
  - apiGroups: ["argoproj.io"]
    resources: ["workflows", "workflows/finalizers", "workflowtemplates", "workflowtemplates/finalizers", "workflowtaskresults" ]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
  - apiGroups: ["migrations.opensearch.org"]
    # Listed one (resource, /status) per line so a missing status sub-resource
    # is obvious at a glance.
    resources:
      - approvalgates
      - approvalgates/status
      - capturedtraffics
      - capturedtraffics/status
      - captureproxies
      - captureproxies/status
      - datasnapshots
      - datasnapshots/status
      - kafkaclusters
      - kafkaclusters/status
      - migrationruns
      - migrationruns/status
      - snapshotmigrations
      - snapshotmigrations/status
      - trafficreplays
      - trafficreplays/status
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # `workflow reset` (run under this SA) walks the Strimzi resource tree to clean
  # up between integ-test cases. reset.py iterates kafkas / kafkausers /
  # kafkatopics / kafkanodepools and the core.strimzi.io strimzipodsets — all
  # five need delete + deletecollection or the cleanup 403's mid-walk and
  # leaves residual broker pods that deadlock the next test's setup.
  - apiGroups: ["kafka.strimzi.io"]
    resources: ["kafkas", "kafkausers", "kafkatopics", "kafkanodepools"]
    verbs: ["get", "list", "watch", "delete", "deletecollection"]
  - apiGroups: ["core.strimzi.io"]
    resources: ["strimzipodsets"]
    verbs: ["get", "list", "watch", "delete", "deletecollection"]
  # Read-only, for drain-stall diagnostics. On a replayer drain failure
  # (assert_replay_drained in cdc_base.py) we dump the Kafka PodDisruptionBudget
  # state — is minAvailable actually gating disruptions, or is the budget
  # already at its floor? — alongside broker pod placement. PDBs are namespaced;
  # nodes are cluster-scoped and granted via the ClusterRole below.
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: migration-console-access-role
subjects:
  - kind: ServiceAccount
    name: migration-console-access-role
roleRef:
  kind: Role
  name: migration-console-access-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: migration-console-openapi-access-role
rules:
  - nonResourceURLs:
      - /openapi
      - /openapi/*
      - /openapi/v3
      - /openapi/v3/*
    verbs: ["get"]
  # Read-only node access for drain-stall diagnostics: on a replayer drain
  # failure, cdc_base.py dumps `kubectl get nodes -o wide` and broker pod
  # placement to reveal whether all Kafka brokers are co-located on a single
  # node (a node that Karpenter could consolidate, taking the whole cluster
  # down at once). Nodes are cluster-scoped, so this lives on the ClusterRole.
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: migration-console-openapi-access-role
subjects:
  - kind: ServiceAccount
    name: migration-console-access-role
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: migration-console-openapi-access-role
  apiGroup: rbac.authorization.k8s.io
---
{{- if .Values.cluster.dedicatedKarpenterNodePoolForMigrationConsole }}
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: dedicated-small-instance-migration-console-pool
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  # Limits on the TOTAL aggregate size of the pool.
  # The Migration Console is intended only to be a very small control-plane.
  # Memory limit is set to 8Gi to allow scheduling on instances with up to
  # 8 GiB RAM (e.g. t3.large). Daemonsets (fluent-bit, otel-collector) are
  # excluded from this node via nodeAffinity to keep overhead minimal.
  limits:
    cpu: 4000m
    memory: 8Gi
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 5m  # No reason to wait long if the console exits
  template:
    spec:
      nodeClassRef:
        group: eks.amazonaws.com
        kind: NodeClass
        name: default
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: node.kubernetes.io/instance-category
          # This pool is for a control plane with few network calls at low bandwidth
          # and shouldn't require much compute.  If we do find that users would like
          # to run heavier log dives, validations, comparison jobs, or significant
          # Kafka work, we should offload those tasks to pods that run with higher
          # specifications in the general pool
          operator: In
          values: ["t"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
      taints:
        - key: "migration-console" # Taint to ensure only migration console pods land here
          value: "dedicated"
          effect: NoSchedule
---
{{- end }}
{{ $sharedLogsVolumeEnabled := .Values.logs.sharedLogsVolume.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: migration-console
spec:
  serviceName: "migration-console"
  replicas: 1
  selector:
    matchLabels:
      app: migration-console
  template:
    metadata:
      annotations:
        karpenter.sh/do-not-disrupt: "true"
        kubectl.kubernetes.io/default-container: console
      labels:
        app: migration-console
        env: v1
    spec:
      serviceAccountName: migration-console-access-role
      terminationGracePeriodSeconds: 65
      initContainers:
        - name: workflow-schema-generator
          image: {{ include "migration.image" (dict "root" . "image" .Values.images.installer) }}
          imagePullPolicy: {{ .Values.images.installer.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              set -euo pipefail

              OPENAPI_PATH=/tmp/strimzi-openapi.json
              SCHEMA_PATH=/root/schema/workflowMigration.schema.json
              SAMPLE_PATH=/root/schema/sample.yaml

              echo "Waiting for Strimzi OpenAPI to become available..."
              for attempt in $(seq 1 180); do
                if kubectl get --raw /openapi/v3/apis/kafka.strimzi.io/v1 > "$OPENAPI_PATH" 2>/dev/null; then
                  break
                fi
                if [ "$attempt" -eq 180 ]; then
                  echo "Timed out waiting for Strimzi OpenAPI /openapi/v3/apis/kafka.strimzi.io/v1"
                  exit 1
                fi
                sleep 2
              done

              echo "Generating unified workflow schema from live Strimzi OpenAPI..."
              ${NODEJS:-node-22} /root/configProcessor/index.js buildUnifiedSchema \
                --strimzi-openapi "$OPENAPI_PATH" \
                --output "$SCHEMA_PATH"

              echo "Generating sample workflow config..."
              MIGRATION_UNIFIED_SCHEMA_PATH="$SCHEMA_PATH" \
                ${NODEJS:-node-22} /root/configProcessor/index.js makeSample > "$SAMPLE_PATH"
              printf '# yaml-language-server: $schema=/root/schema/workflowMigration.schema.json\n%s' "$(cat "$SAMPLE_PATH")" > "$SAMPLE_PATH"
          volumeMounts:
            - name: workflow-schema
              mountPath: /root/schema
      {{- if .Values.cluster.dedicatedKarpenterNodePoolForMigrationConsole }}
      tolerations: # Set the metadata so that the dedicated nodepool will let this pod schedule to it
        - key: "migration-console"
          operator: "Equal"
          value: "dedicated"
          effect: "NoSchedule"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: karpenter.sh/nodepool
                    operator: In
                    values:
                      - "dedicated-small-instance-migration-console-pool"
      {{- end }}
      containers:
        - name: console
          image: {{ include "migration.image" (dict "root" . "image" .Values.images.migrationConsole) }}
          imagePullPolicy: {{ .Values.images.migrationConsole.pullPolicy }}
          # Since the console may be used interactively, try to keep the migration
          # console on the same node so that it can be stable.  Keep the requests
          # and limits values the same to have k8s treat the pod as "Guranteed",
          # which will make it the least likely to pod to face eviction.
          #
          # See https://kubernetes.io/docs/concepts/workloads/pods/pod-qos/#guaranteed
          resources:
            requests:
              cpu: 1500m
              memory: 2Gi
            limits:
              cpu: 1500m
              memory:
                2Gi
          env:
            - name: MIGRATIONS_CLI_CONSOLE_DISABLE_LEGACY_COMMANDS
              value: "true"
            - name: MIGRATION_UNIFIED_SCHEMA_PATH
              value: "/root/schema/workflowMigration.schema.json"
            - name: MIGRATION_SAMPLE_CONFIG_PATH
              value: "/root/schema/sample.yaml"
            {{- if or (eq .Values.cloudProvider "aws") (eq .Values.cloudProvider "") }}
            {{- if .Values.defaultBucketConfiguration.create }}
            {{- $s3Bucket := printf "migrations-default-%s-%s-%s" (toString .Values.aws.account) .Values.stageName .Values.aws.region }}
            - name: REPO_ARTIFACTS_BUCKET
              value: {{ printf "s3://%s" $s3Bucket | quote }}
            - name: REPO_ARTIFACTS_ENDPOINT_URL
              valueFrom:
                configMapKeyRef:
                  name: migrations-default-s3-config
                  key: ENDPOINT_HTTP
                  optional: true
            {{- end }}
            {{- else if eq .Values.cloudProvider "gcp" }}
            {{- if .Values.gcsBucketConfiguration.create }}
            {{- $useLocalGcs := .Values.gcsBucketConfiguration.useLocalGcs }}
            {{- $gcsBucket := .Values.gcsBucketConfiguration.bucketName | default (ternary "migration-test-bucket" (printf "migration-snapshots-%s" .Values.gcp.project) $useLocalGcs) }}
            {{- $gcsEndpoint := ternary (printf "http://%s.%s.svc.cluster.local:4443" .Values.gcsBucketConfiguration.localGcsEndpoint .Release.Namespace) (.Values.gcsBucketConfiguration.endpoint | default "") $useLocalGcs }}
            - name: REPO_ARTIFACTS_BUCKET
              value: {{ printf "gs://%s" $gcsBucket | quote }}
            - name: REPO_ARTIFACTS_ENDPOINT_URL
              value: {{ $gcsEndpoint | quote }}
            {{- end }}
            {{- end }}
            {{- if and (or (eq .Values.cloudProvider "aws") (eq .Values.cloudProvider "")) (index .Values.conditionalPackageInstalls "cert-manager") }}
            - name: PROXY_DEFAULT_AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: migrations-default-s3-config
                  key: AWS_REGION
                  optional: true
            {{- end }}
          {{- if or .Values.defaultBucketConfiguration.create .Values.gcsBucketConfiguration.create }}
          securityContext:
            privileged: true
            capabilities:
              add:
                - SYS_ADMIN
          {{- end }}
          command:
            - "/bin/sh"
            - "-c"
            - |
              /root/start-console.sh
          lifecycle:
            preStop:
              exec:
                command:
                  - "/bin/sh"
                  - "-c" # For the time described, notice not just the sleep value but also the terminationGracePeriodSeconds on the pod
                  - |
                    if pgrep -x "bash|sh|zsh" | grep -v "^1$" > /dev/null; then
                      msg=$'\n*** SYSTEM: Pod shutting down in 60s! Please exit your shell. ***\n'
                      for tty in /dev/pts/*; do
                        [ -w "$tty" ] && echo "$msg" > "$tty" 2>/dev/null || true
                      done
                      sleep 60
                    fi
          volumeMounts:
            - name: workflow-schema
              mountPath: /root/schema
    {{- if $sharedLogsVolumeEnabled }}
            - name: shared-logs
              mountPath: /shared-logs-output
    {{- end }}
      volumes:
        - name: workflow-schema
          emptyDir:
            sizeLimit: 1Gi
    {{- if $sharedLogsVolumeEnabled  }}
        - name: shared-logs
          persistentVolumeClaim:
            claimName: {{ .Values.logs.sharedLogsVolume.name }}
    {{- end }}
