{{- if get .Values.conditionalPackageInstalls "argo-workflows" }}
{{- if or (eq .Values.cloudProvider "aws") (eq .Values.cloudProvider "") }}
{{- if .Values.defaultBucketConfiguration.useLocalStack }}
---
apiVersion: v1
kind: Secret
metadata:
  name: argo-artifact-s3-creds
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-1"
type: Opaque
stringData:
  accessKey: "test"
  secretKey: "test"
{{- end }}
{{- end }}
{{- end }}
