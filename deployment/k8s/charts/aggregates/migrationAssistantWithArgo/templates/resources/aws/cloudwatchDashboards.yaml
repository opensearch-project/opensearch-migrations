{{- define "cloudwatch.dashboardCRs" -}}
{{- $deletionPolicy := (index .root.Values.charts "ack-cloudwatch-controller").deletionPolicy | default "delete" -}}
apiVersion: cloudwatch.services.k8s.aws/v1alpha1
kind: Dashboard
metadata:
  name: ma-{{ .stage }}-{{ .region }}-capturereplay
  namespace: {{ .root.Release.Namespace }}
  annotations:
    services.k8s.aws/deletion-policy: {{ $deletionPolicy }}
spec:
  dashboardName: "MA-{{ .stage }}-{{ .region }}-CaptureReplay"
  dashboardBody: {{ .root.Files.Get "files/cloudwatch-dashboards/capture-replay-dashboard.json" | replace "placeholder-region" .region | replace "placeholder-stage" .stage | replace "placeholder-qualifier" .stage | trim | toJson }}
---
apiVersion: cloudwatch.services.k8s.aws/v1alpha1
kind: Dashboard
metadata:
  name: ma-{{ .stage }}-{{ .region }}-reindexfromsnapshot
  namespace: {{ .root.Release.Namespace }}
  annotations:
    services.k8s.aws/deletion-policy: {{ $deletionPolicy }}
spec:
  dashboardName: "MA-{{ .stage }}-{{ .region }}-ReindexFromSnapshot"
  dashboardBody: {{ .root.Files.Get "files/cloudwatch-dashboards/reindex-from-snapshot-dashboard.json" | replace "placeholder-region" .region | replace "placeholder-account-id" .account | replace "placeholder-stage" .stage | replace "placeholder-qualifier" .stage | trim | toJson }}
{{- end -}}
