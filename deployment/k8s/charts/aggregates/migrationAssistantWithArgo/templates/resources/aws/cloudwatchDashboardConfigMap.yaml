{{- if .Values.cloudwatchDashboards.enabled }}
{{- $region := required "Missing required value: .Values.aws.region" .Values.aws.region }}
{{- $account := required "Missing required value: .Values.aws.account" (toString .Values.aws.account) }}
{{- $stage := required "Missing required value: .Values.stageName" .Values.stageName }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudwatch-dashboards-config
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-1"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  capture-replay-dashboard.json: |
    {{- .Files.Get "files/dashboards/capture-replay-dashboard.json" | replace "placeholder-region" $region | replace "placeholder-stage" $stage | replace "placeholder-qualifier" $stage | nindent 4 }}
  reindex-from-snapshot-dashboard.json: |
    {{- .Files.Get "files/dashboards/reindex-from-snapshot-dashboard.json" | replace "placeholder-region" $region | replace "placeholder-account-id" $account | replace "placeholder-stage" $stage | replace "placeholder-qualifier" $stage | nindent 4 }}
{{- end }}
