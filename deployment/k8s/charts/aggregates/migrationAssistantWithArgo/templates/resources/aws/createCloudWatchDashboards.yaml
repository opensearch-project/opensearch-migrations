{{- if .Values.cloudwatchDashboards.enabled }}
{{- $region := required "Missing required value: .Values.aws.region" .Values.aws.region }}
{{- $account := required "Missing required value: .Values.aws.account" (toString .Values.aws.account) }}
{{- $stage := required "Missing required value: .Values.stageName" .Values.stageName }}
apiVersion: batch/v1
kind: Job
metadata:
  name: create-cloudwatch-dashboards-{{ .Release.Name }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: cloudwatch-dashboards-create
      annotations:
        karpenter.sh/do-not-disrupt: "true"
    spec:
      serviceAccountName: {{ .Values.defaultBucketConfiguration.serviceAccountName }}
      restartPolicy: OnFailure
      containers:
        - name: aws-cli
          image: {{ .Values.defaultBucketConfiguration.bucketOperationImage }}
          imagePullPolicy: {{ .Values.defaultBucketConfiguration.bucketOperationImagePullPolicy }}
          env:
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: aws-metadata
                  key: AWS_REGION
            - name: STAGE_NAME
              valueFrom:
                configMapKeyRef:
                  name: aws-metadata
                  key: STAGE_NAME
          command:
            - /bin/sh
            - -c
            - |
              set -e
              aws cloudwatch put-dashboard \
                --dashboard-name "MA-${STAGE_NAME}-${AWS_REGION}-CaptureReplay" \
                --dashboard-body {{ .Files.Get "files/cloudwatch-dashboards/capture-replay-dashboard.json" | replace "placeholder-region" $region | replace "placeholder-account-id" $account | replace "placeholder-stage" $stage | replace "placeholder-qualifier" $stage | trim | toJson }} \
                --region "${AWS_REGION}"
              echo "OK: CaptureReplay dashboard deployed"
              aws cloudwatch put-dashboard \
                --dashboard-name "MA-${STAGE_NAME}-${AWS_REGION}-ReindexFromSnapshot" \
                --dashboard-body {{ .Files.Get "files/cloudwatch-dashboards/reindex-from-snapshot-dashboard.json" | replace "placeholder-region" $region | replace "placeholder-account-id" $account | replace "placeholder-stage" $stage | replace "placeholder-qualifier" $stage | trim | toJson }} \
                --region "${AWS_REGION}"
              echo "OK: ReindexFromSnapshot dashboard deployed"
{{- end }}
