{{- if index .Values.conditionalPackageInstalls "cert-manager" }}
apiVersion: batch/v1
kind: Job
metadata:
  name: create-selfsigned-issuer
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "50"
    helm.sh/hook-delete-policy: hook-succeeded
spec:
  activeDeadlineSeconds: 600
  template:
    spec:
      serviceAccountName: {{ .Values.argoWorkflowServiceAccountName | default "argo-workflow-executor" }}
      containers:
      - name: create-issuer
        image: {{ .Values.images.migrationConsole.repository }}:{{ .Values.images.migrationConsole.tag }}
        command: ["/bin/sh", "-c"]
        args:
        - |
          echo "Creating self-signed ClusterIssuer (retrying until cert-manager is ready)..."
          for i in $(seq 1 60); do
            if cat <<'EOF' | kubectl apply -f - 2>&1; then
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata:
            name: migrations-selfsigned
          spec:
            selfSigned: {}
          EOF
              echo "Self-signed ClusterIssuer created successfully."
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "ERROR: Failed to create ClusterIssuer after 60 attempts"
          exit 1
      restartPolicy: Never
  backoffLimit: 3
{{- end }}
