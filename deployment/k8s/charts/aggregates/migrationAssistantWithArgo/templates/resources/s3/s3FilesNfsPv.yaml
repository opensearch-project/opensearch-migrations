{{- if and .Values.defaultBucketConfiguration.s3Files.enabled (not .Values.defaultBucketConfiguration.useLocalStack) }}
{{- if .Values.defaultBucketConfiguration.s3Files.nfsEndpoint }}
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: snapshot-s3-nfs
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  capacity:
    storage: 1Ti  # Logical — S3 is unlimited
  accessModes:
    - ReadOnlyMany
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - nfsvers=3
    - ro
    - noatime
    - rsize=1048576
    - timeo=600
    - retrans=2
  nfs:
    server: {{ .Values.defaultBucketConfiguration.s3Files.nfsEndpoint }}
    path: /
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: snapshot-s3-nfs
spec:
  accessModes:
    - ReadOnlyMany
  resources:
    requests:
      storage: 1Ti
  volumeName: snapshot-s3-nfs
  storageClassName: ""  # Bind to the specific PV above
{{- else }}
# S3 Files is enabled but nfsEndpoint is not set.
# Create the S3 Files access point first (via the bucket creation Job or manually),
# then set defaultBucketConfiguration.s3Files.nfsEndpoint to the access point's
# NFS endpoint address and run helm upgrade.
{{- end }}
{{- end }}
