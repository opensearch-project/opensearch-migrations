{{- if .Values.defaultBucketConfiguration.create }}
apiVersion: batch/v1
kind: Job
metadata:
  name: create-s3-bucket-{{ .Release.Name }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: s3-bucket-create
      annotations:
        karpenter.sh/do-not-disrupt: "true"
    spec:
      serviceAccountName: {{ .Values.defaultBucketConfiguration.serviceAccountName }}
      restartPolicy: OnFailure
      containers:
        - name: aws-cli
          image: {{ .Values.defaultBucketConfiguration.bucketOperationImage }}
          imagePullPolicy: {{ .Values.defaultBucketConfiguration.bucketOperationImagePullPolicy }}
          env:
            {{- if .Values.defaultBucketConfiguration.useLocalStack }}
            - name: AWS_ACCESS_KEY_ID
              value: "test"
            - name: AWS_SECRET_ACCESS_KEY
              value: "test"
            {{- end }}
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: migrations-default-s3-config
                  key: AWS_REGION
            - name: S3_ENDPOINT_URL
              valueFrom:
                configMapKeyRef:
                  name: migrations-default-s3-config
                  key: ENDPOINT_HTTP
                  optional: true
            - name: BUCKET_NAME
              valueFrom:
                configMapKeyRef:
                  name: migrations-default-s3-config
                  key: BUCKET_NAME
          command:
            - /bin/sh
            - -c
            - |
              set -e
              {{ include "migration.s3Functions" . | nindent 12 }}

              # Setting up variables
              MAX_RETRIES=10
              RETRY_INTERVAL=5
              S3_ENDPOINT_FLAG=$(get_s3_endpoint_flag)

              if [ -n "${S3_ENDPOINT_URL}" ]; then
                echo "Using endpoint: $S3_ENDPOINT_URL"
              fi
              echo "Target bucket for creation: $BUCKET_NAME"

              # Wait for S3 to be available
              retry_count=0
              while ! check_s3_available; do
                retry_count=$((retry_count + 1))
                if [ $retry_count -ge $MAX_RETRIES ]; then
                  echo "S3 endpoint not available after $MAX_RETRIES attempts. Exiting."
                  exit 1
                fi
                echo "S3 endpoint not available yet. Retrying in $RETRY_INTERVAL seconds... (Attempt $retry_count/$MAX_RETRIES)"
                sleep $RETRY_INTERVAL
              done

              echo "S3 endpoint is available. Proceeding with bucket operations."

              # Check if bucket exists
              if bucket_exists "$BUCKET_NAME"; then
                echo "Bucket $BUCKET_NAME already exists."
              else
                echo "Creating bucket $BUCKET_NAME..."
                aws $S3_ENDPOINT_FLAG s3 mb s3://"$BUCKET_NAME"

                # Verify bucket creation
                if bucket_exists "$BUCKET_NAME" 5; then
                  echo "Successfully created bucket $BUCKET_NAME."
                else
                  echo "Failed to create bucket $BUCKET_NAME."
                  exit 1
                fi
              fi

              # List all buckets to confirm
              echo "Listing all buckets:"
              aws $S3_ENDPOINT_FLAG s3 ls

              {{- if and .Values.defaultBucketConfiguration.s3Files.enabled (not .Values.defaultBucketConfiguration.useLocalStack) }}
              # Create S3 Files access point for NFS access to the bucket.
              # This creates ENIs in the specified VPC/subnets that serve NFSv3.
              S3FILES_ENDPOINT="https://s3files.${AWS_REGION}.amazonaws.com"
              AP_NAME="{{ .Values.defaultBucketConfiguration.s3Files.accessPointName }}"
              if [ -z "$AP_NAME" ]; then
                AP_NAME="${BUCKET_NAME}-nfs"
              fi

              echo "Creating S3 Files access point '$AP_NAME' for bucket $BUCKET_NAME..."
              echo "  VpcId: {{ .Values.defaultBucketConfiguration.s3Files.vpcId }}"
              echo "  SubnetIds: {{ join "," .Values.defaultBucketConfiguration.s3Files.subnetIds }}"
              echo "  CacheTTL: {{ .Values.defaultBucketConfiguration.s3Files.cacheTTLSeconds }}s"

              # Use the S3 Files service endpoint directly
              AP_RESPONSE=$(aws --endpoint-url "$S3FILES_ENDPOINT" \
                --region "$AWS_REGION" \
                s3files create-access-point \
                --access-point-name "$AP_NAME" \
                --bucket-name "$BUCKET_NAME" \
                --vpc-id "{{ .Values.defaultBucketConfiguration.s3Files.vpcId }}" \
                --subnet-ids {{ range .Values.defaultBucketConfiguration.s3Files.subnetIds }}"{{ . }}" {{ end }} \
                --files-cache-configuration "DurationSeconds={{ .Values.defaultBucketConfiguration.s3Files.cacheTTLSeconds }}" \
                --client-token "$(cat /proc/sys/kernel/random/uuid)" \
                --output json 2>&1) || true

              if echo "$AP_RESPONSE" | grep -q "AccessPointId"; then
                AP_ID=$(echo "$AP_RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['AccessPointId'])" 2>/dev/null || echo "")
                echo "S3 Files access point created: ID=$AP_ID"
              elif echo "$AP_RESPONSE" | grep -q "already exists\|ConflictException"; then
                echo "S3 Files access point '$AP_NAME' already exists."
              else
                echo "Warning: S3 Files access point creation response: $AP_RESPONSE"
                echo "The access point may need to be created manually."
              fi

              # Query the access point to get the NFS endpoint
              echo "Querying access point endpoint..."
              AP_INFO=$(aws --endpoint-url "$S3FILES_ENDPOINT" \
                --region "$AWS_REGION" \
                s3files get-access-point \
                --access-point-id "$AP_NAME" \
                --output json 2>&1) || true
              echo "Access point info: $AP_INFO"
              {{- end }}
{{- end }}
