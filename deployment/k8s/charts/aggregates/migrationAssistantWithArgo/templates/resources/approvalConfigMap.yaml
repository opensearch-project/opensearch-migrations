# Default empty approval configmap required by Argo v4.0+
# Argo v4.0 requires configmaps referenced by valueFrom.configMapKeyRef to have
# the label workflows.argoproj.io/configmap-type: Parameter to be detectable.
# This configmap is overwritten by the config-processor when a migration is initialized.
apiVersion: v1
kind: ConfigMap
metadata:
  name: approval-config
  labels:
    workflows.argoproj.io/configmap-type: Parameter
data:
  autoApprove: "{}"
