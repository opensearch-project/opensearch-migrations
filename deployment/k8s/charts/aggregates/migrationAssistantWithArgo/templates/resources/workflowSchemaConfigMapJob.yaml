apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-workflow-schema-generator
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Values.installer.serviceAccount.name }}
      restartPolicy: Never
      containers:
        - name: workflow-schema-generator
          image: {{ .Values.images.installer.repository }}:{{ .Values.images.installer.tag }}
          imagePullPolicy: {{ .Values.images.installer.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              set -euo pipefail

              OPENAPI_PATH=/tmp/strimzi-openapi.json
              SCHEMA_PATH=/tmp/workflowMigration.schema.json
              SAMPLE_PATH=/tmp/sample.yaml

              echo "Waiting for Strimzi OpenAPI to become available..."
              for attempt in $(seq 1 180); do
                if kubectl get --raw /openapi/v3/apis/kafka.strimzi.io/v1 > "$OPENAPI_PATH" 2>/dev/null; then
                  break
                fi
                if [ "$attempt" -eq 180 ]; then
                  echo "Timed out waiting for Strimzi OpenAPI /openapi/v3/apis/kafka.strimzi.io/v1"
                  exit 1
                fi
                sleep 2
              done

              echo "Generating unified workflow schema from live Strimzi OpenAPI..."
              ${NODEJS:-node-22} /root/configProcessor/index.js buildUnifiedSchema \
                --strimzi-openapi "$OPENAPI_PATH" \
                --output "$SCHEMA_PATH"

              echo "Generating sample workflow config..."
              ${NODEJS:-node-22} /root/configProcessor/index.js makeSample > "$SAMPLE_PATH"
              printf '# yaml-language-server: $schema=/root/schema/workflowMigration.schema.json\n%s' "$(cat "$SAMPLE_PATH")" > "$SAMPLE_PATH"

              if kubectl get configmap {{ .Release.Name }}-workflow-schema --namespace {{ .Release.Namespace }} >/dev/null 2>&1; then
                kubectl create configmap {{ .Release.Name }}-workflow-schema \
                  --namespace {{ .Release.Namespace }} \
                  --from-file=workflowMigration.schema.json="$SCHEMA_PATH" \
                  --from-file=sample.yaml="$SAMPLE_PATH" \
                  --dry-run=client -o yaml | kubectl replace -f -
              else
                kubectl create configmap {{ .Release.Name }}-workflow-schema \
                  --namespace {{ .Release.Namespace }} \
                  --from-file=workflowMigration.schema.json="$SCHEMA_PATH" \
                  --from-file=sample.yaml="$SAMPLE_PATH"
              fi
