{{- if get .Values.conditionalPackageInstalls "otel-collector-daemonset" }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-collector
  namespace: {{ .Release.Namespace }}
  labels:
    app: otel-collector
spec:
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      serviceAccountName: {{ .Values.otelConfiguration.serviceAccountName }}
      containers:
        - name: otel-collector
          image: {{ .Values.otelCollectorImage | default "public.ecr.aws/aws-observability/aws-otel-collector:v0.43.3" }}
          env:
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: OTEL_CONFIG_LOG
              value: "true"
            - name: OTEL_LOG_LEVEL
              value: "debug"
            - name: QUALIFIER
              value: {{ .Values.stageName }}
            - name: TRACE_SAMPLING_PERCENTAGE
              value: "1"
{{- if .Values.otelConfiguration.env }}
{{ toYaml .Values.otelConfiguration.env | indent 12 }}
{{- end }}
          args:
            - "--config=/etc/otel/collector.yaml"
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: prometheus
              containerPort: 8889
            - name: zpages
              containerPort: 55679
            - name: pprof
              containerPort: 1888
          resources:
            limits:
              cpu: 500m
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 200Mi
          volumeMounts:
            - name: otel-collector-config
              mountPath: /etc/otel/
      tolerations:
        - operator: Exists
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: karpenter.sh/nodepool
                    operator: NotIn
                    values:
                      - dedicated-small-instance-migration-console-pool
      volumes:
        - name: otel-collector-config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: {{ .Release.Namespace }}
data:
  collector.yaml: |
{{ .Values.otelConfiguration.collectorConfig | indent 4 }}

---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: {{ .Release.Namespace }}
  labels:
    app: otel-collector
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
    - name: prometheus
      port: 8889
      targetPort: prometheus
---
# ServiceMonitor CRD comes from kube-prometheus-stack, which is installed by the
# pre-install chart installer job. Helm caches API discovery before running hooks,
# so it can't validate ServiceMonitor resources directly. We apply it via kubectl
# in a post-install Job instead.
apiVersion: batch/v1
kind: Job
metadata:
  name: create-otel-service-monitor
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  activeDeadlineSeconds: 120
  template:
    metadata:
      annotations:
        karpenter.sh/do-not-disrupt: "true"
    spec:
      serviceAccountName: {{ .Values.argoWorkflowServiceAccountName | default "argo-workflow-executor" }}
      containers:
      - name: apply-monitor
        image: {{ .Values.images.installer.repository }}:{{ .Values.images.installer.tag }}
        command: ["/bin/sh", "-c"]
        args:
        - |
          echo "Waiting for ServiceMonitor CRD to be established..."
          kubectl wait --for=condition=Established crd/servicemonitors.monitoring.coreos.com --timeout=120s
          echo "Creating ServiceMonitor for otel-collector..."
          cat <<'EOF' | kubectl apply -f -
          apiVersion: monitoring.coreos.com/v1
          kind: ServiceMonitor
          metadata:
            name: otel-collector-monitor
            namespace: {{ .Release.Namespace }}
            labels:
              app: otel-collector
              release: kube-prometheus-stack
          spec:
            selector:
              matchLabels:
                app: otel-collector
            namespaceSelector:
              matchNames:
                - {{ .Release.Namespace }}
            endpoints:
              - port: prometheus
                interval: 15s
                path: /metrics
          EOF
          echo "ServiceMonitor created successfully."
      restartPolicy: Never
  backoffLimit: 2
{{- end }}
