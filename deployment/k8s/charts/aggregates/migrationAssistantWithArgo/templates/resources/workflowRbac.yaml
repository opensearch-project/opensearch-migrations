{{ if get .Values.conditionalPackageInstalls "argo-workflows" }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-workflow-executor
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: workflow-deployer-role
  namespace: {{ .Release.Namespace }}
rules:
  # Existing permissions for deployments and replicasets
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]

  # Namespace-scoped batch jobs (metadata migration) and cronjobs
  # (RFS-completion monitor — see rfsDoneCronJob design doc).
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]

  # Add permissions for Argo workflows
  - apiGroups: ["argoproj.io"]
    resources: ["workflows", "workflows/finalizers", "workflowtemplates", "workflowtemplates/finalizers", "workflowtaskresults" ]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]

  # Add permissions for pods and pod logs (needed for Argo workflow execution)
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "secrets", "configmaps", "serviceaccounts"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]

  # For services
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]

  # ServiceMonitor resources (created by post-install hook for otel-collector)
  - apiGroups: ["monitoring.coreos.com"]
    resources: ["servicemonitors"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]

  # OpenSearch migration custom resources
  - apiGroups: ["migrations.opensearch.org"]
    resources: ["approvalgates",      "approvalgates/status",
                "capturedtraffics",   "capturedtraffics/status",
                "captureproxies",     "captureproxies/status",
                "datasnapshots",      "datasnapshots/status",
                "kafkaclusters",      "kafkaclusters/status",
                "snapshotmigrations", "snapshotmigrations/status",
                "trafficreplays",     "trafficreplays/status"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]

  # Kafka resources permissions
  - apiGroups: ["kafka.strimzi.io"]
    resources: ["kafkas", "kafkatopics", "kafkanodepools", "kafkausers"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]

  # cert-manager Certificate resources (namespace-scoped)
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates", "certificates/status"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]

  # ACK ACM PCA resources (created by awsPrivateCaIssuerHook when awsPrivateCA.create=true)
  - apiGroups: ["acmpca.services.k8s.aws"]
    resources: ["certificateauthorities", "certificateauthorities/status"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]

  # Allow Argo workflow to perform Helm installs for source and target clusters
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: workflow-deployer-rolebinding
  namespace: {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: argo-workflow-executor
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: workflow-deployer-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Namespace }}-cert-issuer-manager
rules:
  - apiGroups: ["cert-manager.io"]
    resources: ["clusterissuers"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
  - apiGroups: ["awspca.cert-manager.io"]
    resources: ["awspcaclusterissuers"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Namespace }}-cert-issuer-manager-binding
subjects:
  - kind: ServiceAccount
    name: argo-workflow-executor
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ .Release.Namespace }}-cert-issuer-manager
  apiGroup: rbac.authorization.k8s.io
---
# ClusterRole for ValidatingAdmissionPolicies (cluster-scoped resources)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Namespace }}-vap-manager
rules:
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: ["validatingadmissionpolicies", "validatingadmissionpolicybindings"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Namespace }}-vap-manager-binding
subjects:
  - kind: ServiceAccount
    name: argo-workflow-executor
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ .Release.Namespace }}-vap-manager
  apiGroup: rbac.authorization.k8s.io
{{ end }}
