    plural: datasnapshots
    singular: datasnapshot
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                snapshotPrefix:
                  type: string
                indexAllowlist:
                  type: array
                  items:
                    type: string
                maxSnapshotRateMbPerNode:
                  type: integer
                jvmArgs:
                  type: string
                loggingConfigurationOverrideConfigMap:
                  type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Initialized, Running, Completed, Error]
                snapshotName:
                  type: string
