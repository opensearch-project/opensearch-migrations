---
# CapturedTraffic: represents a capture proxy and its configuration.
# Long-lived resource — transitions to Ready when the proxy is serving traffic.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: capturedtraffics.migrations.opensearch.org
spec:
  group: migrations.opensearch.org
  names:
    kind: CapturedTraffic
    plural: capturedtraffics
    singular: capturedtraffic
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                # Deployment-level fields
                loggingConfigurationOverrideConfigMap:
                  type: string
                podReplicas:
                  type: integer
                  minimum: 0
                resources:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                # Proxy CLI params
                otelCollectorEndpoint:
                  type: string
                setHeader:
                  type: array
                  items:
                    type: string
                destinationConnectionPoolSize:
                  type: integer
                destinationConnectionPoolTimeout:
                  type: string
                kafkaClientId:
                  type: string
                listenPort:
                  type: integer
                maxTrafficBufferSize:
                  type: integer
                noCapture:
                  type: boolean
                numThreads:
                  type: integer
                sslConfigFile:
                  type: string
                tls:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                enableMSKAuth:
                  type: boolean
                internetFacing:
                  type: boolean
                kafkaClusterName:
                  type: string
                kafkaTopicName:
                  type: string
                suppressCaptureForHeaderMatch:
                  type: array
                  items:
                    type: string
                suppressCaptureForMethod:
                  type: string
                suppressCaptureForUriPath:
                  type: string
                suppressMethodAndPath:
                  type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Initialized, Running, Ready, Error]
                deploymentName:
                  type: string
                lastAppliedGeneration:
                  type: integer
                configChecksum:
                  type: string
                checksumForSnapshot:
                  type: string
                checksumForReplayer:
                  type: string
              x-kubernetes-preserve-unknown-fields: true
---
