{{- if and (eq .Values.cloudProvider "gcp") .Values.gcsBucketConfiguration.create }}
apiVersion: batch/v1
kind: Job
metadata:
  name: create-gcs-bucket-{{ .Release.Name }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: gcs-bucket-create
      annotations:
        karpenter.sh/do-not-disrupt: "true"
    spec:
      serviceAccountName: {{ .Values.gcsBucketConfiguration.serviceAccountName }}
      restartPolicy: OnFailure
      containers:
        - name: gcloud
          image: {{ .Values.gcsBucketConfiguration.bucketOperationImage }}
          imagePullPolicy: {{ .Values.gcsBucketConfiguration.bucketOperationImagePullPolicy }}
          env:
            - name: GCS_BUCKET_NAME
              valueFrom:
                configMapKeyRef:
                  name: migrations-default-gcs-config
                  key: GCS_BUCKET_NAME
            - name: GCS_ENDPOINT_URL
              valueFrom:
                configMapKeyRef:
                  name: migrations-default-gcs-config
                  key: GCS_ENDPOINT_URL
                  optional: true
          command:
            - /bin/sh
            - -c
            - |
              set -e
              {{ include "migration.gcsFunctions" . | nindent 12 }}

              MAX_RETRIES=10
              RETRY_INTERVAL=5

              echo "Target bucket for creation: $GCS_BUCKET_NAME"

              retry_count=0
              while ! check_gcs_available; do
                retry_count=$((retry_count + 1))
                if [ $retry_count -ge $MAX_RETRIES ]; then
                  echo "GCS not available after $MAX_RETRIES attempts. Exiting."
                  exit 1
                fi
                echo "GCS not available yet. Retrying in $RETRY_INTERVAL seconds... (Attempt $retry_count/$MAX_RETRIES)"
                sleep $RETRY_INTERVAL
              done

              if bucket_exists "$GCS_BUCKET_NAME"; then
                echo "Bucket $GCS_BUCKET_NAME already exists."
              else
                echo "Creating bucket $GCS_BUCKET_NAME..."
                gcloud storage buckets create "gs://$GCS_BUCKET_NAME"

                if bucket_exists "$GCS_BUCKET_NAME" 5; then
                  echo "Successfully created bucket $GCS_BUCKET_NAME."
                else
                  echo "Failed to create bucket $GCS_BUCKET_NAME."
                  exit 1
                fi
              fi

              echo "Listing buckets:"
              gcloud storage buckets list
{{- end }}
