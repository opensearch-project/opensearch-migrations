{{- $useLocalGcs := index .Values.conditionalPackageInstalls "fake-gcs-server" | default false }}
{{- if or (eq .Values.cloudProvider "gcp") $useLocalGcs }}
{{- $gcpProject := or .Values.gcp.project "" }}
{{- $bucketName := .Values.gcsBucketConfiguration.bucketName | default (ternary "migration-test-bucket" (printf "migration-snapshots-%s" $gcpProject) $useLocalGcs) }}
{{- $localEndpoint := printf "http://%s.%s.svc.cluster.local:4443" .Values.gcsBucketConfiguration.localGcsEndpoint .Release.Namespace }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: migrations-default-gcs-config
  labels:
    workflows.argoproj.io/configmap-type: Parameter
data:
  GCS_BUCKET_NAME: {{ $bucketName | quote }}
  {{- if .Values.gcsBucketConfiguration.useLocalGcs }}
  GCS_ENDPOINT_URL: {{ $localEndpoint | quote }}
  ENDPOINT: {{ $localEndpoint | quote }}
  {{- else }}
  GCS_ENDPOINT_URL: {{ .Values.gcsBucketConfiguration.endpoint | default "" | quote }}
  ENDPOINT: {{ .Values.gcsBucketConfiguration.endpoint | default "" | quote }}
  {{- end }}
  BUCKET_URI: {{ printf "gs://%s" $bucketName | quote }}
  # TODO: SNAPSHOT_ROLE_ARN and AWS_REGION are AWS-specific and have no meaning
  # for GCS or future providers (e.g. Azure Blob Storage). They are present here
  # as empty strings only because Argo v4 does not honor optional:true on
  # configMapKeyRef input parameters and fails parameter resolution if the key
  # is absent. This should be fixed by moving these fields out of the shared
  # snapshot configmap into a provider-specific source.
  SNAPSHOT_ROLE_ARN: ""
  AWS_REGION: ""
{{- end }}
