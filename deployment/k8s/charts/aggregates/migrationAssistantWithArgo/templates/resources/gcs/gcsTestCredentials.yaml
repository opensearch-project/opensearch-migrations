{{- if index .Values.conditionalPackageInstalls "fake-gcs-server" }}
{{- /*
  Dummy service-account credentials for local GCS testing.

  Elasticsearch's repository-gcs plugin requires service_account credentials
  (it rejects the authorized_user type) and signs a JWT with this private key
  before exchanging it for a token at token_uri (gcs-token-stub). Neither
  fake-gcs-server nor the stub validates the key or the resulting token, so
  this is a throwaway RSA key that signs nothing real and grants no access to
  anything. It exists only so the auth handshake completes against the local
  emulator. Deployed only when fake-gcs-server is enabled.

  Mounted into the source Elasticsearch cluster's keystore-init container,
  which loads it via `elasticsearch-keystore add-file
  gcs.client.default.credentials_file`.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: gcs-test-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    workflows.argoproj.io/configmap-type: Parameter
