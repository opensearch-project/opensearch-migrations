---
# CRDs for migration component configuration options
# These serve as the source of truth for component settings and are protected by VAPs
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: proxyconfigs.migrations.opensearch.org
spec:
  group: migrations.opensearch.org
  names:
    kind: ProxyConfig
    plural: proxyconfigs
    singular: proxyconfig
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                # Deployment-level fields
                loggingConfigurationOverrideConfigMap:
                  type: string
                podReplicas:
                  type: integer
                  minimum: 0
                resources:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                # Proxy CLI params
                otelCollectorEndpoint:
                  type: string
                setHeader:
                  type: array
                  items:
                    type: string
                destinationConnectionPoolSize:
                  type: integer
                destinationConnectionPoolTimeout:
                  type: string
                kafkaClientId:
                  type: string
                listenPort:
                  type: integer
                maxTrafficBufferSize:
                  type: integer
                internetFacing:
                  type: boolean
                noCapture:
                  type: boolean
                numThreads:
                  type: integer
                sslConfigFile:
                  type: string
                tls:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                enableMSKAuth:
                  type: boolean
                suppressCaptureForHeaderMatch:
                  type: array
                  items:
                    type: string
                suppressCaptureForMethod:
                  type: string
                suppressCaptureForUriPath:
                  type: string
                suppressMethodAndPath:
                  type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Deployed, Failed]
                deploymentName:
                  type: string
                lastAppliedGeneration:
                  type: integer
              x-kubernetes-preserve-unknown-fields: true
---
