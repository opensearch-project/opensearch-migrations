{{- if eq .Values.cloudProvider "gcp" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: gcp-metadata
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-1"
data:
  CLOUD_PROVIDER: "gcp"
  GCP_PROJECT: {{ .Values.gcp.project | quote }}
  GCP_REGION: {{ .Values.gcp.region | quote }}
  GKE_CLUSTER_NAME: {{ .Values.gcp.clusterName | quote }}
{{- end }}
