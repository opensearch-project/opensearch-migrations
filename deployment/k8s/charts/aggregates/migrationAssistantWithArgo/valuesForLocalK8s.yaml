# Development-specific values for local kubernetes environments

conditionalPackageInstalls:
  kyverno: true

# Kyverno policy toggles (requires kyverno to be installed)
kyvernoPolicies:
  zeroResourceRequests: true
  mountLocalAwsCreds: false
  mountLocalAwsCredsPath: "~/.aws"

# Override image pull policy for dev - always pull latest
images:
  captureProxy:
    repository: localhost:5000/migrations/capture_proxy
    pullPolicy: Always
  trafficReplayer:
    repository: localhost:5000/migrations/traffic_replayer
    pullPolicy: Always
  reindexFromSnapshot:
    repository: localhost:5000/migrations/reindex_from_snapshot
    pullPolicy: Always
  migrationConsole:
    repository: localhost:5000/migrations/migration_console
    pullPolicy: Always
  installer:
    repository: localhost:5000/migrations/migration_console
    pullPolicy: Always

# Kyverno chart configuration
charts:
  # Preserve local developer install speed for charts that previously did not
  # use helm --wait before installer.defaultWaitForInstallation became true.
  aws-privateca-issuer:
    waitForInstallation: false

  ack-acmpca-controller:
    waitForInstallation: false

  opentelemetry-operator:
    waitForInstallation: false

  cert-manager:
    values:
      replicaCount: 1
      podDisruptionBudget:
        enabled: false
      cainjector:
        replicaCount: 1
        podDisruptionBudget:
          enabled: false
      webhook:
        replicaCount: 1
        podDisruptionBudget:
          enabled: false

  kyverno:
    values:
      webhooksCleanup:
        image:
          registry: ""
          repository: localhost:5000/migrations/migration_console
          tag: latest


  localstack:
    waitForInstallation: false
    values:
      persistence:
        enabled: true

  strimzi-kafka-operator:
    waitForInstallation: false
    values:
      # Recommended baseline resources to ensure the JVM has enough heap for metadata
      resources:
        requests:
          cpu: "250m"
          memory: "512Mi"
        limits:
          cpu: "1000m"
          memory: "1Gi"

  argo-workflows:
    waitForInstallation: false
    values:
      # LocalStack uses static credentials for S3 artifact storage
      useStaticCredentials: true
      artifactRepository:
        s3:
          insecure: true
          accessKeySecret:
            name: argo-artifact-s3-creds
            key: accessKey
          secretKeySecret:
            name: argo-artifact-s3-creds
            key: secretKey
      controller:
        replicas: 1
        pdb:
          enabled: false
      server:
        replicas: 1
        pdb:
          enabled: false

  fluent-bit:
    waitForInstallation: false

  kube-prometheus-stack:
    waitForInstallation: false

  grafana:
    waitForInstallation: false

  jaeger:
    waitForInstallation: false
