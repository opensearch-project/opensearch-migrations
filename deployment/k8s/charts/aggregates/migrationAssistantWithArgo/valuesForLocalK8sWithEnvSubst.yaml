# Development-specific values for local kubernetes environments

conditionalPackageInstalls:
  kyverno: true

# Kyverno policy toggles (requires kyverno to be installed)
kyvernoPolicies:
  zeroResourceRequests: true
  mountLocalAwsCreds: false
  mountLocalAwsCredsPath: "~/.aws"

# Override image pull policy for dev - always pull latest
images:
  captureProxy:
    repository: ${imageRegistryPrefix}migrations/capture_proxy
    pullPolicy: Always
  trafficReplayer:
    repository: ${imageRegistryPrefix}migrations/traffic_replayer
    pullPolicy: Always
  reindexFromSnapshot:
    repository: ${imageRegistryPrefix}migrations/reindex_from_snapshot
    pullPolicy: Always
  migrationConsole:
    repository: ${imageRegistryPrefix}migrations/migration_console
    pullPolicy: Always
  installer:
    repository: ${imageRegistryPrefix}migrations/migration_console
    pullPolicy: Always

# Kyverno chart configuration
charts:
  # Preserve local developer install speed for charts that previously did not
  # use helm --wait before installer.defaultWaitForInstallation became true.
  aws-privateca-issuer:
    waitForInstallation: false

  ack-acmpca-controller:
    waitForInstallation: false

  opentelemetry-operator:
    waitForInstallation: false

  kyverno:
    values:
      webhooksCleanup:
        image:
          registry: ""
          repository: ${imageRegistryPrefix}migrations/migration_console
          tag: latest

  localstack:
    waitForInstallation: false
    values:
      persistence:
        enabled: true

  strimzi-kafka-operator:
    waitForInstallation: false
    values:
      # Decrease probe thresholds to make deployment times faster (but less reliable under stress)
      readinessProbe:
        initialDelaySeconds: 5
        periodSeconds: 2
        timeoutSeconds: 5
        failureThreshold: 1
      livenessProbe:
        initialDelaySeconds: 5
        periodSeconds: 2
        timeoutSeconds: 3
        failureThreshold: 1

      # Recommended baseline resources to ensure the JVM has enough heap for metadata
      resources:
        requests:
          cpu: "250m"
          memory: "512Mi"
        limits:
          cpu: "1000m"
          memory: "1Gi"

      # Similar to the timeouts for the operator, clock some probes way down to speed up deployments
      kafka:
        template:
          pod:
            readinessProbe:
              initialDelaySeconds: 5
              periodSeconds: 5
              timeoutSeconds: 3
              failureThreshold: 1

        readinessProbe:
          initialDelaySeconds: 5
          periodSeconds: 2
          timeoutSeconds: 3
          failureThreshold: 1
        livenessProbe:
          initialDelaySeconds: 5
          periodSeconds: 2
          timeoutSeconds: 3
          failureThreshold: 1


  argo-workflows:
    waitForInstallation: false
    values:
      # LocalStack uses static credentials for S3 artifact storage
      useStaticCredentials: true
      artifactRepository:
        s3:
          insecure: true
          accessKeySecret:
            name: argo-artifact-s3-creds
            key: accessKey
          secretKeySecret:
            name: argo-artifact-s3-creds
            key: secretKey
      controller:
        replicas: 1
        pdb:
          enabled: false
      server:
        replicas: 1
        pdb:
          enabled: false

  fluent-bit:
    waitForInstallation: false

  kube-prometheus-stack:
    waitForInstallation: false

  grafana:
    waitForInstallation: false

  jaeger:
    waitForInstallation: false
