{{- if and .Values.conditionalPackageInstalls.opensearch .Values.nodePortServices.opensearch.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-opensearch-nodeport
  labels:
    app.kubernetes.io/name: opensearch
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  type: NodePort
  ports:
    - port: 9200
      targetPort: 9200
      nodePort: {{ .Values.nodePortServices.opensearch.nodePort }}
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: opensearch
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
