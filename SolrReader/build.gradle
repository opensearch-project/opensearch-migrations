plugins {
    id 'org.opensearch.migrations.java-library-conventions'
    id 'io.freefair.lombok'
    id 'java-test-fixtures'
}

evaluationDependsOn ':SearchSnapshotExtractor'

dependencies {
    implementation project(':RfsPipeline')
    implementation project(':RfsCommon')
    implementation project(':RfsHttp')
    implementation project(':SearchSnapshotExtractor')

    // Shadow lucene jars for reading Solr backup files across versions:
    //   Solr 6 → Lucene 6, Solr 7 → Lucene 7, Solr 8/9 → Lucene 9 (8 via backward-codecs).
    implementation project(':SearchSnapshotExtractor').tasks.named('shadowLucene6').map { it.outputs.files }
    implementation project(':SearchSnapshotExtractor').tasks.named('shadowLucene7').map { it.outputs.files }
    implementation project(':SearchSnapshotExtractor').tasks.named('shadowLucene9').map { it.outputs.files }

    implementation libs.jackson.databind
    implementation libs.jackson.core
    implementation libs.jackson.dataformat.smile
    implementation libs.reactor.core
    implementation libs.slf4j.api

    testFixturesImplementation libs.testcontainers
    testFixturesImplementation libs.slf4j.api

    testImplementation project(':RFS')
    testImplementation project(':RfsPipeline')
    testImplementation testFixtures(project(':RFS'))
    testImplementation testFixtures(project(':SolrReader'))
    testImplementation testFixtures(project(':RfsPipeline'))
    testImplementation libs.reactor.test
    testImplementation libs.testcontainers
    testImplementation libs.hamcrest
    testImplementation libs.junit.jupiter.api
    testImplementation libs.junit.jupiter.params
    testImplementation libs.log4j.core
    testImplementation libs.log4j.slf4j2.impl

    testRuntimeOnly libs.junit.jupiter.engine
}
