# Capture proxy with AWS PCA-signed TLS certificate
# Demonstrates TLS certificate provisioning via cert-manager + AWS Private CA
kafkaClusterConfiguration:
  default:
    autoCreate: {}

sourceClusters:
  source:
    endpoint: "https://opensearch-cluster-master-headless:9200"
    allowInsecure: true
    version: "OS 2.19"

targetClusters:
  target:
    endpoint: "https://opensearch-cluster-master-headless:9200"
    allowInsecure: true

snapshotMigrationConfigs: []

traffic:
  proxies:
    capture-proxy:
      source: "source"
      proxyConfig:
        listenPort: 9201
        noCapture: true
        tls:
          mode: "certManager"
          issuerRef:
            name: "aws-pca-issuer"
            kind: "ClusterIssuer"
            group: "awspca.cert-manager.io"
          dnsNames:
            - "capture-proxy.ma.svc.cluster.local"
            - "capture-proxy"
          duration: "2160h"
          renewBefore: "360h"
  replayers:
    replay1:
      fromProxy: "capture-proxy"
      toTarget: "target"
