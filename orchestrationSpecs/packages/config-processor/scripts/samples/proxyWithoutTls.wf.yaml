# Capture proxy with self-signed TLS certificate (for minikube / non-AWS)
kafkaClusterConfiguration:
  default:
    autoCreate: {}

sourceClusters:
  source:
    endpoint: "https://elasticsearch-master-headless:9200"
    allowInsecure: true
    version: "ES 7.10.2"

targetClusters:
  target:
    endpoint: "https://opensearch-cluster-master-headless:9200"
    allowInsecure: true

snapshotMigrationConfigs: []

traffic:
  proxies:
    capture-proxy:
      source: "source"
      proxyConfig:
        listenPort: 9201

  replayers:
    replay1:
      fromProxy: "capture-proxy"
      toTarget: "target"
