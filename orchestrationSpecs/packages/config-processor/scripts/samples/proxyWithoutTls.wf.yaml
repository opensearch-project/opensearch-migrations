# Capture proxy without frontside TLS using an auto-created Strimzi Kafka cluster.
# This is the workflow-managed Kafka default variant.
# It omits autoCreate.auth and relies on transform-time policy, which currently
# resolves workflow-managed Kafka auth to SCRAM-SHA-512. That means the
# migration applications use the TLS listener, bootstrap on 9093, and generated
# Kafka user / secret resources.
kafkaClusterConfiguration:
  custom:
    autoCreate:
      clusterSpecOverrides:
        kafka:
          config:
            add.partitions.to.txn.retry.backoff.max.ms: 100

sourceClusters:
  source:
    endpoint: "https://elasticsearch-master-headless:9200"
    allowInsecure: true
    version: "ES 7.10.2"
    authConfig:
      basic:
        secretName: "source-creds"

targetClusters:
  target:
    endpoint: "https://opensearch-cluster-master-headless:9200"
    allowInsecure: true
    authConfig:
      basic:
        secretName: "target-creds"

snapshotMigrationConfigs: []

traffic:
  proxies:
    capture-proxy:
      kafka: custom
      source: "source"
      proxyConfig:
        listenPort: 9201

  replayers:
    replay1:
      fromProxy: "capture-proxy"
      toTarget: "target"
