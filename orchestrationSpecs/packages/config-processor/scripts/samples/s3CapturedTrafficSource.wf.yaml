# Bring-your-own captured traffic: replay from a previously-exported S3 dump.
# No CaptureProxy is created — the workflow loads the gzipped TrafficStream
# archive (kafkaExport.sh format) onto a Kafka topic exactly once, then the
# replayer consumes from that topic.
#
# To swap in your own dump, change s3Uri / awsRegion to a bucket the
# workflow's service account can read.
kafkaClusterConfiguration:
  default:
    autoCreate:
      auth:
        type: "none"
      # Single-broker, RF=1 — POC only, not safe for prod.
      clusterSpecOverrides:
        kafka:
          config:
            offsets.topic.replication.factor: 1
            transaction.state.log.replication.factor: 1
            transaction.state.log.min.isr: 1
            default.replication.factor: 1
            min.insync.replicas: 1
      nodePoolSpecOverrides:
        replicas: 1
        roles:
          - controller
          - broker
        storage:
          type: persistent-claim
          size: 1Gi
          deleteClaim: true
      topicSpecOverrides:
        partitions: 1
        replicas: 1
        config:
          retention.ms: 604800000
          segment.bytes: 1073741824

# No live source needed for replay — the dump captures it. We still declare
# a source to satisfy schema requirements; sourceLabel inside s3Sources
# carries the original-source label for downstream resource labeling.
sourceClusters:
  source:
    endpoint: "https://elasticsearch-master-headless:9200"
    allowInsecure: true
    version: "ES 7.10.2"
    authConfig:
      basic:
        secretName: "source-creds"

targetClusters:
  target:
    endpoint: "https://opensearch-cluster-master-headless:9200"
    allowInsecure: true
    authConfig:
      basic:
        secretName: "target-creds"

snapshotMigrationConfigs: []

traffic:
  s3Sources:
    dump:
      s3Uri: "s3://byo-traffic/kafka_export_slice_10k.proto.gz"
      awsRegion: "us-east-2"
      # endpoint is for local LocalStack testing only — drop this line for
      # real S3. With it set, the loader auto-mounts localstack-test-creds.
      endpoint: "http://localstack.ma.svc.cluster.local:4566"
      sourceLabel: "source"

  replayers:
    replay1:
      fromCapturedTraffic: "dump"
      toTarget: "target"
      replayerConfig:
        speedupFactor: 30
