# Capture proxy without frontside TLS using an auto-created Strimzi Kafka cluster
# with authentication explicitly disabled for the migration applications.
# Use this variant when you want workflow-managed Kafka but do not want the
# secure-by-default SCRAM behavior.
kafkaClusterConfiguration:
  default:
    autoCreate:
      auth:
        type: "none"

sourceClusters:
  source:
    endpoint: "https://elasticsearch-master-headless:9200"
    allowInsecure: true
    version: "ES 7.10.2"
    authConfig:
      basic:
        secretName: "source-creds"

targetClusters:
  target:
    endpoint: "https://opensearch-cluster-master-headless:9200"
    allowInsecure: true
    authConfig:
      basic:
        secretName: "target-creds"

snapshotMigrationConfigs: []

traffic:
  proxies:
    capture-proxy:
      source: "source"
      proxyConfig:
        listenPort: 9201

  replayers:
    replay1:
      fromProxy: "capture-proxy"
      toTarget: "target"
