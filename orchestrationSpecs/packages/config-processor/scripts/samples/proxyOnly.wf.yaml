# Proxy-only: capture proxy + replayer, no snapshot migration.
# Minimal config for fast e2e test cycles (~2-3 min vs ~12 min).
skipApprovals: true
kafkaClusterConfiguration:
  default:
    autoCreate: {}

sourceClusters:
  source:
    endpoint: "https://elasticsearch-master-headless:9200"
    allowInsecure: true
    version: "ES 7.10"
    authConfig:
      basic:
        secretName: "source-creds"

targetClusters:
  target:
    endpoint: "https://opensearch-cluster-master-headless:9200"
    allowInsecure: true
    authConfig:
      basic:
        secretName: "target-creds"

snapshotMigrationConfigs: []

traffic:
  proxies:
    capture-proxy:
      source: "source"
      proxyConfig:
        listenPort: 9201
  replayers:
    replay1:
      fromProxy: "capture-proxy"
      toTarget: "target"
