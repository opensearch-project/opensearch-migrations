# Load Test Traffic Generator
#
# Pre-requisite: build the capture proxy image from the repo root:
#   cd /path/to/opensearch-migrations && ./gradlew :TrafficCapture:trafficCaptureProxyServer:jibDockerBuild -Djib.to.image=migrations/capture_proxy:latest
# This also runs generateSelfSignedCerts, baking pub.pem/key.pem into
# migrations/capture_proxy:latest.
#
# Start the stack (wait for capture proxy to be healthy before running k6):
#   docker-compose up -d --wait kafka opensearch-source capture-proxy otel-collector prometheus grafana
#
# Run the ingest scenario:
#  env_flags=()
#  while IFS= read -r line || [[ -n "$line" ]]; do
#   [ [ -z "$line" || "$line" =~ ^[ [ :space: ] ]*# ] ] && continue
#   env_flags+=(-e "$line")
#  done < k6-config/ingest-burst.env
#  docker compose run --rm "${env_flags[@]}" \
#  k6 run --out=experimental-prometheus-rw /scripts/scenarios/ingest.js

# View metrics: http://localhost:3000 (Grafana, admin/admin)
# Prometheus:   http://localhost:19090  (19090 avoids conflict with the main TrafficCapture stack)
# Kafka:        localhost:9092

services:

  # ── Source cluster ──────────────────────────────────────────────────────
  # Plain OpenSearch with security disabled — plain HTTP backside.
  # The capture proxy handles inbound TLS; the source cluster does not need it.
  #
  # OpenSearch 2.12+ requires OPENSEARCH_INITIAL_ADMIN_PASSWORD when the security
  # demo installer runs. DISABLE_INSTALL_DEMO_CONFIG=true prevents the installer
  # from running entirely; plugins.security.disabled=true then stops OpenSearch
  # from loading the security plugin at all.
  opensearch-source:
    image: mirror.gcr.io/opensearchproject/opensearch:2.15.0
    networks: [load-test]
    environment:
      - discovery.type=single-node
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - plugins.security.disabled=true
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "19200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qv '\"status\":\"red\"'"]
      interval: 5s
      timeout: 10s
      retries: 20

  # ── Kafka ───────────────────────────────────────────────────────────────
  kafka:
    image: mirror.gcr.io/apache/kafka:3.9.1
    networks: [load-test]
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT_HOST://kafka:9092,PLAINTEXT://kafka:19092'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'CONTROLLER://:29093,PLAINTEXT_HOST://:9092,PLAINTEXT://:19092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      CLUSTER_ID: 'load-test-cluster-00001'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 5s
      timeout: 10s
      retries: 15

  # ── Capture Proxy ────────────────────────────────────────────────────────
  # Listens on HTTPS :9200 (self-signed cert baked into the image).
  # Forwards to plain HTTP opensearch-source:9200.
  # Offloads captured TrafficStreams to Kafka.
  capture-proxy:
    image: migrations/capture_proxy:latest
    networks: [load-test]
    ports:
      - "9200:9200"
    # Jib bakes "java -cp @/app/jib-classpath-file CaptureProxy" as the image ENTRYPOINT.
    # Without an explicit override, docker-compose's `command:` becomes CMD and is appended
    # to that entrypoint — CaptureProxy.main() gets "/runJavaWithClasspath.sh" as its first
    # argument and JCommander rejects it.  Setting entrypoint here replaces the Jib-generated
    # one so the script is actually exec'd and receives the class name + flags as $@.
    entrypoint:
      - /runJavaWithClasspath.sh
    command:
      - org.opensearch.migrations.trafficcapture.proxyserver.CaptureProxy
      - --kafkaConnection
      - kafka:9092
      - --destinationUri
      - http://opensearch-source:9200
      - --listenPort
      - "9200"
      - --sslCertChainFile
      - /usr/share/captureProxy/config/pub.pem
      - --sslKeyFile
      - /usr/share/captureProxy/config/key.pem
      - --otelTraceCollectorEndpoint
      - http://otel-collector:4317
      - --otelMetricsCollectorEndpoint
      - http://otel-collector:4317
    depends_on:
      kafka:
        condition: service_healthy
      opensearch-source:
        condition: service_healthy
    healthcheck:
      # Verify port 9200 is in LISTEN state by scanning /proc/net/tcp6 (falling back to tcp).
      # Cannot use a TCP connection: the proxy writes a connection-start TrafficStream to Kafka
      # for EVERY inbound TCP connection, even bare SYN/FIN with no HTTP data — a TCP health
      # check at 10s interval adds exactly 1 spurious Kafka message every 10s and makes the
      # "write throughput" panel show non-zero activity when no traffic is running.
      # /proc/net/tcp6 is readable inside the container with only bash (no ss/grep/awk).
      # 23F0 is 9200 in hex; state 0A is LISTEN.
      test: ["CMD-SHELL", "bash -c 'while read sl l r st e; do [[ $$l == *:23F0 && $$st == 0A ]] && exit 0; done < /proc/net/tcp6 2>/dev/null; while read sl l r st e; do [[ $$l == *:23F0 && $$st == 0A ]] && exit 0; done < /proc/net/tcp 2>/dev/null; exit 1'"]
      interval: 10s
      timeout: 5s
      retries: 20

  # ── OTEL Collector ──────────────────────────────────────────────────────
  # Receives OTLP metrics from the Capture Proxy (and later the Replayer).
  # Exposes a Prometheus scrape endpoint that Prometheus pulls from.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.103.0
    networks: [load-test]
    volumes:
      - ./otel-config.yaml:/etc/otel-config.yaml
    command: ["--config=/etc/otel-config.yaml"]
    # kafkametricsreceiver's topics/consumers scrapers fail silently on initial connect
    # and do NOT recover if Kafka isn't ready on the first scrape attempt. Waiting for
    # Kafka to be healthy before starting ensures all scrapers connect cleanly.
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "4317:4317"    # OTLP gRPC receiver
      - "4318:4318"    # OTLP HTTP receiver
      - "8889:8889"    # Prometheus scrape endpoint
      - "9090:9090"    # Prometheus remote write receiver (k6)

  # ── Prometheus ──────────────────────────────────────────────────────────
  # Scrapes otel-collector for pipeline metrics.
  # Also accepts k6 metrics via Prometheus remote write
  # (--web.enable-remote-write-receiver flag below).
  prometheus:
    image: mirror.gcr.io/prom/prometheus:v2.53.0
    networks: [load-test]
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yml
    ports:
      - "19090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-remote-write-receiver'
      - '--enable-feature=exemplar-storage'

  # ── Grafana ─────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    networks: [load-test]
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

  # ── Redis ───────────────────────────────────────────────────────────────
  # Backend store for the ID ring buffer.
  # k6 does not connect to Redis directly — all access is via Webdis below.
  redis:
    image: redis:7-alpine
    networks: [load-test]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Webdis ──────────────────────────────────────────────────────────────
  # HTTP-to-Redis proxy. Exposes the full Redis command set over plain HTTP
  # (GET /COMMAND/arg → {"COMMAND": result}) so k6 can use its built-in http
  # module instead of requiring a custom k6 build with xk6-redis.
  # Config: webdis.json (mounted below) points it at the redis service.
  webdis:
    image: anapsix/webdis
    networks: [load-test]
    ports:
      - "7379:7379"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7379/PING | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── k6 ──────────────────────────────────────────────────────────────────
  # One-shot runner: use `docker compose run --rm k6 run ...` rather than `up`.
  # The entire POC folder is mounted at /scripts.
  # k6 pushes metrics to Prometheus via remote write; no custom k6 image needed.
  k6:
    image: grafana/k6:latest
    networks: [load-test]
    volumes:
      - .:/scripts
    environment:
      # OTLP: k6 metrics flow through otel-collector alongside pipeline metrics
      - K6_OTEL_GRPC_EXPORTER_ENDPOINT=otel-collector:4317
      - K6_OTEL_GRPC_EXPORTER_INSECURE=true
      # Scenario config (see available .env files for the different scenarios)
      - CAPTURE_PROXY_URL=https://capture-proxy:9200
      - INDEX_NAME=nyc_taxis
      - INGEST_RATE=50
      - INGEST_VUS=20
      - INGEST_MAX_VUS=100
      - DURATION=5m
      - BULK_BATCH_SIZE=20
      - SEED_DOC_COUNT=100000
      # (optional) )D registry — used by scenarios/mixed.js only
      - WEBDIS_URL=http://webdis:7379
    depends_on:
      capture-proxy:
        condition: service_healthy
      prometheus:
        condition: service_started
      webdis:
        condition: service_healthy

networks:
  load-test:
    driver: bridge
