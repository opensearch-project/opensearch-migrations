# Production EKS Configuration
# EKS Pod Identity v2 service accounts, Karpenter node pool, S3 artifact repository
#
# Pod Identity v2 setup:
#   Pod Identity associations are created EXTERNALLY (not via SA annotations).
#   The EKS Pod Identity Agent (DaemonSet) injects AWS credentials directly into pods.
#   No IRSA annotations or STS assume-role calls needed in workflow code.
#
#   Create associations via CLI or IaC:
#     aws eks create-pod-identity-association \
#       --cluster-name CLUSTER_NAME \
#       --namespace ma \
#       --service-account ci-deployment-sa \
#       --role-arn arn:aws:iam::ACCOUNT_ID:role/ArgoDeploymentRole
#
#     aws eks create-pod-identity-association \
#       --cluster-name CLUSTER_NAME \
#       --namespace ma \
#       --service-account ci-release-sa \
#       --role-arn arn:aws:iam::ACCOUNT_ID:role/ArgoReleaseRole
#
#   The IAM roles must have the Pod Identity trust policy:
#     {
#       "Version": "2012-10-17",
#       "Statement": [{
#         "Effect": "Allow",
#         "Principal": { "Service": "pods.eks.amazonaws.com" },
#         "Action": ["sts:AssumeRole", "sts:TagSession"]
#       }]
#     }

---
# CI deployment service account — Pod Identity v2 provides AWS credentials
# via external association (no annotation needed)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ci-deployment-sa
  namespace: ma
  labels:
    app: ci-pipeline

---
# Release pipeline service account — Pod Identity v2 provides AWS credentials
# via external association (no annotation needed)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ci-release-sa
  namespace: ma
  labels:
    app: ci-pipeline

---
# Test account ID secret (populated by External Secrets Operator or manually)
apiVersion: v1
kind: Secret
metadata:
  name: migrations-test-account-id
  namespace: ma
type: Opaque
stringData:
  account-id: "REPLACE_WITH_TEST_ACCOUNT_ID"

---
# GitHub token secret (populated by External Secrets Operator or manually)
apiVersion: v1
kind: Secret
metadata:
  name: github-token
  namespace: ma
type: Opaque
stringData:
  token: "REPLACE_WITH_GITHUB_TOKEN"

---
# Karpenter NodePool for CI workloads
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: ci-workloads
spec:
  template:
    metadata:
      labels:
        node-type: ci
    spec:
      requirements:
        - key: node.kubernetes.io/instance-type
          operator: In
          values: [c5.xlarge, c5.2xlarge, c5.4xlarge]
        - key: karpenter.sh/capacity-type
          operator: In
          values: [on-demand, spot]
        - key: kubernetes.io/arch
          operator: In
          values: [amd64]
      taints:
        - key: ci-workload
          value: "true"
          effect: NoSchedule
  limits:
    cpu: 256
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 30s

---
# Karpenter EC2NodeClass for CI nodes
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: ci-workloads
spec:
  amiSelectorTerms:
    - alias: al2023@latest
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "CLUSTER_NAME"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "CLUSTER_NAME"
  role: "KarpenterNodeRole-CLUSTER_NAME"
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 100Gi
        volumeType: gp3
        deleteOnTermination: true
