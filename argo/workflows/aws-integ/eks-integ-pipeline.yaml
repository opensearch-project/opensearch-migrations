# Replaces: vars/eksIntegPipeline.groovy
# EKS-based integration test: AOS source → AOS target via EKS/k8s
# Deploys AOS clusters via awsDeployCluster.sh, EKS via aws-bootstrap.sh, runs tests, ordered cleanup
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: eks-integ-pipeline
  namespace: ma
  labels:
    app: ci-pipeline
    replaces: eksIntegPipeline.groovy
spec:
  entrypoint: main
  onExit: cleanup-handler
  serviceAccountName: ci-deployment-sa
  arguments:
    parameters:
      - name: repo-url
        value: "https://github.com/opensearch-project/opensearch-migrations.git"
      - name: branch
        value: "main"
      - name: stage
        value: "eks-integ"
      - name: source-version
        value: "ES_7.10"
      - name: target-version
        value: "OS_2.19"
      - name: source-cluster-type
        value: "OPENSEARCH_MANAGED_SERVICE"
      - name: target-cluster-type
        value: "OPENSEARCH_MANAGED_SERVICE"
      - name: test-ids
        value: "all"
      - name: region
        value: "us-east-1"
  activeDeadlineSeconds: 10800  # 3 hours

  synchronization:
    semaphores:
      - configMapKeyRef:
          name: ci-stage-locks
          key: eks-integ

  templates:
    - name: main
      dag:
        tasks:
          - name: checkout
            templateRef:
              name: common-ci-steps
              template: git-checkout
            arguments:
              parameters:
                - name: repo-url
                  value: "{{workflow.parameters.repo-url}}"
                - name: branch
                  value: "{{workflow.parameters.branch}}"

          - name: build
            depends: checkout
            templateRef:
              name: default-integ-pipeline
              template: gradle-build
            arguments:
              artifacts:
                - name: source
                  from: "{{tasks.checkout.outputs.artifacts.source}}"

          - name: deploy-clusters
            depends: build
            template: deploy-clusters
            arguments:
              artifacts:
                - name: source
                  from: "{{tasks.build.outputs.artifacts.source}}"

          - name: deploy-ma-on-eks
            depends: deploy-clusters
            template: deploy-ma-on-eks
            arguments:
              artifacts:
                - name: source
                  from: "{{tasks.deploy-clusters.outputs.artifacts.source}}"

          - name: post-cluster-setup
            depends: deploy-ma-on-eks
            template: post-cluster-setup
            arguments:
              artifacts:
                - name: source
                  from: "{{tasks.deploy-ma-on-eks.outputs.artifacts.source}}"

          - name: run-tests
            depends: post-cluster-setup
            template: run-eks-tests
            arguments:
              artifacts:
                - name: source
                  from: "{{tasks.post-cluster-setup.outputs.artifacts.source}}"

    # ================================================================
    # DEPLOY CLUSTERS — creates AOS source + target domains
    # Matches Jenkins deployClustersStep.groovy: writes cluster context JSON,
    # runs awsDeployCluster.sh, reads cluster-details-<stage>.json
    # ================================================================
    - name: deploy-clusters
      inputs:
        artifacts:
          - name: source
            path: /workspace
      outputs:
        artifacts:
          - name: source
            path: /workspace
      container:
        image: ci-runner:latest
        workingDir: /workspace/test
        command: [bash, -c]
        args:
          - |
            set -euo pipefail
            STAGE="{{workflow.parameters.stage}}"
            REGION="{{workflow.parameters.region}}"

            # Write cluster context JSON (matches deployClustersStep.groovy)
            CONTEXT_FILE="tmp/cluster-context-integ.json"
            mkdir -p tmp
            cat > "${CONTEXT_FILE}" << EOF
            {
              "stage": "${STAGE}",
              "vpcAZCount": 2,
              "clusters": [
                {
                  "clusterId": "source",
                  "clusterVersion": "{{workflow.parameters.source-version}}",
                  "clusterType": "{{workflow.parameters.source-cluster-type}}",
                  "openAccessPolicyEnabled": true,
                  "domainRemovalPolicy": "DESTROY"
                },
                {
                  "clusterId": "target",
                  "clusterVersion": "{{workflow.parameters.target-version}}",
                  "clusterType": "{{workflow.parameters.target-cluster-type}}",
                  "openAccessPolicyEnabled": true,
                  "domainRemovalPolicy": "DESTROY"
                }
              ]
            }
            EOF
            echo "Using cluster context:" && cat "${CONTEXT_FILE}"

            # Deploy clusters via awsDeployCluster.sh (same as Jenkins)
            ./awsDeployCluster.sh --stage "${STAGE}" --context-file "${CONTEXT_FILE}"

            # Save cluster details for later stages
            cp "tmp/cluster-details-${STAGE}.json" /workspace/test/cluster-details.json
            echo "Cluster details:" && cat /workspace/test/cluster-details.json
        env:
          - name: TEST_ACCOUNT_ID
            valueFrom:
              secretKeyRef:
                name: migrations-test-account-id
                key: account-id
        activeDeadlineSeconds: 3600  # 60 min

    # ================================================================
    # DEPLOY MA ON EKS — runs aws-bootstrap.sh (matches Jenkins 'Deploy & Bootstrap MA')
    # Reads cluster details, extracts VPC/subnet, deploys EKS + MA
    # ================================================================
    - name: deploy-ma-on-eks
      inputs:
        artifacts:
          - name: source
            path: /workspace
      outputs:
        artifacts:
          - name: source
            path: /workspace
      container:
        image: ci-runner:latest
        workingDir: /workspace
        command: [bash, -c]
        args:
          - |
            set -euo pipefail
            STAGE="{{workflow.parameters.stage}}"
            REGION="{{workflow.parameters.region}}"
            STACK_NAME_SUFFIX="${STAGE}-${REGION}"
            STACK_NAME="Migration-Assistant-Infra-Import-VPC-eks-${STACK_NAME_SUFFIX}"

            # Read cluster details from deploy-clusters step
            CLUSTER_DETAILS=$(cat /workspace/test/cluster-details.json)
            VPC_ID=$(echo "$CLUSTER_DETAILS" | jq -r '.target.vpcId')
            SUBNET_IDS=$(echo "$CLUSTER_DETAILS" | jq -r '.target.subnetIds')

            # Deploy EKS + MA via aws-bootstrap.sh (matches Jenkins exactly)
            ./deployment/k8s/aws/aws-bootstrap.sh \
              --deploy-import-vpc-cfn \
              --build-cfn \
              --stack-name "${STACK_NAME}" \
              --vpc-id "${VPC_ID}" \
              --subnet-ids "${SUBNET_IDS}" \
              --stage "${STAGE}" \
              --eks-access-principal-arn "arn:aws:iam::${TEST_ACCOUNT_ID}:role/ArgoTestDeploymentRole" \
              --build-images \
              --build-chart-and-dashboards \
              --base-dir "$(pwd)" \
              --skip-console-exec \
              --region "${REGION}" \
              2>&1 | while IFS= read -r line; do printf '%s | %s\n' "$(date '+%H:%M:%S')" "$line"; done; exit ${PIPESTATUS[0]}

            # Capture CFN exports (matches Jenkins: registryEndpoint, eksClusterName, clusterSecurityGroup)
            RAW_OUTPUT=$(aws cloudformation describe-stacks \
              --stack-name "${STACK_NAME}" \
              --query "Stacks[0].Outputs[?OutputKey=='MigrationsExportString'].OutputValue" \
              --output text)

            # Parse exports into individual values
            REGISTRY=$(echo "${RAW_OUTPUT}" | tr ';' '\n' | grep MIGRATIONS_ECR_REGISTRY | cut -d= -f2)
            EKS_CLUSTER=$(echo "${RAW_OUTPUT}" | tr ';' '\n' | grep MIGRATIONS_EKS_CLUSTER_NAME | cut -d= -f2)
            EKS_SG=$(echo "${RAW_OUTPUT}" | tr ';' '\n' | grep EKS_CLUSTER_SECURITY_GROUP | cut -d= -f2)

            # Save for post-cluster-setup and cleanup
            cat > /workspace/test/eks-exports.json << EOF
            {
              "registryEndpoint": "${REGISTRY}",
              "eksClusterName": "${EKS_CLUSTER}",
              "clusterSecurityGroup": "${EKS_SG}",
              "stackName": "${STACK_NAME}"
            }
            EOF
            echo "EKS exports:" && cat /workspace/test/eks-exports.json
        env:
          - name: TEST_ACCOUNT_ID
            valueFrom:
              secretKeyRef:
                name: migrations-test-account-id
                key: account-id
        resources:
          requests:
            cpu: "2"
            memory: "4Gi"
        activeDeadlineSeconds: 9000  # 150 min

    # ================================================================
    # POST-CLUSTER SETUP — matches Jenkins 'Post-Cluster Setup' stage exactly
    # 1. Update kubeconfig for EKS cluster
    # 2. Create source/target configmaps with cluster-config JSON (sigv4 auth)
    # 3. Add SG ingress rules: EKS cluster SG → AOS domain SGs
    # 4. Wait for MA pods ready
    # ================================================================
    - name: post-cluster-setup
      inputs:
        artifacts:
          - name: source
            path: /workspace
      outputs:
        artifacts:
          - name: source
            path: /workspace
      container:
        image: ci-runner:latest
        command: [bash, -c]
        args:
          - |
            set -euo pipefail
            STAGE="{{workflow.parameters.stage}}"
            REGION="{{workflow.parameters.region}}"
            SOURCE_VER="{{workflow.parameters.source-version}}"
            TARGET_VER="{{workflow.parameters.target-version}}"

            CLUSTER_DETAILS=$(cat /workspace/test/cluster-details.json)
            EKS_EXPORTS=$(cat /workspace/test/eks-exports.json)
            EKS_CLUSTER=$(echo "$EKS_EXPORTS" | jq -r '.eksClusterName')
            EKS_SG=$(echo "$EKS_EXPORTS" | jq -r '.clusterSecurityGroup')

            # 1. Update kubeconfig
            aws eks update-kubeconfig --name "${EKS_CLUSTER}" --region "${REGION}"

            # Helper: expand version string (ES_7.10 → elasticsearch-7-10)
            expand_version() {
              local ver="$1"
              local prefix=$(echo "$ver" | cut -d_ -f1)
              local nums=$(echo "$ver" | cut -d_ -f2 | tr '.' '-')
              if [ "$prefix" = "ES" ]; then echo "elasticsearch-${nums}"
              else echo "opensearch-${nums}"; fi
            }

            SOURCE_EXPANDED=$(expand_version "${SOURCE_VER}")
            TARGET_EXPANDED=$(expand_version "${TARGET_VER}")

            # 2. Create source configmap (matches Jenkins: JSON with sigv4 auth)
            SOURCE_ENDPOINT=$(echo "$CLUSTER_DETAILS" | jq -r '.source.endpoint')
            cat > /tmp/source-cluster-config.json << EOF
            {
              "endpoint": "${SOURCE_ENDPOINT}",
              "allow_insecure": true,
              "sigv4": {"region": "${REGION}", "service": "es"},
              "version": "${SOURCE_VER}"
            }
            EOF
            kubectl create configmap "source-${SOURCE_EXPANDED}-migration-config" \
              --from-file=cluster-config=/tmp/source-cluster-config.json \
              --namespace ma --dry-run=client -o yaml | kubectl apply -f -

            # 3. Create target configmap
            TARGET_ENDPOINT=$(echo "$CLUSTER_DETAILS" | jq -r '.target.endpoint')
            cat > /tmp/target-cluster-config.json << EOF
            {
              "endpoint": "${TARGET_ENDPOINT}",
              "allow_insecure": true,
              "sigv4": {"region": "${REGION}", "service": "es"},
              "version": "${TARGET_VER}"
            }
            EOF
            kubectl create configmap "target-${TARGET_EXPANDED}-migration-config" \
              --from-file=cluster-config=/tmp/target-cluster-config.json \
              --namespace ma --dry-run=client -o yaml | kubectl apply -f -

            # 4. Add SG ingress rules: EKS → AOS (matches Jenkins: protocol -1, port -1)
            TARGET_SG=$(echo "$CLUSTER_DETAILS" | jq -r '.target.securityGroupId')
            if [ -n "${TARGET_SG}" ] && [ "${TARGET_SG}" != "null" ]; then
              EXISTS=$(aws ec2 describe-security-groups --group-ids "${TARGET_SG}" \
                --query "SecurityGroups[0].IpPermissions[?UserIdGroupPairs[?GroupId=='${EKS_SG}']]" \
                --output text 2>/dev/null || true)
              if [ -z "${EXISTS}" ]; then
                echo "Adding SG ingress: ${TARGET_SG} ← ${EKS_SG}"
                aws ec2 authorize-security-group-ingress \
                  --group-id "${TARGET_SG}" --protocol -1 --port -1 \
                  --source-group "${EKS_SG}" || true
              else
                echo "SG ingress rule already exists"
              fi
            fi

            # 5. Wait for MA pods ready
            echo "Waiting for MA pods..."
            kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=migration-console \
              -n ma --timeout=300s || true
        env:
          - name: TEST_ACCOUNT_ID
            valueFrom:
              secretKeyRef:
                name: migrations-test-account-id
                key: account-id
        activeDeadlineSeconds: 900  # 15 min

    # ================================================================
    # RUN EKS TESTS — matches Jenkins 'Perform Python E2E Tests' stage
    # ================================================================
    - name: run-eks-tests
      inputs:
        artifacts:
          - name: source
            path: /workspace
      outputs:
        artifacts:
          - name: test-results
            path: /workspace/libraries/testAutomation/reports/
            optional: true
            archive:
              none: {}
            s3:
              key: "{{workflow.name}}/test-results/"
      container:
        image: ci-runner:latest
        workingDir: /workspace/libraries/testAutomation
        command: [bash, -c]
        args:
          - |
            set -euo pipefail
            TEST_IDS_ARG=""
            TEST_IDS="{{workflow.parameters.test-ids}}"
            if [ "${TEST_IDS}" != "all" ] && [ -n "${TEST_IDS}" ]; then
              TEST_IDS_ARG="--test-ids='${TEST_IDS}'"
            fi

            pipenv install --deploy
            pipenv run app \
              --source-version="{{workflow.parameters.source-version}}" \
              --target-version="{{workflow.parameters.target-version}}" \
              ${TEST_IDS_ARG} \
              --reuse-clusters --skip-delete --skip-install
        env:
          - name: TEST_ACCOUNT_ID
            valueFrom:
              secretKeyRef:
                name: migrations-test-account-id
                key: account-id
        activeDeadlineSeconds: 7200  # 2 hours

    # ================================================================
    # CLEANUP HANDLER — matches Jenkins post { always } exactly
    # Order: EKS cleanup (helm uninstall + SG revocation) → MA stack → domains → network
    # ================================================================
    - name: cleanup-handler
      dag:
        tasks:
          - name: eks-cleanup
            template: eks-cleanup
          - name: delete-ma-stack
            depends: eks-cleanup
            template: delete-cfn-stack
            arguments:
              parameters:
                - name: stack-name
                  value: "Migration-Assistant-Infra-Import-VPC-eks-{{workflow.parameters.stage}}-{{workflow.parameters.region}}"
          - name: delete-source-domain
            depends: delete-ma-stack
            template: delete-cfn-stack
            arguments:
              parameters:
                - name: stack-name
                  value: "OpenSearchDomain-source-{{workflow.parameters.stage}}-{{workflow.parameters.region}}"
          - name: delete-target-domain
            depends: delete-ma-stack
            template: delete-cfn-stack
            arguments:
              parameters:
                - name: stack-name
                  value: "OpenSearchDomain-target-{{workflow.parameters.stage}}-{{workflow.parameters.region}}"
          - name: delete-network-stack
            depends: "delete-source-domain && delete-target-domain"
            template: delete-cfn-stack
            arguments:
              parameters:
                - name: stack-name
                  value: "NetworkInfra-{{workflow.parameters.stage}}-{{workflow.parameters.region}}"
          - name: upload-results
            templateRef:
              name: reportportal-upload
              template: upload-junit
            arguments:
              parameters:
                - name: launch-name
                  value: "eks-integ-{{workflow.parameters.stage}}"
              artifacts:
                - name: junit-xml
                  s3:
                    key: "{{workflow.name}}/test-results/"
                  optional: true

    # EKS cleanup: helm uninstall, SG revocation (matches Jenkins post block)
    - name: eks-cleanup
      container:
        image: ci-runner:latest
        command: [bash, -c]
        args:
          - |
            set +e
            STAGE="{{workflow.parameters.stage}}"
            REGION="{{workflow.parameters.region}}"

            # Read saved state
            EKS_EXPORTS=$(cat /workspace/test/eks-exports.json 2>/dev/null || echo '{}')
            EKS_CLUSTER=$(echo "$EKS_EXPORTS" | jq -r '.eksClusterName // empty')
            EKS_SG=$(echo "$EKS_EXPORTS" | jq -r '.clusterSecurityGroup // empty')
            CLUSTER_DETAILS=$(cat /workspace/test/cluster-details.json 2>/dev/null || echo '{}')

            if [ -n "${EKS_CLUSTER}" ]; then
              aws eks update-kubeconfig --name "${EKS_CLUSTER}" --region "${REGION}" 2>/dev/null || true

              # Helm uninstall + namespace cleanup (matches Jenkins)
              cd /workspace/libraries/testAutomation 2>/dev/null && \
                pipenv install --deploy 2>/dev/null && \
                pipenv run app --delete-only || true
              kubectl -n ma get pods || true
              echo "List resources not removed by helm uninstall:"
              kubectl get all,pvc,configmap,secret,workflow -n ma -o wide --ignore-not-found || true
              kubectl delete namespace ma --ignore-not-found --timeout=60s || true

              # Revoke SG ingress rules (matches Jenkins SG revocation)
              if [ -n "${EKS_SG}" ]; then
                TARGET_SG=$(echo "$CLUSTER_DETAILS" | jq -r '.target.securityGroupId // empty')
                if [ -n "${TARGET_SG}" ]; then
                  if aws ec2 describe-security-groups --group-ids "${TARGET_SG}" >/dev/null 2>&1; then
                    EXISTS=$(aws ec2 describe-security-groups --group-ids "${TARGET_SG}" \
                      --query "SecurityGroups[0].IpPermissions[?UserIdGroupPairs[?GroupId=='${EKS_SG}']]" \
                      --output json 2>/dev/null || echo "[]")
                    if [ "${EXISTS}" != "[]" ]; then
                      echo "CLEANUP: Revoking EKS SG ingress rule"
                      aws ec2 revoke-security-group-ingress \
                        --group-id "${TARGET_SG}" --protocol -1 --port -1 \
                        --source-group "${EKS_SG}" || true
                    fi
                  fi
                fi
              fi
            fi
            echo "EKS cleanup complete"
        env:
          - name: TEST_ACCOUNT_ID
            valueFrom:
              secretKeyRef:
                name: migrations-test-account-id
                key: account-id
        activeDeadlineSeconds: 1800  # 30 min

    # Generic CFN stack deletion with retry
    - name: delete-cfn-stack
      inputs:
        parameters:
          - name: stack-name
      retryStrategy:
        limit: 3
        retryPolicy: Always
        backoff:
          duration: "60s"
          factor: 2
          maxDuration: "5m"
      container:
        image: amazon/aws-cli:2.15.0
        command: [bash, -c]
        args:
          - |
            set +e
            STACK="{{inputs.parameters.stack-name}}"
            REGION="{{workflow.parameters.region}}"

            # Check if stack exists
            STATUS=$(aws cloudformation describe-stacks --stack-name "${STACK}" --region "${REGION}" \
              --query "Stacks[0].StackStatus" --output text 2>/dev/null || echo "DOES_NOT_EXIST")
            if [ "${STATUS}" = "DOES_NOT_EXIST" ]; then
              echo "Stack ${STACK} does not exist, skipping"
              exit 0
            fi

            echo "Deleting CFN stack: ${STACK} (status: ${STATUS})"
            aws cloudformation delete-stack --stack-name "${STACK}" --region "${REGION}" || true
            aws cloudformation wait stack-delete-complete --stack-name "${STACK}" --region "${REGION}"
            echo "Stack ${STACK} deleted"
        env:
          - name: TEST_ACCOUNT_ID
            valueFrom:
              secretKeyRef:
                name: migrations-test-account-id
                key: account-id
        activeDeadlineSeconds: 1800  # 30 min per stack
