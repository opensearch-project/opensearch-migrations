  <text class="text" x="812" y="192">Pending submit: none</text>
  <text class="text" x="812" y="224">CR spec: new desired config</text>
  <text class="text" x="812" y="256">Status: previous config realized</text>
  <text class="cyan" x="812" y="308">Changes accepted into spec</text>
  <text class="dim" x="834" y="340">source endpoint changed</text>
  <text class="dim" x="834" y="368">noCapture: false -> true</text>
  <text class="yellow" x="812" y="420">Approval needed</text>
