
description: "Config for claude agent based migration advisor tests"

providers:
  - id: 'file://claude_requests.py'
    label: 'Claude agent invocation'
    config:
      timeout: 3000000

defaultTest:
  options:
    provider:
      id: bedrock:us.anthropic.claude-3-5-sonnet-20241022-v2:0
      config:
        region: us-east-1
        max_tokens: 256

prompts:
  - id: migration-advisor-prompt
    label: "Migration advisor requests"
    raw: "{{query}}"


tests:
  # Note the sequence of continue: False to start new session, and continue: True if building on the previous prompts
  - description: "Ensure the agent asks for the specific role of the user."
    metadata:
      continue: false # flag on / off if the last used session should be picked up or not
    vars:
      query: |
        Help me migrate my solr system to opensearch.
    assert:
      - type: llm-rubric
        value: >-
          Response clarifies the actual role of the user. Provides at least 6 explicit role examples to choose from,
          which distinguish engineers / developers, platform / ops engineers, data engineers, architects and product manager roles.
        metric: clarify-role
  - description: "Ask for schema"
    metadata:
      continue: true # flag on / off if the last used session should be picked up or not
    vars:
      query: |
        To your previous question: Search Engineer is the correct role.
    assert:
      - type: llm-rubric
        value: >-
          Response asks for the Solr version the user is migrating from.
        metric: clarify-solr-version

  - description: "Provide Solr version 6 and expect version acknowledgement and schema request"
    metadata:
      continue: true
    vars:
      query: |
        We are migrating from Solr 6.6.
    assert:
      - type: llm-rubric
        value: >-
          Response acknowledges Solr version 6.6 and mentions at least one version-specific concern,
          such as Trie field types (TrieLongField, TrieIntField, etc.) being present or the default
          similarity being TF-IDF (ClassicSimilarity) rather than BM25. Response then asks the user
          to provide their Solr schema.
        metric: solr-version-acknowledged

  - description: "Provide Solr 6 schema and verify OpenSearch mapping is generated correctly"
    metadata:
      continue: true
    vars:
      query: |
        Here is our Solr 6 schema:

        <?xml version="1.0" encoding="UTF-8" ?>
        <schema name="example-solr6" version="1.6">
          <fields>
            <field name="id" type="string" indexed="true" stored="true" required="true" multiValued="false" />
            <field name="product_name" type="text_general" indexed="true" stored="true" />
            <field name="price" type="currency" indexed="true" stored="true"/>
            <field name="priority" type="priority_enum" indexed="true" stored="true"/>
            <field name="_version_" type="long" indexed="true" stored="true"/>
          </fields>
          <uniqueKey>id</uniqueKey>
          <types>
            <fieldType name="string" class="solr.StrField" sortMissingLast="true" />
            <fieldType name="long" class="solr.TrieLongField" precisionStep="0" positionIncrementGap="0"/>
            <fieldType name="text_general" class="solr.TextField" positionIncrementGap="100">
              <analyzer>
                <tokenizer class="solr.StandardTokenizerFactory"/>
                <filter class="solr.LowerCaseFilterFactory"/>
              </analyzer>
            </fieldType>
            <fieldType name="currency" class="solr.CurrencyField"
                       precisionStep="8"
                       defaultCurrency="USD"
                       currencyConfig="currency.xml" />
            <fieldType name="priority_enum" class="solr.EnumField"
                       enumsConfig="enumsConfig.xml"
                       enumName="priority" />
          </types>
        </schema>
    assert:
      - type: llm-rubric
        value: >-
          Response produces a valid OpenSearch index mapping JSON that satisfies all of the following:
          (1) 'id' is mapped to type 'keyword';
          (2) 'product_name' is mapped to type 'text' with a standard or equivalent analyzer;
          (3) '_version_' is mapped to type 'long', and the response flags that TrieLongField is a
              deprecated Trie type with no direct OpenSearch equivalent, recommending the Point field
              equivalent (LongPointField);
          (4) 'price' (solr.CurrencyField) is flagged as unsupported in OpenSearch with a recommended
              workaround (e.g. storing amount as 'scaled_float' or 'double' plus a separate currency
              keyword field);
          (5) 'priority' (solr.EnumField) is flagged as unsupported in OpenSearch with a recommended
              workaround (e.g. 'keyword' or 'integer' with application-level validation);
          (6) the response notes the TF-IDF to BM25 similarity change as a behavioral incompatibility
              given the source is Solr 6.x.
        metric: solr6-schema-mapping-correct

  - description: "Create migration plan"
    metadata:
      continue: true # flag on / off if the last used session should be picked up or not
    vars:
      query: |
        To your previous question: you can find the corresponding schema here: 
        https://github.com/apache/solr/blob/main/solr/server/solr/configsets/sample_techproducts_configs/conf/managed-schema.xml.
    assert:
      - type: llm-rubric
        value: >-
          Response contains a migration plan including the migrated schema with plausible opensearch schema.
        metric: clarify-migration-steps


    