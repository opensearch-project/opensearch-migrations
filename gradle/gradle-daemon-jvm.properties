# Daemon JVM criteria for Gradle 8.13+ auto-provisioning.
#
# Direct Amazon Corretto download URLs (no foojay / third-party redirect
# service dependency). The `latest` channel resolves to the most recent
# Corretto 21 patch release and is maintained by AWS:
#   https://docs.aws.amazon.com/corretto/latest/corretto-21-ug/downloads-list.html
#
# FreeBSD is intentionally absent -- Corretto does not publish FreeBSD
# builds. UNIX is mapped to the Linux archives as a best-effort fallback
# (Solaris/other unix-likes). Gradle falls back to the launcher JVM with
# a warning if the running platform has no matching entry.
toolchainUrl.LINUX.AARCH64=https\://corretto.aws/downloads/latest/amazon-corretto-21-aarch64-linux-jdk.tar.gz
toolchainUrl.LINUX.X86_64=https\://corretto.aws/downloads/latest/amazon-corretto-21-x64-linux-jdk.tar.gz
toolchainUrl.MAC_OS.AARCH64=https\://corretto.aws/downloads/latest/amazon-corretto-21-aarch64-macos-jdk.tar.gz
toolchainUrl.MAC_OS.X86_64=https\://corretto.aws/downloads/latest/amazon-corretto-21-x64-macos-jdk.tar.gz
toolchainUrl.UNIX.AARCH64=https\://corretto.aws/downloads/latest/amazon-corretto-21-aarch64-linux-jdk.tar.gz
toolchainUrl.UNIX.X86_64=https\://corretto.aws/downloads/latest/amazon-corretto-21-x64-linux-jdk.tar.gz
toolchainUrl.WINDOWS.X86_64=https\://corretto.aws/downloads/latest/amazon-corretto-21-x64-windows-jdk.zip
toolchainVendor=AMAZON
toolchainVersion=21
